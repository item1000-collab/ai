<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming soon</title>
  <style>
    /* Minimal, modern reset and base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #f6f9fc 0%, #e6f0f5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      padding: 1.5rem;
      margin: 0;
    }

    .card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 3rem;
      padding: 3.5rem 4rem;
      max-width: 720px;
      width: 100%;
      box-shadow: 0 25px 45px -12px rgba(0, 20, 30, 0.25),
                  0 2px 8px rgba(0, 0, 0, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.5);
      text-align: center;
      transition: all 0.2s ease;
    }

    h1 {
      font-size: 5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #0b2b3b;
      margin-bottom: 0.2rem;
      line-height: 1.1;
      text-shadow: 0 4px 12px rgba(0, 30, 40, 0.08);
    }

    .subhead {
      font-size: 1.2rem;
      font-weight: 400;
      color: #2c4c5e;
      margin-top: 0.4rem;
      margin-bottom: 2.5rem;
      letter-spacing: 0.02em;
      border-bottom: 2px dashed rgba(44, 76, 94, 0.15);
      padding-bottom: 1.5rem;
      display: inline-block;
    }

    .pdf-link {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      background: #0b2b3b;
      color: white;
      padding: 1rem 2.2rem;
      border-radius: 60px;
      font-size: 1.2rem;
      font-weight: 500;
      text-decoration: none;
      box-shadow: 0 10px 20px -8px rgba(11, 43, 59, 0.3);
      transition: all 0.25s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
      letter-spacing: 0.01em;
      margin-top: 0.6rem;
    }

    .pdf-link:hover {
      background: #1a4055;
      transform: scale(1.02);
      box-shadow: 0 18px 28px -10px rgba(11, 43, 59, 0.4);
      border-color: rgba(255, 255, 255, 0.25);
    }

    .pdf-link:active {
      transform: scale(0.97);
      background: #08212e;
    }

    .pdf-link svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
      flex-shrink: 0;
    }

    .footnote {
      margin-top: 3rem;
      font-size: 0.9rem;
      color: #4a6b7c;
      opacity: 0.7;
      letter-spacing: 0.02em;
      border-top: 1px solid rgba(44, 76, 94, 0.08);
      padding-top: 2rem;
      display: flex;
      justify-content: center;
      gap: 0.3rem;
      flex-wrap: wrap;
    }

    .footnote span {
      background: rgba(255, 255, 255, 0.3);
      padding: 0.2rem 0.8rem;
      border-radius: 40px;
      font-size: 0.8rem;
      backdrop-filter: blur(2px);
    }

    /* responsive */
    @media (max-width: 550px) {
      .card {
        padding: 2.5rem 1.8rem;
        border-radius: 2.5rem;
      }
      h1 {
        font-size: 3.6rem;
      }
      .pdf-link {
        font-size: 1rem;
        padding: 0.8rem 1.6rem;
        gap: 0.5rem;
        width: 100%;
        justify-content: center;
      }
      .subhead {
        font-size: 1rem;
        margin-bottom: 2rem;
        padding-bottom: 1.2rem;
      }
    }

    @media (max-width: 400px) {
      h1 {
        font-size: 2.8rem;
      }
      .card {
        padding: 2rem 1.2rem;
      }
      .pdf-link svg {
        width: 20px;
        height: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Coming soon</h1>
    <div class="subhead">✨ we're almost there</div>

    <!-- PDF link -->
    <a 
      href="https://item1000-collab.github.io/ai/engoo/20260627-its-w-life/bedford-falls-decoded.pdf" 
      class="pdf-link"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Download or view Bedford Falls Decoded PDF"
    >
      <!-- simple PDF icon (inline svg) -->
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
        <polyline points="14 2 14 8 20 8" />
        <line x1="16" y1="13" x2="8" y2="13" />
        <line x1="16" y1="17" x2="8" y2="17" />
        <polyline points="10 9 9 9 8 9" />
      </svg>
      <span>bedford-falls-decoded.pdf</span>
    </a>

    <div class="footnote">
      <span>🔗 direct link</span>
      <span>📄 PDF</span>
      <span>⚡ 2026</span>
    </div>
  </div>
</body>
</html>
