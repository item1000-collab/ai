<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen · Technical links</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fc;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .card {
            max-width: 720px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 20px 40px -12px rgba(0, 20, 30, 0.25);
            padding: 2.5rem 2rem;
            transition: box-shadow 0.2s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #eef2f6;
            padding-bottom: 1.25rem;
        }

        .title-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .title-group h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #0b1a2b;
        }

        .badge {
            background: #eef3fa;
            padding: 0.3rem 0.9rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #1f3a57;
            border: 1px solid #d5dfe9;
        }

        .lang-toggle {
            display: flex;
            gap: 0.5rem;
            background: #f0f4fa;
            padding: 0.35rem;
            border-radius: 60px;
            border: 1px solid #dde4ed;
        }

        .lang-btn {
            background: transparent;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            color: #1e3b54;
            cursor: pointer;
            transition: 0.15s;
            letter-spacing: 0.3px;
        }

        .lang-btn.active {
            background: #ffffff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            color: #0b1a2b;
            font-weight: 600;
            border: 1px solid #cbd7e6;
        }

        .lang-btn:hover:not(.active) {
            background: #e3eaf3;
        }

        .auth-notice {
            background: #f0f5fe;
            padding: 0.9rem 1.2rem;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: #004080;
            border: 1px solid #ccddf5;
            margin-bottom: 2rem;
            width: 100%;
        }

        .auth-notice svg {
            flex-shrink: 0;
        }

        .link-section {
            margin-top: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .link-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: #fafcff;
            border: 1px solid #e6edf6;
            border-radius: 1.2rem;
            padding: 1rem 1.5rem;
            transition: 0.15s;
            text-decoration: none;
            color: #0c1e30;
        }

        .link-item:hover {
            background: #f2f8ff;
            border-color: #b3cef0;
            box-shadow: 0 4px 10px -6px rgba(0, 70, 150, 0.15);
        }

        .link-icon {
            background: #e3ebf5;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1f4a7a;
            font-weight: 600;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .link-content {
            flex: 1;
        }

        .link-title {
            font-weight: 600;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .link-domain {
            font-size: 0.75rem;
            font-weight: 400;
            background: #eef3f9;
            padding: 0.15rem 0.7rem;
            border-radius: 30px;
            color: #2d4b6e;
        }

        .link-url {
            font-size: 0.8rem;
            color: #3f5f81;
            word-break: break-all;
            margin-top: 0.25rem;
            opacity: 0.75;
            font-family: 'SF Mono', 'Menlo', monospace;
        }

        .link-arrow {
            color: #7d98b8;
            font-size: 1.3rem;
            margin-left: 0.2rem;
        }

        .footer-meta {
            margin-top: 2.5rem;
            font-size: 0.8rem;
            color: #637d9e;
            border-top: 1px solid #e6edf6;
            padding-top: 1.5rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .footer-meta span {
            background: #f2f6fc;
            padding: 0.2rem 1rem;
            border-radius: 30px;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #2b8c5e;
            border-radius: 10px;
            margin-right: 6px;
        }

        @media (max-width: 500px) {
            .card { padding: 1.5rem; }
            .header { flex-direction: column; align-items: flex-start; }
            .title-group h1 { font-size: 1.5rem; }
            .link-item { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
<div class="card" id="app">
    <!-- header with language toggle -->
    <div class="header">
        <div class="title-group">
            <h1 id="pageTitle">🔗 Zen·links</h1>
            <span class="badge">technical</span>
        </div>
        <div class="lang-toggle" role="group" aria-label="Language toggle">
            <button class="lang-btn active" data-lang="en" id="langEn">EN</button>
            <button class="lang-btn" data-lang="ru" id="langRu">RU</button>
        </div>
    </div>

    <!-- Authorization notice (dynamic) -->
    <div class="auth-notice" id="authNotice">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0110 0v4"></path>
        </svg>
        <span id="authMessage">🔐 Links are available only after authorization</span>
    </div>

    <!-- link list -->
    <div class="link-section">
        <!-- Yandex Webmaster -->
        <a href="https://webmaster.yandex.ru/site/https:item1000-collab.github.io:443/dashboard/" 
           target="_blank" 
           rel="noopener noreferrer" 
           class="link-item" 
           id="mainLink">
            <div class="link-icon">Я</div>
            <div class="link-content">
                <div class="link-title">
                    <span id="linkName">Yandex Webmaster</span>
                    <span class="link-domain">dashboard</span>
                </div>
                <div class="link-url" id="linkUrlDisplay">webmaster.yandex.ru/site/https:item1000-collab.github.io:443/dashboard/</div>
            </div>
            <div class="link-arrow">↗</div>
        </a>

        <!-- Yandex Metrika (new) -->
        <a href="https://metrika.yandex.ru/" 
           target="_blank" 
           rel="noopener noreferrer" 
           class="link-item" 
           id="metrikaLink">
            <div class="link-icon">📊</div>
            <div class="link-content">
                <div class="link-title">
                    <span id="metrikaName">Yandex Metrika</span>
                    <span class="link-domain">analytics</span>
                </div>
                <div class="link-url" id="metrikaUrlDisplay">metrika.yandex.ru</div>
            </div>
            <div class="link-arrow">↗</div>
        </a>

        <!-- placeholder note -->
        <div style="opacity: 0.6; font-size: 0.85rem; padding-left: 0.5rem; color: #5b7492;" id="extraNote">
            ⚡ more technical services will appear here
        </div>
    </div>

    <!-- footer with status -->
    <div class="footer-meta">
        <span><span class="status-dot"></span> <span id="statusLabel">service · active</span></span>
        <span id="versionInfo">v1.0 · zen tools</span>
    </div>
</div>

<script>
    (function() {
        // ----- i18n strings -------------------------------------------------
        const translations = {
            en: {
                pageTitle: '🔗 Zen·links',
                authMessage: '🔐 Links are available only after authorization',
                linkName: 'Yandex Webmaster',
                linkUrl: 'webmaster.yandex.ru/site/https:item1000-collab.github.io:443/dashboard/',
                metrikaName: 'Yandex Metrika',
                metrikaUrl: 'metrika.yandex.ru',
                extraNote: '⚡ more technical services will appear here',
                statusLabel: 'service · active',
                version: 'v1.0 · zen tools'
            },
            ru: {
                pageTitle: '🔗 Дзен·ссылки',
                authMessage: '🔐 Ссылки доступны только после авторизации',
                linkName: 'Яндекс Вебмастер',
                linkUrl: 'webmaster.yandex.ru/site/https:item1000-collab.github.io:443/dashboard/',
                metrikaName: 'Яндекс Метрика',
                metrikaUrl: 'metrika.yandex.ru',
                extraNote: '⚡ здесь появятся другие технические сервисы',
                statusLabel: 'сервис · активен',
                version: 'v1.0 · инструменты дзена'
            }
        };

        // DOM refs
        const titleEl = document.getElementById('pageTitle');
        const authMsgEl = document.getElementById('authMessage');
        const linkNameEl = document.getElementById('linkName');
        const linkUrlDisplay = document.getElementById('linkUrlDisplay');
        const metrikaNameEl = document.getElementById('metrikaName');
        const metrikaUrlDisplay = document.getElementById('metrikaUrlDisplay');
        const extraNoteEl = document.getElementById('extraNote');
        const statusLabelEl = document.getElementById('statusLabel');
        const versionInfoEl = document.getElementById('versionInfo');

        const langEnBtn = document.getElementById('langEn');
        const langRuBtn = document.getElementById('langRu');

        let currentLang = 'en';

        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang] || translations.en;

            titleEl.textContent = t.pageTitle;
            authMsgEl.textContent = t.authMessage;
            linkNameEl.textContent = t.linkName;
            linkUrlDisplay.textContent = t.linkUrl;
            metrikaNameEl.textContent = t.metrikaName;
            metrikaUrlDisplay.textContent = t.metrikaUrl;
            extraNoteEl.textContent = t.extraNote;
            statusLabelEl.textContent = t.statusLabel;
            versionInfoEl.textContent = t.version;

            langEnBtn.classList.toggle('active', lang === 'en');
            langRuBtn.classList.toggle('active', lang === 'ru');

            document.documentElement.lang = lang;
        }

        langEnBtn.addEventListener('click', function(e) {
            e.preventDefault();
            setLanguage('en');
        });

        langRuBtn.addEventListener('click', function(e) {
            e.preventDefault();
            setLanguage('ru');
        });

        setLanguage('en');
        console.log('🔐 Zen technical links · language: ' + currentLang);
    })();
</script>

</body>
</html>
