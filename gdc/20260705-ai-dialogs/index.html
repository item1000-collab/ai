<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dialogues · 2026-07-05</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0ede8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }
        .card {
            max-width: 600px;
            width: 100%;
            background: #ffffff;
            border-radius: 2.5rem;
            box-shadow: 0 20px 50px -16px rgba(0,0,0,0.2), 0 8px 24px -8px rgba(0,0,0,0.1);
            padding: 2.8rem 2.5rem 3rem;
            transition: all 0.2s ease;
        }
        .badge {
            display: inline-block;
            background: #eae5de;
            color: #4b3e31;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            padding: 0.25rem 1rem;
            border-radius: 40px;
            text-transform: uppercase;
            margin-bottom: 1.2rem;
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            color: #1e1b1a;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 0.4rem;
        }
        .subtitle {
            font-size: 1rem;
            color: #6b6560;
            margin-bottom: 2.2rem;
            border-bottom: 2px solid #f0ede8;
            padding-bottom: 1.2rem;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .link-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: #faf9f7;
            border-radius: 1.2rem;
            padding: 1rem 1.5rem;
            text-decoration: none;
            color: #1e1b1a;
            border: 1.5px solid transparent;
            transition: all 0.2s ease;
        }
        .link-item:hover {
            background: #f6f3ef;
            border-color: #d6d0c8;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px -8px rgba(0,0,0,0.12);
        }
        .link-item:active {
            transform: translateY(0px);
        }
        .link-icon {
            font-size: 1.6rem;
            flex-shrink: 0;
            width: 2.8rem;
            height: 2.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #eae5de;
            border-radius: 1rem;
            color: #3b322b;
        }
        .link-content {
            flex: 1;
        }
        .link-title {
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: -0.01em;
            margin-bottom: 0.1rem;
        }
        .link-desc {
            font-size: 0.85rem;
            color: #6b6560;
        }
        .link-arrow {
            font-size: 1.2rem;
            color: #8a847e;
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }
        .link-item:hover .link-arrow {
            transform: translateX(4px);
            color: #3b322b;
        }
        .footer-note {
            margin-top: 2.2rem;
            padding-top: 1.2rem;
            border-top: 2px solid #f0ede8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: #8a847e;
        }
        .footer-note span:last-child {
            background: #f0ede8;
            padding: 0.15rem 1rem;
            border-radius: 30px;
            font-weight: 500;
            color: #5b5550;
        }
        @media (max-width: 480px) {
            .card {
                padding: 2rem 1.5rem;
            }
            h1 {
                font-size: 1.6rem;
            }
            .link-item {
                padding: 0.8rem 1.2rem;
                flex-wrap: wrap;
            }
            .link-icon {
                width: 2.4rem;
                height: 2.4rem;
                font-size: 1.3rem;
            }
            .link-title {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="badge">📅 2026-07-05</span>
        <h1>AI Dialogues</h1>
        <div class="subtitle">Two conversation transcripts · Miles &amp; Copilot</div>

        <div class="links">
            <a href="https://item1000-collab.github.io/ai/gdc/20260705-ai-dialogs/dialog-1.html" class="link-item" target="_blank" rel="noopener noreferrer">
                <span class="link-icon">🎙️</span>
                <span class="link-content">
                    <span class="link-title">Dialog 1</span>
                    <span class="link-desc">Headmaster Miles grills Copilot · strict school &amp; Waldorf</span>
                </span>
                <span class="link-arrow">→</span>
            </a>

            <a href="https://item1000-collab.github.io/ai/gdc/20260705-ai-dialogs/dialog-2.html" class="link-item" target="_blank" rel="noopener noreferrer">
                <span class="link-icon">🧠</span>
                <span class="link-content">
                    <span class="link-title">Dialog 2</span>
                    <span class="link-desc">Gemini, Anatoli &amp; Miles · North Korea, cars, Buddha</span>
                </span>
                <span class="link-arrow">→</span>
            </a>
        </div>

        <div class="footer-note">
            <span>🔊 AudioConvert.ai</span>
            <span>2 transcripts</span>
        </div>
    </div>
</body>
</html>
