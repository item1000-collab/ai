<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Global Distance Club · Compact Grid</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #050a14;
      overflow-x: hidden;
      color: #eef5ff;
    }

    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: radial-gradient(circle at 25% 15%, #0a1222, #020510);
    }

    .bg-gradient::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle, rgba(20, 60, 120, 0.2) 0%, rgba(0, 0, 0, 0) 75%);
      animation: slowDriftNavy 28s infinite alternate;
      pointer-events: none;
    }

    @keyframes slowDriftNavy {
      0% { transform: translate(0%, 0%) rotate(0deg); opacity: 0.4; }
      100% { transform: translate(5%, 3%) rotate(3deg); opacity: 0.8; }
    }

    .main-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(0.5px);
      padding: 0.25rem 0.5rem 1rem 0.5rem;
    }

    /* TOP BAR — emblem and globe perfectly centered on one line */
    .top-bar {
      width: 100%;
      padding: 0.2rem 1rem 0.1rem 1rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .top-bar-content {
      max-width: 1600px;
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;    /* <— CENTERED HORIZONTALLY */
      align-items: center;
      gap: 0.5rem 1.5rem;         /* comfortable gap between items */
      background: rgba(5, 12, 24, 0.3);
      backdrop-filter: blur(10px);
      border-radius: 48px;
      padding: 0.45rem 1.5rem;
      border: none;
      box-shadow: none;
    }

    /* Left: emblem + title — now flexible and centered */
    .emblem-title-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.1rem;
      flex: 0 1 auto;           /* auto width, shrink if needed */
      min-width: 120px;
    }

    .emblem-image {
      max-width: 160px;
      width: 100%;
      height: auto;
      min-width: 100px;
      filter: drop-shadow(0 0 12px rgba(30, 100, 200, 0.5)) drop-shadow(0 4px 12px rgba(0,0,0,0.4));
      transition: transform 0.25s ease;
    }

    .emblem-image:hover {
      transform: scale(1.03);
      filter: drop-shadow(0 0 22px rgba(50, 140, 255, 0.8));
    }

    .integrated-club-name {
      font-size: clamp(0.65rem, 1.6vw, 1rem);
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #ffffff, #b3d4ff, #3a7bd5, #7dafff, #ffffff);
      background-size: 280% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-transform: uppercase;
      text-align: center;
      padding: 0 0.1rem;
      text-shadow: 0 0 4px rgba(30, 100, 210, 0.2);
      animation: metallicShineNavy 12s linear infinite;
      line-height: 1.1;
    }

    @keyframes metallicShineNavy {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Center: members image (visual connector) */
    .members-container {
      flex: 0 1 auto;
      display: flex;
      justify-content: center;
      align-items: center;
      min-width: 80px;
      position: relative;
    }

    .members-wrapper {
      position: relative;
      display: inline-block;
      line-height: 0;
    }

    .members-image {
      max-width: 140px;
      width: 100%;
      height: auto;
      border-radius: 20px;
      filter: drop-shadow(0 0 10px rgba(40, 120, 230, 0.4));
      transition: all 0.2s ease;
      cursor: pointer;
      display: block;
    }

    .members-image:hover {
      transform: scale(1.02);
      filter: drop-shadow(0 0 20px rgba(50, 150, 255, 0.7));
    }

    .overlay-text-on-image {
      position: absolute;
      bottom: 6%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-weight: 700;
      letter-spacing: 1.2px;
      font-size: 0.5rem;
      color: #eef5ff;
      text-transform: uppercase;
      background: transparent;
      padding: 0.1rem 0.2rem;
      white-space: nowrap;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.7), 0 0 6px rgba(0, 0, 0, 0.4);
      pointer-events: none;
      width: auto;
      max-width: 90%;
    }

    @media (max-width: 600px) {
      .overlay-text-on-image {
        font-size: 0.4rem;
        letter-spacing: 0.8px;
        bottom: 5%;
      }
    }

    /* Right: globe — symmetric with emblem */
    .globe-wrapper {
      flex: 0 1 auto;
      display: flex;
      justify-content: center;
      align-items: center;
      min-width: 70px;
      max-width: 140px;
      width: auto;
      height: auto;
      position: relative;
    }

    .globe-wrapper canvas {
      display: block;
      width: 100% !important;
      height: auto !important;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(30, 100, 210, 0.4), 0 0 8px rgba(0, 180, 255, 0.2);
      transition: all 0.2s ease;
      object-fit: cover;
      background: radial-gradient(circle at 30% 30%, rgba(25, 65, 130, 0.2), rgba(0, 0, 0, 0.1));
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 0.2rem 0.5rem 0.5rem;
    }

    .links-section {
      background: rgba(4, 12, 26, 0.4);
      backdrop-filter: blur(10px);
      border-radius: 40px;
      padding: 1rem 1.2rem;
      width: 98%;
      max-width: 1500px;
      margin: 0.1rem auto 0;
      border: none;
      box-shadow: none;
    }

    /* COMPACT GRID — more columns on wide screens */
    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
      justify-content: center;
    }

    @media (min-width: 1600px) {
      .links-grid {
        grid-template-columns: repeat(5, 1fr);
      }
    }
    @media (min-width: 1200px) and (max-width: 1599px) {
      .links-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
    @media (min-width: 860px) and (max-width: 1199px) {
      .links-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    @media (min-width: 540px) and (max-width: 859px) {
      .links-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (max-width: 539px) {
      .links-grid {
        grid-template-columns: 1fr;
        gap: 0.8rem;
      }
    }

    .link-card {
      background: linear-gradient(145deg, #0f1a32cc, #060c1acc);
      backdrop-filter: blur(4px);
      border-radius: 20px;
      padding: 0.9rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      text-decoration: none;
      transition: all 0.25s ease;
      border: 1px solid rgba(70, 130, 230, 0.25);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25);
      height: 100%;
      min-height: 150px;
    }

    .link-card:hover {
      transform: translateY(-4px);
      background: linear-gradient(145deg, #16244ccc, #0a122ecc);
      border-color: rgba(90, 158, 255, 0.6);
      box-shadow: 0 14px 24px -8px #001e55;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      border-bottom: 1px solid rgba(90, 158, 255, 0.2);
      padding-bottom: 0.4rem;
    }

    .card-header i {
      font-size: 1.4rem;
      filter: drop-shadow(0 0 4px #2f7eff);
      color: #7db0ff;
      width: 1.6rem;
    }

    .card-title {
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: -0.2px;
      color: #ecf5ff;
      line-height: 1.2;
    }

    .card-description {
      font-size: 0.75rem;
      color: #bdd4ff;
      line-height: 1.3;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      flex-wrap: wrap;
    }

    .card-description i {
      font-size: 0.7rem;
      color: #5d9eff;
    }

    .card-date {
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.7rem;
      font-weight: 500;
      color: #aac9ff;
      background: rgba(0, 8, 20, 0.4);
      padding: 0.25rem 0.6rem;
      border-radius: 30px;
      width: fit-content;
      backdrop-filter: blur(2px);
    }

    .card-date i {
      font-size: 0.65rem;
      color: #5d9eff;
    }

    /* responsive top bar — keep centered */
    @media (max-width: 1000px) {
      .top-bar-content {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        padding: 0.4rem 1rem;
        gap: 0.3rem 1rem;
      }
      .emblem-title-wrapper {
        flex: 0 1 auto;
        min-width: 120px;
      }
      .members-container {
        flex: 0 1 auto;
        min-width: 70px;
      }
      .globe-wrapper {
        flex: 0 1 auto;
        max-width: 110px;
        min-width: 60px;
      }
      .emblem-image {
        max-width: 130px;
        min-width: 80px;
      }
      .members-image {
        max-width: 110px;
      }
    }

    @media (max-width: 680px) {
      .top-bar-content {
        padding: 0.3rem 0.8rem;
        gap: 0.2rem 0.8rem;
      }
      .emblem-image {
        max-width: 100px;
        min-width: 70px;
      }
      .members-image {
        max-width: 90px;
      }
      .globe-wrapper {
        max-width: 80px;
        min-width: 50px;
      }
      .integrated-club-name {
        font-size: 0.6rem;
        letter-spacing: 1.2px;
      }
      .links-section {
        padding: 0.8rem 0.6rem;
        width: 100%;
        border-radius: 28px;
      }
      .link-card {
        min-height: 130px;
        padding: 0.7rem 0.8rem;
      }
      .card-title {
        font-size: 0.85rem;
      }
      .card-header i {
        font-size: 1.2rem;
      }
    }

    @media (max-width: 480px) {
      .top-bar {
        padding: 0.1rem 0.3rem;
      }
      .top-bar-content {
        padding: 0.2rem 0.4rem;
        border-radius: 32px;
        gap: 0.2rem 0.6rem;
      }
      .emblem-image {
        max-width: 80px;
        min-width: 60px;
      }
      .members-image {
        max-width: 70px;
      }
      .globe-wrapper {
        max-width: 65px;
        min-width: 40px;
      }
      .integrated-club-name {
        font-size: 0.5rem;
        letter-spacing: 0.8px;
      }
      .overlay-text-on-image {
        font-size: 0.35rem;
        letter-spacing: 0.4px;
        bottom: 4%;
      }
      .link-card {
        min-height: 110px;
        padding: 0.5rem 0.6rem;
        border-radius: 16px;
      }
      .card-title {
        font-size: 0.75rem;
      }
      .card-header i {
        font-size: 1rem;
        width: 1.2rem;
      }
      .card-description {
        font-size: 0.65rem;
      }
      .card-date {
        font-size: 0.6rem;
        padding: 0.15rem 0.4rem;
      }
    }
  </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="main-wrapper">
  <div class="top-bar">
    <div class="top-bar-content">
      <!-- Left: emblem + title -->
      <div class="emblem-title-wrapper">
        <img class="emblem-image" 
             src="https://item1000-collab.github.io/ai/gdc/emblem.jpeg" 
             alt="Global Distance Club Emblem">
        <div class="integrated-club-name">GLOBAL DISTANCE CLUB</div>
      </div>
      
      <!-- Center: members image (visual bridge) -->
      <div class="members-container">
        <div class="members-wrapper">
          <img class="members-image" 
               src="https://item1000-collab.github.io/ai/gdc/members.webp" 
               alt="Members"
               onerror="this.style.display='none'">
          <div class="overlay-text-on-image">
            <i class="fas fa-link" style="font-size: 0.45rem; margin-right: 3px;"></i> NETWORK <i class="fas fa-link" style="font-size: 0.45rem; margin-left: 3px;"></i>
          </div>
        </div>
      </div>
      
      <!-- Right: globe — symmetric with emblem -->
      <div class="globe-wrapper">
        <canvas id="globeCanvas"></canvas>
      </div>
    </div>
  </div>

  <div class="hero">
    <div class="links-section">
      <div class="links-grid" id="linksGridContainer">
        <!-- cards injected via JS -->
      </div>
    </div>
  </div>

  <script>
    // fallback for members image
    document.querySelector('.members-image')?.addEventListener('error', function(e) {
      this.style.display = 'none';
      const wrapper = this.closest('.members-wrapper');
      if (wrapper) {
        const fallback = document.createElement('div');
        fallback.style.cssText = 'background: rgba(0,0,0,0.3); border-radius: 16px; padding: 0.4rem 0.8rem; font-size: 0.6rem; color: #aac9ff;';
        fallback.innerHTML = '<i class="fas fa-users"></i> MEMBERS';
        wrapper.appendChild(fallback);
      }
    });
  </script>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    const canvas = document.getElementById('globeCanvas');
    const container = document.querySelector('.globe-wrapper');
    
    function resizeGlobe() {
      if (!container || !canvas) return;
      let w = container.clientWidth;
      let size = Math.min(w, 140, window.innerWidth * 0.18);
      size = Math.max(size, 50);
      canvas.style.width = `${size}px`;
      canvas.style.height = `${size}px`;
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const rw = Math.floor(size * dpr);
      const rh = Math.floor(size * dpr);
      canvas.width = rw;
      canvas.height = rh;
      if (renderer) {
        renderer.setSize(rw, rh, false);
        camera.aspect = 1;
        camera.updateProjectionMatrix();
      }
    }

    const scene = new THREE.Scene();
    scene.background = null;
    const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 1000);
    camera.position.set(0, 0, 3.45);
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
    renderer.setClearColor(0x000000, 0);

    const ambient = new THREE.AmbientLight(0x14223b);
    scene.add(ambient);
    const main = new THREE.DirectionalLight(0xd0e4ff, 1.2);
    main.position.set(4, 5, 3);
    scene.add(main);
    const back = new THREE.PointLight(0x3a7bd5, 0.6);
    back.position.set(-2, 1.5, -3.5);
    scene.add(back);
    const rim = new THREE.PointLight(0x5a9eff, 0.5);
    rim.position.set(1.8, 1.2, -2.8);
    scene.add(rim);
    const fill = new THREE.PointLight(0x2c5aa6, 0.4);
    fill.position.set(2.2, 0.5, 2.2);
    scene.add(fill);

    const loader = new THREE.TextureLoader();
    const earthMap = loader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
    const earthSpec = loader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');
    const earthNormal = loader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');
    const cloudMap = loader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png');

    const earth = new THREE.Mesh(
      new THREE.SphereGeometry(1, 96, 96),
      new THREE.MeshPhongMaterial({ map: earthMap, specularMap: earthSpec, specular: new THREE.Color(0x335588), shininess: 8, normalMap: earthNormal, emissive: 0x030a18, emissiveIntensity: 0.08 })
    );
    scene.add(earth);

    const clouds = new THREE.Mesh(
      new THREE.SphereGeometry(1.01, 96, 96),
      new THREE.MeshPhongMaterial({ map: cloudMap, transparent: true, opacity: 0.18, blending: THREE.AdditiveBlending })
    );
    scene.add(clouds);

    // stars
    const starsGeo = new THREE.BufferGeometry();
    const pos = new Float32Array(1200 * 3);
    for (let i = 0; i < 1200; i++) {
      pos[i*3] = (Math.random() - 0.5) * 200;
      pos[i*3+1] = (Math.random() - 0.5) * 140;
      pos[i*3+2] = (Math.random() - 0.5) * 80 - 30;
    }
    starsGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const stars = new THREE.Points(starsGeo, new THREE.PointsMaterial({ color: 0xcceeff, size: 0.07, transparent: true, opacity: 0.6 }));
    scene.add(stars);

    const starsGeo2 = new THREE.BufferGeometry();
    const pos2 = new Float32Array(800 * 3);
    for (let i = 0; i < 800; i++) {
      pos2[i*3] = (Math.random() - 0.5) * 300;
      pos2[i*3+1] = (Math.random() - 0.5) * 200;
      pos2[i*3+2] = (Math.random() - 0.5) * 120 - 40;
    }
    starsGeo2.setAttribute('position', new THREE.BufferAttribute(pos2, 3));
    const stars2 = new THREE.Points(starsGeo2, new THREE.PointsMaterial({ color: 0xaacdff, size: 0.05, transparent: true, opacity: 0.5 }));
    scene.add(stars2);

    let speed = 0.002;
    function anim() {
      earth.rotation.y += speed;
      clouds.rotation.y += speed * 1.15;
      stars.rotation.y += 0.0001;
      stars2.rotation.x += 0.00008;
      requestAnimationFrame(anim);
    }
    anim();

    function renderLoop() {
      if (renderer && scene && camera) renderer.render(scene, camera);
      requestAnimationFrame(renderLoop);
    }
    renderLoop();

    window.addEventListener('resize', resizeGlobe);
    if (window.ResizeObserver) {
      const ro = new ResizeObserver(() => resizeGlobe());
      ro.observe(container);
    }
    setTimeout(resizeGlobe, 20);
    setTimeout(resizeGlobe, 100);
    window.addEventListener('load', resizeGlobe);
    resizeGlobe();

    // ---------- LINKS (chronological) ----------
    const linksData = [
      {
        url: "https://item1000-collab.github.io/ai/gdc/20210108-gdc-30/index.html",
        icon: "fas fa-globe",
        title: "GDC 30",
        description: '<i class="fas fa-calendar-alt"></i> <span>Anniversary · Foundations</span>',
        dateLabel: "Jan 8, 2021",
        dateObj: new Date(2021, 0, 8)
      },
      {
        url: "https://item1000-collab.github.io/ai/gdc/20211111-gdc-ce2/index.html",
        icon: "fas fa-network-wired",
        title: "GDC SE2",
        description: '<i class="fas fa-map-marked-alt"></i> <span>Virtual Brazil Journey</span>',
        dateLabel: "Nov 11, 2021",
        dateObj: new Date(2021, 10, 11)
      },
      {
        url: "https://item1000-collab.github.io/ai/gdc/20260525-elvis/index.html",
        icon: "fas fa-star-of-life",
        title: "Elvis Edition",
        description: '<i class="fas fa-microphone"></i> <span>Tribute · Rock \'n\' Roll</span>',
        dateLabel: "May 31, 2026",
        dateObj: new Date(2026, 4, 31)
      },
      {
        url: "https://item1000-collab.github.io/ai/gdc/20260606-maya-singing/index.html",
        icon: "fas fa-microphone-alt",
        title: "Maya Sings",
        description: '<i class="fas fa-music"></i> <span>Voice fitness · Acapella</span>',
        dateLabel: "Jun 06, 2026",
        dateObj: new Date(2026, 5, 6)
      },
      {
        url: "https://item1000-collab.github.io/ai/gdc/20260607-miles-showmaster/index.html",
        icon: "fas fa-chalkboard-user",
        title: "Miles Showmaster",
        description: '<i class="fas fa-theater-masks"></i> <span>Showcraft · Masterclass</span>',
        dateLabel: "Jun 07, 2026",
        dateObj: new Date(2026, 5, 7)
      },
      {
        url: "https://item1000-collab.github.io/ai/gdc/20260704-ai-dialogs/index.html",
        icon: "fas fa-robot",
        title: "AI Dialogues · Jul 4",
        description: '<i class="fas fa-comment-dots"></i> <span>Miles · Copilot · Gemini</span>',
        dateLabel: "Jul 04, 2026",
        dateObj: new Date(2026, 6, 4)
      },
      {
        url: "https://item1000-collab.github.io/ai/gdc/20260705-ai-dialogs/index.html",
        icon: "fas fa-robot",
        title: "AI Dialogues",
        description: '<i class="fas fa-comment-dots"></i> <span>Conversational transcripts</span>',
        dateLabel: "Jul 05, 2026",
        dateObj: new Date(2026, 6, 5)
      },
      // NEW LINK: AI Singing Attempts
      {
        url: "https://item1000-collab.github.io/ai/gdc/20260718-AI-singing-attemps/index.html",
        icon: "fas fa-music",
        title: "AI Singing Attempts",
        description: '<i class="fas fa-headphones"></i> <span>Vocal experiments · AI</span>',
        dateLabel: "Jul 18, 2026",
        dateObj: new Date(2026, 6, 18)
      }
    ];

    const sorted = [...linksData].sort((a, b) => a.dateObj - b.dateObj);

    function buildCard(link) {
      const a = document.createElement('a');
      a.href = link.url;
      a.className = 'link-card';
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.innerHTML = `
        <div class="card-header">
          <i class="${link.icon}"></i>
          <span class="card-title">${link.title}</span>
        </div>
        <div class="card-description">${link.description}</div>
        <div class="card-date"><i class="far fa-calendar-check"></i> ${link.dateLabel}</div>
      `;
      return a;
    }

    const grid = document.getElementById('linksGridContainer');
    if (grid) {
      grid.innerHTML = '';
      sorted.forEach(link => grid.appendChild(buildCard(link)));
    }
  </script>
