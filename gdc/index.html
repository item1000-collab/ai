<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Global Distance Club | Deep Navy • Chronological Links</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #050a14;
      overflow-x: hidden;
      color: #eef5ff;
    }

    html, body {
      margin: 0;
      padding: 0;
    }

    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: radial-gradient(circle at 25% 15%, #0a1222, #020510);
    }

    .bg-gradient::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle, rgba(20, 60, 120, 0.2) 0%, rgba(0, 0, 0, 0) 75%);
      animation: slowDriftNavy 28s infinite alternate;
      pointer-events: none;
    }

    @keyframes slowDriftNavy {
      0% { transform: translate(0%, 0%) rotate(0deg); opacity: 0.4; }
      100% { transform: translate(5%, 3%) rotate(3deg); opacity: 0.8; }
    }

    .main-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(0.5px);
      padding-top: 0;
    }

    .top-bar {
      width: 100%;
      padding: 0.5rem 3rem 0.2rem 3rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .top-bar-content {
      max-width: 1500px;
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 2rem;
      background: rgba(5, 12, 24, 0.4);
      backdrop-filter: blur(12px);
      border-radius: 48px;
      padding: 1rem 2rem;
      border: none;
      box-shadow: none;
    }

    .emblem-title-wrapper {
      flex: 1.2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      min-width: 280px;
      transition: all 0.2s;
    }

    .emblem-image {
      max-width: 400px;
      width: 100%;
      height: auto;
      min-width: 240px;
      filter: drop-shadow(0 0 18px rgba(30, 100, 200, 0.6)) drop-shadow(0 8px 20px rgba(0,0,0,0.5));
      transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    .emblem-image:hover {
      transform: scale(1.02);
      filter: drop-shadow(0 0 28px rgba(50, 140, 255, 0.9));
    }

    .integrated-club-name {
      font-size: clamp(0.9rem, 2.5vw, 1.4rem);
      font-weight: 700;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #ffffff, #b3d4ff, #3a7bd5, #7dafff, #ffffff);
      background-size: 280% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-transform: uppercase;
      text-align: center;
      margin-top: 0;
      padding: 0 0.25rem;
      text-shadow: 0 0 6px rgba(30, 100, 210, 0.3);
      animation: metallicShineNavy 12s linear infinite;
      line-height: 1.2;
    }

    @keyframes metallicShineNavy {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .members-container {
      flex: 0.8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-width: 200px;
      position: relative;
    }

    .members-wrapper {
      position: relative;
      display: inline-block;
      line-height: 0;
    }

    .members-image {
      max-width: 260px;
      width: 100%;
      height: auto;
      border-radius: 20px;
      filter: drop-shadow(0 0 15px rgba(40, 120, 230, 0.5));
      transition: all 0.3s ease;
      cursor: pointer;
      display: block;
    }

    .members-image:hover {
      transform: scale(1.02);
      filter: drop-shadow(0 0 25px rgba(50, 150, 255, 0.8));
    }

    .overlay-text-on-image {
      position: absolute;
      bottom: 9%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-weight: 700;
      letter-spacing: 2px;
      font-size: 0.78rem;
      color: #eef5ff;
      text-transform: uppercase;
      background: transparent;
      backdrop-filter: none;
      padding: 0.2rem 0.4rem;
      border-radius: 0;
      border: none;
      font-weight: 600;
      white-space: nowrap;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6), 0 0 6px rgba(0, 0, 0, 0.4);
      transition: all 0.2s ease;
      pointer-events: none;
      width: auto;
      max-width: 90%;
    }

    @media (max-width: 560px) {
      .overlay-text-on-image {
        font-size: 0.65rem;
        letter-spacing: 1.2px;
        white-space: normal;
        text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        bottom: 8%;
      }
    }

    .members-wrapper:hover .overlay-text-on-image {
      text-shadow: 0 1px 3px rgba(0,0,0,0.8), 0 0 12px rgba(70, 150, 255, 0.4);
      letter-spacing: 2.5px;
    }

    .globe-wrapper {
      flex: 0.6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-width: 140px;
      max-width: 280px;
      width: auto;
      height: auto;
      position: relative;
    }

    .globe-wrapper canvas {
      display: block;
      width: 100% !important;
      height: auto !important;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      box-shadow: 0 0 30px rgba(30, 100, 210, 0.5), 0 0 12px rgba(0, 180, 255, 0.3);
      transition: all 0.2s ease;
      object-fit: cover;
      background: radial-gradient(circle at 30% 30%, rgba(25, 65, 130, 0.25), rgba(0, 0, 0, 0.15));
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0.2rem 1.5rem 2rem;
      margin-top: 0;
    }

    .links-section {
      background: rgba(4, 12, 26, 0.5);
      backdrop-filter: blur(12px);
      border-radius: 48px;
      padding: 2rem 2rem;
      width: 94%;
      max-width: 1300px;
      margin: 0.15rem auto 0 auto;
      border: none;
      box-shadow: none;
    }

    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.8rem;
      justify-content: center;
    }

    .link-card {
      background: linear-gradient(145deg, #0f1a32cc, #060c1acc);
      backdrop-filter: blur(4px);
      border-radius: 28px;
      padding: 1.2rem 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      text-decoration: none;
      transition: all 0.3s ease;
      border: 1px solid rgba(70, 130, 230, 0.35);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      height: 100%;
      min-height: 180px;
    }

    .link-card:hover {
      transform: translateY(-5px);
      background: linear-gradient(145deg, #16244ccc, #0a122ecc);
      border-color: rgba(90, 158, 255, 0.7);
      box-shadow: 0 20px 30px -12px #001e55;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      border-bottom: 1px solid rgba(90, 158, 255, 0.3);
      padding-bottom: 0.6rem;
    }

    .card-header i {
      font-size: 2rem;
      filter: drop-shadow(0 0 6px #2f7eff);
      color: #7db0ff;
      width: 2rem;
    }

    .card-title {
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: -0.3px;
      color: #ecf5ff;
      line-height: 1.3;
    }

    .card-description {
      font-size: 0.9rem;
      color: #bdd4ff;
      line-height: 1.4;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .card-description i {
      font-size: 0.85rem;
      color: #5d9eff;
      filter: none;
    }

    .card-date {
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: #aac9ff;
      background: rgba(0, 8, 20, 0.5);
      padding: 0.4rem 0.8rem;
      border-radius: 40px;
      width: fit-content;
      backdrop-filter: blur(2px);
    }

    .card-date i {
      font-size: 0.8rem;
      color: #5d9eff;
    }

    @media (max-width: 750px) {
      .links-grid {
        grid-template-columns: 1fr;
        gap: 1.2rem;
      }
      .link-card {
        min-height: 160px;
      }
      .card-title {
        font-size: 1.1rem;
      }
    }

    @media (max-width: 1200px) {
      .top-bar {
        padding: 0.3rem 2rem 0.1rem 2rem;
      }
      .top-bar-content {
        padding: 0.8rem 1.8rem;
      }
      .members-container {
        order: 2;
      }
      .globe-wrapper {
        order: 3;
        max-width: 240px;
        justify-content: center;
      }
      .emblem-title-wrapper {
        flex: 1;
        min-width: 260px;
      }
      .emblem-image {
        max-width: 340px;
        min-width: 220px;
      }
      .integrated-club-name {
        font-size: 1.2rem;
        letter-spacing: 2.5px;
      }
      .links-section {
        padding: 1.5rem 1.8rem;
        margin-top: 0.1rem;
      }
    }

    @media (max-width: 1000px) {
      .top-bar {
        padding: 0.3rem 1.5rem 0.1rem 1.5rem;
      }
      .top-bar-content {
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 1rem;
      }
      .emblem-title-wrapper, .members-container, .globe-wrapper {
        justify-content: center;
        width: 100%;
      }
      .emblem-title-wrapper {
        margin-bottom: 0.2rem;
      }
      .members-container {
        margin: 0.2rem 0;
      }
      .emblem-image {
        max-width: 360px;
        min-width: 260px;
      }
      .members-image {
        max-width: 240px;
      }
      .globe-wrapper {
        max-width: 200px;
        margin-top: 0.1rem;
        justify-content: center;
      }
      .integrated-club-name {
        font-size: 1.15rem;
        letter-spacing: 2px;
      }
      .overlay-text-on-image {
        font-size: 0.72rem;
        bottom: 8%;
      }
      .links-section {
        margin-top: 0.1rem;
        padding: 1.3rem 1.2rem;
      }
    }

    @media (max-width: 680px) {
      .top-bar {
        padding: 0.2rem 1rem;
      }
      .top-bar-content {
        padding: 0.8rem;
      }
      .emblem-image {
        max-width: 280px;
        min-width: 200px;
      }
      .members-image {
        max-width: 200px;
      }
      .globe-wrapper {
        max-width: 170px;
      }
      .integrated-club-name {
        font-size: 1rem;
        letter-spacing: 2px;
      }
      .overlay-text-on-image {
        font-size: 0.62rem;
        letter-spacing: 1px;
        bottom: 7%;
      }
      .links-section {
        padding: 1rem 1rem;
        width: 96%;
      }
    }

    @media (max-width: 480px) {
      .top-bar {
        padding: 0.15rem 0.8rem;
      }
      .top-bar-content {
        padding: 0.6rem;
      }
      .emblem-image {
        max-width: 240px;
        min-width: 180px;
      }
      .members-image {
        max-width: 170px;
      }
      .globe-wrapper {
        max-width: 150px;
      }
      .integrated-club-name {
        font-size: 0.85rem;
        letter-spacing: 1.5px;
      }
      .overlay-text-on-image {
        font-size: 0.55rem;
        letter-spacing: 0.8px;
        bottom: 7%;
      }
      .card-header i {
        font-size: 1.6rem;
      }
      .card-title {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="main-wrapper">
  <div class="top-bar">
    <div class="top-bar-content">
      <div class="emblem-title-wrapper">
        <img class="emblem-image" 
             src="https://item1000-collab.github.io/ai/gdc/emblem.jpeg" 
             alt="Global Distance Club Emblem">
        <div class="integrated-club-name">GLOBAL DISTANCE CLUB</div>
      </div>
      
      <!-- members.webp asset with overlay -->
      <div class="members-container">
        <div class="members-wrapper" id="membersWrapper">
          <img class="members-image" 
               src="https://item1000-collab.github.io/ai/gdc/members.webp" 
               alt="Global Distance Club Members"
               onerror="handleImageError(this)">
          <div class="overlay-text-on-image">
            <i class="fas fa-link" style="font-size: 0.65rem; margin-right: 5px; text-shadow: 0 0 2px black;"></i> EXPLORE THE NETWORK <i class="fas fa-link" style="font-size: 0.65rem; margin-left: 5px; text-shadow: 0 0 2px black;"></i>
          </div>
        </div>
      </div>
      
      <div class="globe-wrapper">
        <canvas id="globeCanvas"></canvas>
      </div>
    </div>
  </div>

  <div class="hero">
    <div class="links-section">
      <div class="links-grid" id="linksGridContainer">
        <!-- Chronologically sorted cards injected via JS -->
      </div>
    </div>
  </div>

  <script>
    function handleImageError(imgElement) {
      const container = document.querySelector('.members-container');
      if (container && imgElement.parentNode) {
        const fallbackDiv = document.createElement('div');
        fallbackDiv.className = 'members-fallback';
        fallbackDiv.style.cssText = 'background: rgba(0,0,0,0.5); border-radius: 20px; padding: 1rem 2rem; text-align: center; backdrop-filter: blur(8px);';
        fallbackDiv.innerHTML = `
          <i class="fas fa-users" style="font-size: 2rem; color: #8bb9fe;"></i>
          <span style="display:block; font-weight:bold;">MEMBERS</span>
          <small style="color:#aac9ff;">Global Community</small>
        `;
        container.innerHTML = '';
        container.appendChild(fallbackDiv);
      }
    }
  </script>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    const canvas = document.getElementById('globeCanvas');
    const container = document.querySelector('.globe-wrapper');
    
    function resizeGlobeToPerfectCircle() {
      if (!container || !canvas) return;
      
      let containerWidth = container.clientWidth;
      let targetSize = Math.min(containerWidth, 280, window.innerWidth * 0.28);
      targetSize = Math.max(targetSize, 100);
      
      canvas.style.width = `${targetSize}px`;
      canvas.style.height = `${targetSize}px`;
      
      const dpr = window.devicePixelRatio || 1;
      const renderWidth = Math.floor(targetSize * dpr);
      const renderHeight = Math.floor(targetSize * dpr);
      
      canvas.width = renderWidth;
      canvas.height = renderHeight;
      
      if (renderer) {
        renderer.setSize(renderWidth, renderHeight, false);
        camera.aspect = 1;
        camera.updateProjectionMatrix();
      }
    }
    
    const scene = new THREE.Scene();
    scene.background = null;
    
    const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 1000);
    camera.position.set(0, 0, 3.45);
    
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
    renderer.setClearColor(0x000000, 0);
    
    const ambientLight = new THREE.AmbientLight(0x14223b);
    scene.add(ambientLight);
    const mainLight = new THREE.DirectionalLight(0xd0e4ff, 1.25);
    mainLight.position.set(4, 5, 3);
    scene.add(mainLight);
    const backLight = new THREE.PointLight(0x3a7bd5, 0.75);
    backLight.position.set(-2, 1.5, -3.5);
    scene.add(backLight);
    const rimLight = new THREE.PointLight(0x5a9eff, 0.65);
    rimLight.position.set(1.8, 1.2, -2.8);
    scene.add(rimLight);
    const fillCool = new THREE.PointLight(0x2c5aa6, 0.55);
    fillCool.position.set(2.2, 0.5, 2.2);
    scene.add(fillCool);
    const fillBottom = new THREE.PointLight(0x1e4a8a, 0.4);
    fillBottom.position.set(0, -1.2, 1);
    scene.add(fillBottom);
    
    const textureLoader = new THREE.TextureLoader();
    const earthMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
    const earthSpecularMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');
    const earthNormalMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');
    const cloudMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png');
    
    const earthGeometry = new THREE.SphereGeometry(1, 128, 128);
    const earthMaterial = new THREE.MeshPhongMaterial({
      map: earthMap,
      specularMap: earthSpecularMap,
      specular: new THREE.Color(0x335588),
      shininess: 8,
      normalMap: earthNormalMap,
      emissive: 0x030a18,
      emissiveIntensity: 0.1
    });
    const earthMesh = new THREE.Mesh(earthGeometry, earthMaterial);
    scene.add(earthMesh);
    
    const cloudGeometry = new THREE.SphereGeometry(1.012, 128, 128);
    const cloudMaterial = new THREE.MeshPhongMaterial({
      map: cloudMap,
      transparent: true,
      opacity: 0.2,
      blending: THREE.AdditiveBlending
    });
    const cloudMesh = new THREE.Mesh(cloudGeometry, cloudMaterial);
    scene.add(cloudMesh);
    
    const starGeometry = new THREE.BufferGeometry();
    const starPositions = new Float32Array(2200 * 3);
    for (let i = 0; i < 2200; i++) {
      starPositions[i*3] = (Math.random() - 0.5) * 280;
      starPositions[i*3+1] = (Math.random() - 0.5) * 180;
      starPositions[i*3+2] = (Math.random() - 0.5) * 100 - 45;
    }
    starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const stars = new THREE.Points(starGeometry, new THREE.PointsMaterial({ color: 0xcceeff, size: 0.09, transparent: true, opacity: 0.7 }));
    scene.add(stars);
    
    const starGeometry2 = new THREE.BufferGeometry();
    const starPositions2 = new Float32Array(1500 * 3);
    for (let i = 0; i < 1500; i++) {
      starPositions2[i*3] = (Math.random() - 0.5) * 400;
      starPositions2[i*3+1] = (Math.random() - 0.5) * 260;
      starPositions2[i*3+2] = (Math.random() - 0.5) * 160 - 75;
    }
    starGeometry2.setAttribute('position', new THREE.BufferAttribute(starPositions2, 3));
    const stars2 = new THREE.Points(starGeometry2, new THREE.PointsMaterial({ color: 0xaacdff, size: 0.07, transparent: true, opacity: 0.55 }));
    scene.add(stars2);
    
    const starGeometryDeep = new THREE.BufferGeometry();
    const deepStars = new Float32Array(1800 * 3);
    for (let i = 0; i < 1800; i++) {
      deepStars[i*3] = (Math.random() - 0.5) * 580;
      deepStars[i*3+1] = (Math.random() - 0.5) * 380;
      deepStars[i*3+2] = (Math.random() - 0.5) * 200 - 100;
    }
    starGeometryDeep.setAttribute('position', new THREE.BufferAttribute(deepStars, 3));
    const starsDeep = new THREE.Points(starGeometryDeep, new THREE.PointsMaterial({ color: 0x88aaff, size: 0.05, transparent: true, opacity: 0.45 }));
    scene.add(starsDeep);
    
    const nebulaCount = 400;
    const nebulaGeometry = new THREE.BufferGeometry();
    const nebulaPositions = new Float32Array(nebulaCount * 3);
    for (let i = 0; i < nebulaCount; i++) {
      nebulaPositions[i*3] = (Math.random() - 0.5) * 38;
      nebulaPositions[i*3+1] = (Math.random() - 0.5) * 28;
      nebulaPositions[i*3+2] = (Math.random() - 0.5) * 30 - 15;
    }
    nebulaGeometry.setAttribute('position', new THREE.BufferAttribute(nebulaPositions, 3));
    const nebulaPoints = new THREE.Points(nebulaGeometry, new THREE.PointsMaterial({ color: 0x4a7ad5, size: 0.05, transparent: true, opacity: 0.25, blending: THREE.AdditiveBlending }));
    scene.add(nebulaPoints);
    
    let rotationSpeed = 0.0024;
    function animateRotation() {
      earthMesh.rotation.y += rotationSpeed;
      cloudMesh.rotation.y += rotationSpeed * 1.18;
      stars.rotation.y += 0.00012;
      stars2.rotation.x += 0.00009;
      starsDeep.rotation.z -= 0.00005;
      nebulaPoints.rotation.y += 0.0001;
      requestAnimationFrame(animateRotation);
    }
    animateRotation();
    
    function renderLoop() {
      if (renderer && scene && camera) renderer.render(scene, camera);
      requestAnimationFrame(renderLoop);
    }
    renderLoop();
    
    window.addEventListener('resize', () => resizeGlobeToPerfectCircle());
    if (window.ResizeObserver && container) {
      const resizeObserver = new ResizeObserver(() => resizeGlobeToPerfectCircle());
      resizeObserver.observe(container);
    }
    setTimeout(() => resizeGlobeToPerfectCircle(), 30);
    setTimeout(() => resizeGlobeToPerfectCircle(), 150);
    setTimeout(() => resizeGlobeToPerfectCircle(), 500);
    resizeGlobeToPerfectCircle();
    window.addEventListener('load', () => resizeGlobeToPerfectCircle());
    
    // ---------- LINKS (chronological order: earliest to latest) ----------
    const linksData = [
      {
        url: "https://item1000-collab.github.io/ai/gdc/20210108-gdc-30/index.html",
        icon: "fas fa-globe",
        title: "Global Distance Club 30",
        description: '<i class="fas fa-calendar-alt"></i> <span>Anniversary session · Foundations</span>',
        dateLabel: "Jan 8, 2021",
        dateObj: new Date(2021, 0, 8)
      },
      {
        url: "https://item1000-collab.github.io/ai/gdc/20211111-gdc-ce2/index.html",
        icon: "fas fa-network-wired",
        title: "Global Distance Club SE2",
        description: '<i class="fas fa-map-marked-alt"></i> <span>Virtual Brazil Journey</span>',
        dateLabel: "Nov 11, 2021",
        dateObj: new Date(2021, 10, 11)
      },
      {
        url: "https://item1000-collab.github.io/ai/gdc/20260525-elvis/index.html",
        icon: "fas fa-star-of-life",
        title: "Elvis Edition • 2026",
