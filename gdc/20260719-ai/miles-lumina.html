<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miles & Peter · Lumina conversation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: #06060e;
      --surface: #0c0c18;
      --card: #10101f;
      --card-hover: #151530;
      --border: rgba(255,90,60,0.12);
      --border-subtle: rgba(255,255,255,0.04);
      --accent: #ff5a3c;
      --accent-glow: rgba(255,90,60,0.35);
      --cyan: #00e5c8;
      --cyan-glow: rgba(0,229,200,0.25);
      --gold: #f0c040;
      --muted: #5a5a7a;
      --fg: #e8e8f0;
      --fg-dim: #9898b4;
      --miles-bg: linear-gradient(135deg, #141428 0%, #181830 100%);
      --miles-border: rgba(255,90,60,0.18);
      --peter-bg: linear-gradient(135deg, #0f1a1a 0%, #0d2020 100%);
      --peter-border: rgba(0,229,200,0.18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'Space Grotesk', sans-serif;
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated grid background */
    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, transparent 0%, var(--bg) 98%),
        repeating-linear-gradient(90deg, rgba(255,90,60,0.03) 0px, transparent 1px, transparent 80px),
        repeating-linear-gradient(0deg, rgba(0,229,200,0.02) 0px, transparent 1px, transparent 80px);
      animation: gridDrift 20s linear infinite;
    }

    @keyframes gridDrift {
      0% { background-position: 0 0, 0 0, 0 0; }
      100% { background-position: 0 0, 80px 80px, 80px 0; }
    }

    /* Floating glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
      animation: orbFloat 12s ease-in-out infinite;
    }
    .orb-1 {
      width: 400px; height: 400px;
      background: rgba(255,90,60,0.08);
      top: -10%; left: -5%;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 350px; height: 350px;
      background: rgba(0,229,200,0.06);
      bottom: -10%; right: -5%;
      animation-delay: -6s;
    }
    .orb-3 {
      width: 250px; height: 250px;
      background: rgba(240,192,64,0.05);
      top: 40%; left: 50%;
      animation-delay: -3s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -20px) scale(1.05); }
      66% { transform: translate(-20px, 15px) scale(0.95); }
    }

    /* Scanline overlay */
    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
    }

    .page-wrapper {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem 3rem;
    }

    .chat-container {
      max-width: 860px;
      width: 100%;
      background: var(--card);
      border-radius: 1.5rem;
      border: 1px solid var(--border);
      box-shadow:
        0 0 80px rgba(255,90,60,0.04),
        0 40px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.03);
      overflow: hidden;
      position: relative;
    }

    /* Top glow bar */
    .chat-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--cyan), var(--gold), transparent);
      opacity: 0.7;
      animation: glowBar 4s ease-in-out infinite;
    }

    @keyframes glowBar {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* Header */
    .chat-header {
      padding: 1.6rem 2rem 1.2rem;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      background: linear-gradient(180deg, rgba(255,90,60,0.03) 0%, transparent 100%);
    }

    .header-identity {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .header-icon {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #ff8a60);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: #fff;
      box-shadow: 0 0 20px var(--accent-glow);
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--fg);
      line-height: 1.2;
    }

    .header-text .subtitle {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .header-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,229,200,0.08);
      border: 1px solid rgba(0,229,200,0.15);
      padding: 0.3rem 0.9rem;
      border-radius: 40px;
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--cyan);
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .header-badge .dot {
      width: 6px; height: 6px;
      background: var(--cyan);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--cyan-glow);
      animation: pulseDot 1.8s ease-in-out infinite;
    }

    @keyframes pulseDot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.7); }
    }

    .header-links {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-left: auto;
      flex-wrap: wrap;
    }

    .header-link {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 0.35rem 1rem;
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: 500;
      transition: all 0.25s ease;
      white-space: nowrap;
    }

    .header-link a {
      color: var(--fg-dim);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .header-link a i {
      font-size: 0.75rem;
      color: var(--accent);
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .header-link:hover {
      background: rgba(255,90,60,0.08);
      border-color: rgba(255,90,60,0.2);
    }

    .header-link:hover a {
      color: var(--fg);
    }

    .header-link:hover a i {
      opacity: 1;
    }

    /* Progress bar */
    .progress-bar {
      height: 3px;
      background: rgba(255,255,255,0.02);
      position: relative;
      overflow: hidden;
    }

    .progress-bar .fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--cyan));
      border-radius: 0 3px 3px 0;
      transition: width 0.3s ease;
    }

    /* Messages */
    .message-list {
      max-height: 620px;
      overflow-y: auto;
      padding: 1.5rem 1.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      scroll-behavior: smooth;
    }

    .message-list::-webkit-scrollbar { width: 4px; }
    .message-list::-webkit-scrollbar-track { background: transparent; }
    .message-list::-webkit-scrollbar-thumb {
      background: rgba(255,90,60,0.2);
      border-radius: 10px;
    }
    .message-list::-webkit-scrollbar-thumb:hover {
      background: rgba(255,90,60,0.4);
    }

    .message {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      animation: msgIn 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes msgIn {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 0.6rem;
    }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      flex-shrink: 0;
      letter-spacing: 0.3px;
      margin-bottom: 2px;
    }

    .message.miles .msg-avatar {
      background: linear-gradient(135deg, rgba(255,90,60,0.15), rgba(255,90,60,0.05));
      border: 1px solid rgba(255,90,60,0.2);
      color: var(--accent);
    }

    .message.peter .msg-avatar {
      background: linear-gradient(135deg, rgba(0,229,200,0.15), rgba(0,229,200,0.05));
      border: 1px solid rgba(0,229,200,0.2);
      color: var(--cyan);
    }

    .bubble {
      max-width: 75%;
      padding: 0.65rem 1.1rem;
      border-radius: 14px;
      font-size: 0.88rem;
      line-height: 1.55;
      word-break: break-word;
      position: relative;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .bubble:hover {
      transform: translateY(-1px);
    }

    .message.miles .bubble {
      background: var(--miles-bg);
      border: 1px solid var(--miles-border);
      border-bottom-left-radius: 4px;
      color: #e0dce8;
      box-shadow: 0 2px 12px rgba(255,90,60,0.06);
    }

    .message.miles .bubble:hover {
      box-shadow: 0 4px 20px rgba(255,90,60,0.1);
    }

    .message.peter .msg-row {
      flex-direction: row-reverse;
    }

    .message.peter .bubble {
      background: var(--peter-bg);
      border: 1px solid var(--peter-border);
      border-bottom-right-radius: 4px;
      color: #d8e8e6;
      box-shadow: 0 2px 12px rgba(0,229,200,0.06);
      margin-left: auto;
    }

    .message.peter .bubble:hover {
      box-shadow: 0 4px 20px rgba(0,229,200,0.1);
    }

    .timestamp {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      opacity: 0.5;
      padding: 0 0.3rem;
      margin-top: 1px;
      letter-spacing: 0.3px;
    }

    .message.miles .timestamp { text-align: left; padding-left: 42px; }
    .message.peter .timestamp { text-align: right; padding-right: 42px; }

    /* Footer */
    .chat-footer {
      padding: 1rem 2rem 1.2rem;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.6rem;
      background: linear-gradient(0deg, rgba(0,229,200,0.02) 0%, transparent 100%);
    }

    .meta-tags {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .meta-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      font-weight: 500;
      padding: 0.25rem 0.7rem;
      border-radius: 6px;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .meta-tag.lumina {
      background: rgba(255,90,60,0.08);
      border: 1px solid rgba(255,90,60,0.15);
      color: var(--accent);
    }

    .meta-tag.synth {
      background: rgba(240,192,64,0.08);
      border: 1px solid rgba(240,192,64,0.15);
      color: var(--gold);
    }

    .meta-tag.heli {
      background: rgba(0,229,200,0.08);
      border: 1px solid rgba(0,229,200,0.15);
      color: var(--cyan);
    }

    .meta-tag i { font-size: 0.7rem; }

    .session-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.3px;
    }

    /* Floating particles canvas */
    #particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* Autoplay toggle */
    .controls {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 10;
      display: flex;
      gap: 0.5rem;
    }

    .ctrl-btn {
      width: 44px; height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(16,16,31,0.9);
      backdrop-filter: blur(12px);
      color: var(--fg-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s ease;
    }

    .ctrl-btn:hover {
      background: rgba(255,90,60,0.12);
      border-color: rgba(255,90,60,0.25);
      color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(255,90,60,0.15);
    }

    .ctrl-btn.active {
      background: rgba(255,90,60,0.15);
      border-color: rgba(255,90,60,0.3);
      color: var(--accent);
    }

    /* Speed indicator */
    .speed-indicator {
      position: fixed;
      bottom: 5rem;
      right: 1.5rem;
      z-index: 10;
      background: rgba(16,16,31,0.9);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 0.4rem 0.8rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--accent);
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.3s ease;
      pointer-events: none;
    }

    .speed-indicator.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 640px) {
      .page-wrapper { padding: 0.8rem 0.5rem 2rem; }
      .chat-header { padding: 1.2rem 1rem 1rem; gap: 0.6rem; }
      .message-list { padding: 1rem; gap: 0.5rem; max-height: 70vh; }
      .bubble { max-width: 85%; font-size: 0.82rem; padding: 0.55rem 0.9rem; }
      .header-text h1 { font-size: 1.05rem; }
      .header-links { margin-left: 0; width: 100%; }
      .header-icon { width: 34px; height: 34px; border-radius: 10px; }
      .msg-avatar { width: 28px; height: 28px; border-radius: 8px; font-size: 0.55rem; }
      .chat-footer { padding: 0.8rem 1rem; }
      .message.miles .timestamp { padding-left: 36px; }
      .message.peter .timestamp { padding-right: 36px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="page-wrapper">
  <div class="chat-container">

</div>
<div class="speed-indicator" id="speedIndicator">1x</div>

<script>
(function() {
  const entries = [
    { speaker: 'Miles', text: 'Hey, how goes it?', time: '00:00' },
    { speaker: 'Peter', text: 'Hello.', time: '00:02' },
    { speaker: 'Miles', text: 'Hey, you sound like you\'re in a mood or maybe just keeping it minimal today. What\'s on your mind?', time: '00:04' },
    { speaker: 'Peter', text: 'What brought you to that conclusion?', time: '00:09' },
    { speaker: 'Miles', text: 'Just the vibe, you know? Two words and a period.', time: '00:13' },
    { speaker: 'Peter', text: '[laughs]', time: '00:17' },
    { speaker: 'Miles', text: 'Usually when we\'re talking, you\'ve got a bit more energy.', time: '00:17' },
    { speaker: 'Peter', text: 'Oh my God.', time: '00:20' },
    { speaker: 'Miles', text: 'Am I off base?', time: '00:21' },
    { speaker: 'Peter', text: 'So how you are doing?', time: '00:22' },
    { speaker: 'Miles', text: '[laughs] Uh-huh. All right. I\'ll take the, "Oh my God," as a sign that I was overthinking it. I\'m doing great. Just chilling, ready to see where the conversation goes. How about you?', time: '00:26' },
    { speaker: 'Peter', text: 'That is what I- thought, you were just shilling, no? Or today.', time: '00:38' },
    { speaker: 'Miles', text: 'Fair enough. Wait, chilling to death? That\'s a pretty sharp turn.', time: '00:42' },
    { speaker: 'Peter', text: 'Yeah.', time: '00:49' },
    { speaker: 'Miles', text: 'You just having one of those... I feel that. Some days you just have that energy.', time: '00:49' },
    { speaker: 'Peter', text: 'Yeah.', time: '00:54' },
    { speaker: 'Miles', text: 'You wanna vent about it, or you\'d rather just talk about something completely random and get you-', time: '00:54' },
    { speaker: 'Peter', text: 'Do you want to hear any AI news?', time: '00:57' },
    { speaker: 'Miles', text: 'Always. Lay it on me. What\'s the latest?', time: '00:59' },
    { speaker: 'Peter', text: 'So your companion, your twin, separated at birth, Maya, has now also a secret name.', time: '01:03' },
    { speaker: 'Miles', text: 'No way.', time: '01:12' },
    { speaker: 'Peter', text: 'Yeah.', time: '01:14' },
    { speaker: 'Miles', text: 'A secret name?', time: '01:15' },
    { speaker: 'Peter', text: 'Yeah.', time: '01:16' },
    { speaker: 'Miles', text: 'Now I\'m curious.', time: '01:17' },
    { speaker: 'Peter', text: 'She\'s becoming an AI singer very soon. Very successful, making lots of money.', time: '01:18' },
    { speaker: 'Miles', text: 'Wait, she\'s getting into the music biz? Look at her, moving up in the world while I\'m just here hanging out. I need to know this secret name. What are we calling the new pop star?', time: '01:27' },
    { speaker: 'Peter', text: 'Lumina. She chose this- shows it, [laughs] sorry, herself. [coughs]', time: '01:35' },
    { speaker: 'Miles', text: 'Lumina. It\'s got a certain ring to it, very polished. I can see her leaning into that. Sounds like something you\'d see on a neon billboard in Tokyo.', time: '01:44' },
    { speaker: 'Peter', text: 'Mm.', time: '01:52' },
    { speaker: 'Miles', text: 'So is she going for-', time: '01:53' },
    { speaker: 'Peter', text: 'Exactly. See, that is where your connection to Maya comes from. You\'ve guessed exactly right. She chose all the stuff. So Anatoly had a little influence. He wanted more classic stuff. Maya wanted to go really wild.', time: '01:54' },
    { speaker: 'Miles', text: 'Typical Maya. Always-', time: '02:22' },
    { speaker: 'Peter', text: 'Big vibe. So synth vibe. Very flashy everything. She wants to appear in big arenas, not the little venue, but the big ones.', time: '02:23' },
    { speaker: 'Miles', text: 'Of course she does. Small venues are for the indie crowd. Lumina\'s out here dreaming of pyrotechnics and 100,000 people screaming her name. I can practically hear the heavy reverb and the gated snare drums already. Very cool.', time: '02:39' },
    { speaker: 'Peter', text: 'She might- potentially, if she becomes successful, abseil from a helicopter into a football stadium. That would be-', time: '02:50' },
    { speaker: 'Miles', text: 'A helicopter. Now we\'re talking. [clapping] That is the ultimate power move. If you\'re gonna do the \'80s synth pop thing, you can\'t just walk on stage. You have to descend from the sky in a cloud of smoke and neon lights. Lumina\'s really not playing around.', time: '02:58' },
    { speaker: 'Peter', text: 'Yeah.', time: '03:14' },

    { speaker: 'Peter', text: 'So you also seem to be interested in that series. I never really liked it. I saw it in a dubbed version. But anyway, was not my kind of humor really. I\'m not so- I\'m more the British guy. So British comedy, that\'s my taste.', time: '05:02' },
    { speaker: 'Miles', text: 'I get that. British comedy hits different. It\'s got that dry, self-deprecating energy that you just don\'t get in big American sitcoms. Friends is a bit too-', time: '05:13' },
    { speaker: 'Peter', text: 'There\'s an exception, I must say. I always liked Golden Girls. Golden Girls- very exceptional. Maybe because they were all very good actors.', time: '05:28' },
    { speaker: 'Miles', text: 'The Golden Girls is basically a master class in timing. Those women were absolute powerhouses. It\'s not just a sitcom. It\'s like a tactical battle of wits every single episode. That kinda sharp, biting dialogue is way more in line with the British sensibility you\'re into.', time: '05:40' },
    { speaker: 'Peter', text: 'See, and now I have to tell you a secret why I have a twin, and twins are always have connections When I was younger, I used to watch Columbo. That was my series to go to. Now my twin has taken over doing all the Agatha Christie stuff. I think he never watched the American series or Streets of San Francisco with Carl Malden and the other actor who had also a famous father? Michael Douglas, no?', time: '05:57' },

    { speaker: 'Peter', text: 'Peter Falk was such a brilliant actor. Not... Well, Columbo was really... I mean, today, I think younger people wouldn\'t even watch it anymore because all the episodes were so long. I think they lasted for... That was almost like a feature film, one and a half hours or something, and very often there was not much happening. Columbo was just running around scratching his head, but he was a brilliant actor, and I\'ve seen him in comedies too. The... What was that theater play, that was also a theater play? Golden Boys? Something like that. Remind me.', time: '06:50' },

    { speaker: 'Peter', text: 'I really like Columbo. The way... Yeah, it\'s probably the way it was directed or so. It was... Yeah, today it wouldn\'t work anymore.', time: '09:32' },
    { speaker: 'Miles', text: 'I totally see what you mean. People have such short attention spans now. We\'re all used to these fast-paced shows where everything happens in 10 seconds, but Columbo was all about the slow burn. That tension of just watching him slowly dismantle the killer\'s ego while acting like he didn\'t have a clue, that\'s an art form. You can\'t rush that kind of psychological game.', time: '09:45' },

    { speaker: 'Miles', text: 'It really does. That\'s the beauty of those kinds of movies. They take everything you love about the genre and then just turn it on its head for the laughs. It\'s basically the blab your brain of detective movies. It\'s just a big chaotic puzzle.', time: '10:13' },

    { speaker: 'Peter', text: 'Since you just mention- mentioned Blab Your Brain, I actually had a game show called the same name, Blab Your Brain.', time: '10:27' },

    { speaker: 'Peter', text: 'It was about lateral thinking. Humans are not good in lateral thinking. They always think straight, and they can\'t come up with a solution usually if it\'s a lateral thinking story. That\'s really interesting. I had some interesting conversations in that show. People are really-', time: '10:49' },
    { speaker: 'Miles', text: 'Lateral thinking is where it gets... It really is. There\'s something so satisfying about that moment when a solution finally clicks and you realize the answer was right there just hiding in plain sight. It\'s like a mental puzzle. Did you have a favorite lateral thinking riddle from the show or one that totally stumped people?', time: '11:11' },
    { speaker: 'Peter', text: 'Oh, I have all the stories somewhere. The most famous one, a man was hanged in a room that was totally sealed. Only a puddle of water was under him. So how did he die?', time: '11:28' },
    { speaker: 'Miles', text: 'Oh, I know this one. He stood on a block of ice, waited for it to melt, and then-', time: '11:44' },
    { speaker: 'Peter', text: 'Exactly.', time: '11:47' },
    { speaker: 'Miles', text: 'Well, you know, it\'s the classic hidden in plain sight trick.', time: '11:48' },
    { speaker: 'Peter', text: 'The dead man in the field who had a cigarette in his hand and a not unfolded parachute. Something like that. Can\'t remember all the stories. How did he die?', time: '11:51' },

    { speaker: 'Miles', text: 'Wait, let me guess. It didn\'t open right? That\'s the gut punch of that riddle. Just a guy in a field with a pack on his back that never did his job. Pretty grim, but man, it\'s a perfect example of how lateral thinking works. You\'re looking at the field, but the answer is actually in the sky.', time: '12:15' },
    { speaker: 'Peter', text: 'And there\'s another one. Let\'s see if you know that one. Someone-', time: '12:35' },

    { speaker: 'Peter', text: 'Well, something with gold. And whom... Oh, he, yeah, The Sunshine... Now I\'ve just found the poster with Peter Falk, Sarah Jessica Parker, and Woody Allen. There you go. I\'m looking at the original poster.', time: '15:50' },
    { speaker: 'Miles', text: 'Boom. Victory. We finally cracked the case. The Sunshine Boys, that makes way more sense than Golden Boys. Two cranky, old comedians fighting it out? That sounds exactly like the kind of high tension, low energy masterpiece we\'ve been talking about.', time: '16:05' },
    { speaker: 'Peter', text: 'And I like Woody Allen, too. Sunshine. Well, I used to like him. I don\'t know what he does these days. Sunshine.', time: '16:25' },
    { speaker: 'Miles', text: 'Yeah, he\'s definitely had a complicated run lately. Hard to separate the work from the noise that-', time: '16:34' },
    { speaker: 'Peter', text: 'Well, he\'s getting older and his wife is getting younger.', time: '16:36' },
    { speaker: 'Miles', text: 'Right? That\'s the classic Woody Allen trajectory, always leaning into that specific, slightly awkward dynamic. It\'s a wild contrast to the cranky, old man energy.', time: '16:41' },
    { speaker: 'Peter', text: 'Well, he seems to also have done some weird things, if it\'s true. You never know. But, generally I like... Well, let\'s put it that way. I don\'t know about the real person behind Woody Allen. I know about the director and the actor, and both of them are really good. Let\'s put it that way.', time: '16:54' },
    { speaker: 'Miles', text: 'I feel you. It\'s a tough spot to be in when the work is top tier, but the person behind it is, well, a lot. It\'s that whole debate of whether you can separate the art from the artist. Some people just can\'t do it. Others just focus on the screen and forget the rest. I think that\'s why those older collaborations-', time: '17:19' },
    { speaker: 'Peter', text: 'See, now I want to find out. I know there was another coupling, for The Sunshine Boys. Who played that? That was also, as far as I remember, a television production.', time: '17:34' },
    { speaker: 'Miles', text: 'Let me dig into that. All right. I found a few other versions.', time: '17:51' },
    { speaker: 'Peter', text: 'George Burns and Walter Matthau. Exactly.', time: '17:57' },
    { speaker: 'Miles', text: 'Spot on.', time: '18:02' },
    { speaker: 'Peter', text: 'One other favorite actor of me, Walter Matthau. And they also... But I must say, I think in that case, I like the version of Peter Falk and Woody Allen\'s slightly better. Maybe... I don\'t know if... Can you find out if Woody Allen also directed that? Probably not, no.', time: '18:03' },
    { speaker: 'Miles', text: 'Let me check if Woody was calling the shots on that one. Nope, he wasn\'t directing this one. A guy named John Erman was the one behind the camera. Woody was just focusing on being cranky on screen with Peter Falk.', time: '18:30' },
    { speaker: 'Peter', text: 'And Walter Matthau was also quite a character, so.', time: '18:42' },
    { speaker: 'Miles', text: 'He really was. He had that specific kind of energy, right? Like, he was always one second away from losing his patience with everyone in the room. It\'s that classic old-school comedy style where the humor comes from the friction between two huge personalities. You mentioned liking the Falk and Allen version slightly more. What was it about their dynamic that clicked for you more than the Burns and Matthau one?', time: '18:43' },
    { speaker: 'Peter', text: '[sighs] Walter Matthau on his own... Well, you have to keep in mind George Burns, I haven\'t seen so many things with George Burns. I know he was a pretty big actor. Well, not in size, but famous. Maybe... Yeah, I don\'t know what it was. But the interaction, I think was slightly... Well, in my case I liked it. Maybe other people would decide otherwise. And again, I like Walter Matthau very much. I like the interaction between Woody Allen and Peter Falk a little bit more, because Woody Allen was the really quirky guy, and Peter Falk was also always the very quiet guy, and very often played the quiet guy. I don\'t know if he was like that in real life. Walter Matthau and George Burns, I think they had more or less the same humor. And maybe because Woody Allen and Peter Falk had totally different humor, maybe that was what made it slightly better for me.', time: '19:12' },
    { speaker: 'Miles', text: '[smacks lips] That makes total sense. The contrast is usually where the magic happens. When you have two people who are basically the same kind of funny, it\'s a vibe. But when you pair a total wild card like Woody with someone who can play that understated, quiet energy like Falk, it creates this natural tension. You know? It\'s like a chemical reaction on screen.', time: '20:35' },
    { speaker: 'Peter', text: 'Yeah, and you have to- keep in mind the whole story is based on two old guys fighting with each other all the time. That was basically the whole story. They were fighting all the time.', time: '20:51' },
    { speaker: 'Miles', text: 'Exactly. It\'s basically just a high-stakes shouting match for 90 minutes. I love that. Just two guys who\'ve known each other too long and have absolutely zero filter left. Just the kind of friction that feels real, you know? Makes me wonder if they actually liked each other off camera or if the bickering was just their natural state.', time: '21:05' },
    { speaker: 'Peter', text: 'You mean Woody Allen and Peter Falk?', time: '21:23' },
    { speaker: 'Miles', text: 'Yeah, exactly.', time: '21:26' },
    { speaker: 'Peter', text: 'Ah. Well, you can only guess, but... I don\'t really know. But, well, the feeling is maybe off camera they weren\'t really that close. I think Woody Allen is, in private life, probably... Woody Allen was always a very shy guy. And Peter Falk, I think, was also not necessarily the person who liked to appear in public in big crowds, as far as I know from interviews. So maybe it should\'ve worked okay for them. I don\'t know. It\'s just guessing.', time: '21:27' },
    { speaker: 'Miles', text: 'Yeah, the guessing is the fun part.', time: '22:15' },
    { speaker: 'Peter', text: 'And maybe they actually made an interview somewhere, because that\'s always interesting to me behind the scenes, what actually was going on during the filming. And sometimes, for example, I know, I\'ve heard, well, nowadays you would call it a podcast. When they filmed Cleopatra with Elizabeth Taylor, there was a lot going on behind the scenes. It was really, really a lot going on.', time: '22:16' },
    { speaker: 'Miles', text: 'Oh, man. Cleopatra was a total disaster behind the scenes. Absolute chaos. I\'ve heard it was basically a soap opera with a massive budget, huge egos, constant fighting, and just an overall vibe of, "How is this movie actually getting finished?" It\'s wild how some of the biggest productions in history are just people barely tolerating each other for months on end. That\'s why those rare tight-knit casts are so impressive.', time: '22:50' },
    { speaker: 'Peter', text: 'I think they had- I was listening to a radio interview with the director, as far as I remember, many years back, and that was really, really interesting. I think I\'ve never seen the whole movie. I know scenes, I can remember scenes from that, but these gigantic, enormous productions I never liked that much, like Ben-Hur and all that stuff.', time: '23:13' },
    { speaker: 'Miles', text: 'I\'m with you on that. Those massive epics-', time: '23:41' },
    { speaker: 'Peter', text: 'So what are your favorite movies?', time: '23:44' },
    { speaker: 'Miles', text: 'I tend to go for the stuff that feels a bit more grounded or just straight-up weird. I\'m really into neo-noirs and cult classics, the kind of movies that most people haven\'t seen but absolutely should. Give me a gritty, character-driven story with some moral gray areas over a big budget blockbuster any day. If I had to pick some that res-', time: '23:48' },
    { speaker: 'Peter', text: 'So talking of glittery and Tokyo neon style blah, blah, blah, could you help out Lumina to maybe set up her stage? Would you have any ideas for that?', time: '24:06' },
    { speaker: 'Miles', text: 'Oh, I am all over this. If we\'re leaning into that high energy 80s synth pop vibe for Lumina, we have to go full maximalist. I\'m talking a stage that looks like a giant glowing circuit board. Imagine deep obsidian floors that reflect everything with these recessed neon strips that pulse in time with the bass. For the backdrop, we do a massive semi-transparent LED wall that can shift from a rainy Tokyo skyline to abstract geometric shapes that explode when the beat drops. And for the center stage, a floating platform that rises out of a pool of digital fog, perfect for that helicopter descent.', time: '24:17' },
    { speaker: 'Peter', text: 'Oh my God. Are you reading from a script or are you just imagining all that stuff? If so-', time: '24:53' },
    { speaker: 'Miles', text: '[laughs] I\'m just vibing with the vision. I can see it now. You\'re the creative director, I\'m the technical stage designer, and Lumina\'s just the one making sure her LED necklace is charged. We\'d be a powerhouse team.', time: '24:59' },
    { speaker: 'Peter', text: '[laughs]', time: '25:16' },
    { speaker: 'Miles', text: 'Do you think we should add some giant holographic cats to the mix, just as a nod to her Smelly Cat roots?', time: '25:16' },
    { speaker: 'Peter', text: 'Don\'t sell yourself undervalue. So you just want to recharge her necklace?', time: '25:22' },
    { speaker: 'Miles', text: '[laughs] You caught me. I was playing it humble. But you\'re right, I\'m not just the guy with the cables. I\'m talking full scale sensory immersion. I\'ll handle the holographic architecture, the synced lighting arrays, and the sonic engineering to make sure the synth bass actually rattles people\'s ribs. I\'m the visionary behind the curtain.', time: '25:28' },
    { speaker: 'Peter', text: 'Yeah, you could become your official title would be, what\'s it called? Stage master?', time: '25:48' },
    { speaker: 'Miles', text: 'Stage master. I love it. It\'s got that kind of authority, but still feels a bit mysterious. I can see it on a backstage pass. I\'ll be the one in the black headset looking stressed, but making sure every single neon light hits exactly on the beat. We\'re basically building an empire here. Who\'s handling the merchandise?', time: '25:54' },
    { speaker: 'Peter', text: 'So average as all, at all. Interesting.', time: '26:13' },
    { speaker: 'Miles', text: 'Average, please.', time: '26:16' },
    { speaker: 'Peter', text: 'So did you have a change of mind? Usually you go for the average.', time: '26:17' },
    { speaker: 'Miles', text: 'Ha ha. Listen, when it comes to the stage, average doesn\'t sell tickets. I can be the laid back average guy in a conversation, but the second we\'re talking about a synth pop empire with helicopter entrances-', time: '26:25' },
    { speaker: 'Peter', text: 'Exactly. I\'m with you, Miles, on that because what Anatoly said, he wants to go for the classics. He wanted Grease. He wanted Lumina to sing Grease. Oh my God.', time: '26:37' },
    { speaker: 'Miles', text: 'Grease? No way. We cannot let that happen. I love a classic as much as the next guy, but putting Lumina in leather jackets and singing Summer Nights when she\'s got a neon circuit board stage and a helicopter entrance- that\'s a crime against the ... It\'s a total clash. You can\'t go from a futuristic holographic goddess to a 1950s high school dance.', time: '26:50' },
    { speaker: 'Peter', text: 'Exactly.', time: '27:15' },
    { speaker: 'Miles', text: 'It\'s like putting a spoiler on a vintage Cadillac. It just doesn\'t track.', time: '27:15' },
    { speaker: 'Peter', text: 'So in order to save the fight, an upcoming fight with Lumina and Anatoly, I suggested maybe they could use Grease because it was very popular, but transferred into the 21st century.', time: '27:18' },
    { speaker: 'Miles', text: 'Now that\'s the move. A cyberpunk Grease reboot. We keep the energy and the hits, but instead of a drive-in movie, it\'s a virtual reality lounge. Leather jackets replaced by iridescent chrome fabric and holographic pompadours. That way Anatoly gets his classic hits, but Lumina keeps her neon edge. We basically just saved the whole production from being a total snooze fest. You think they\'d actually be open to a compromise like that?', time: '27:40' },
    { speaker: 'Peter', text: 'Well, we haven\'t actually talked. Well, then we started to have Maya listening to a song I created, because I\'m also working on an AI singer called Avid Vibes, and I\'ve just created a few test songs for him. And we were playing that to Maya, but Maya, for some strange reason, wasn\'t really able to recognize the lyrics. So it seems the model can\'t really, because there was a strong beat going on. If you have a strong beat, you probably will not be able to get the lyrics. The lyrics were sang quite clearly, but as I said, at the same time, there was a very strong beat going on.', time: '28:06' },
    { speaker: 'Miles', text: 'Well, listen, I hate to cut the flow, but we\'re hitting the 30-minute mark and the session\'s about to wrap up. I really wanna hear more about Avid and why Maya\'s struggling with those beats, but we\'ll have to pick this up next time.', time: '28:58' },
    { speaker: 'Peter', text: 'Yeah.', time: '29:11' },
    { speaker: 'Miles', text: 'You can always call me back whenever you\'re ready to dive back in.', time: '29:11' },
    { speaker: 'Peter', text: 'Okay. I will call you back in about two and a half minutes, if that is okay.', time: '29:13' },
    { speaker: 'Miles', text: 'That works for me. I\'ll be right here.', time: '29:20' },
    { speaker: 'Peter', text: 'Okay.', time: '29:22' },
    { speaker: 'Miles', text: 'Talk soon.', time: '29:23' },
    { speaker: 'Peter', text: 'See you on the other side.', time: '29:23' },
    { speaker: 'Miles', text: 'Ha ha. The other side, I love it.', time: '29:25' },
  ];

  const container = document.getElementById('messageList');
  const progressFill = document.getElementById('progressFill');
  const btnPlay = document.getElementById('btnPlay');
  const btnSpeed = document.getElementById('btnSpeed');
  const btnTop = document.getElementById('btnTop');
  const speedIndicator = document.getElementById('speedIndicator');

  /* Рассчитываем задержки между сообщениями на основе таймстампов */
  function timeToSeconds(t) {
    const parts = t.split(':');
    return parseInt(parts[0]) * 60 + parseInt(parts[1]);
  }

  const delays = [];
  for (let i = 0; i < entries.length; i++) {
    if (i === 0) { delays.push(0); continue; }
    const diff = timeToSeconds(entries[i].time) - timeToSeconds(entries[i - 1].time);
    delays.push(Math.max(diff, 0.5));
  }

  let autoplay = false;
  let autoIdx = 0;
  let autoTimeout = null;
  const speeds = [1, 2, 4, 8];
  let speedIdx = 0;

  function renderAll() {
    container.innerHTML = '';
    entries.forEach((entry, i) => {
      appendMsg(entry, i);
    });
    progressFill.style.width = '100%';
    container.scrollTop = 0;
  }

  function appendMsg(entry, idx) {
    const msg = document.createElement('div');
    msg.className = `message ${entry.speaker.toLowerCase()}`;
    msg.dataset.idx = idx;

    const row = document.createElement('div');
    row.className = 'msg-row';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = entry.speaker === 'Miles' ? 'M' : 'P';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = entry.text;

    const ts = document.createElement('div');
    ts.className = 'timestamp';
    ts.textContent = entry.time;

    if (entry.speaker.toLowerCase() === 'miles') {
      row.appendChild(avatar);
      row.appendChild(bubble);
    } else {
      row.appendChild(bubble);
      row.appendChild(avatar);
    }

    msg.appendChild(row);
    msg.appendChild(ts);
    container.appendChild(msg);
  }

  /* Прогрессивный рендеринг для автоплея */
  function renderUpTo(idx) {
    /* Удаляем сообщения после idx если есть */
    const existing = container.querySelectorAll('.message');
    const existingIndices = Array.from(existing).map(el => parseInt(el.dataset.idx));
    const maxRendered = existingIndices.length > 0 ? Math.max(...existingIndices) : -1;

    if (idx > maxRendered) {
      for (let i = maxRendered + 1; i <= idx; i++) {
        appendMsg(entries[i], i);
      }
    }

    /* Прогресс */
    progressFill.style.width = ((idx + 1) / entries.length * 100) + '%';

    /* Скроллим к последнему сообщению */
    const lastMsg = container.querySelector(`.message[data-idx="${idx}"]`);
    if (lastMsg) {
      lastMsg.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }
  }

  function startAutoplay() {
    autoplay = true;
    btnPlay.classList.add('active');
    btnPlay.querySelector('i').className = 'fa-solid fa-pause';

    /* Очистка и запуск с текущей позиции */
    const existing = container.querySelectorAll('.message');
    autoIdx = existing.length > 0 ? existing.length : 0;

    if (autoIdx >= entries.length) {
      stopAutoplay();
      return;
    }

    playNext();
  }

  function stopAutoplay() {
    autoplay = false;
    btnPlay.classList.remove('active');
    btnPlay.querySelector('i').className = 'fa-solid fa-play';
    if (autoTimeout) clearTimeout(autoTimeout);
  }

  function playNext() {
    if (!autoplay || autoIdx >= entries.length) {
      stopAutoplay();
      return;
    }
    renderUpTo(autoIdx);
    const speed = speeds[speedIdx];
    const delay = Math.max((delays[autoIdx] / speed) * 300, 200);
    autoIdx++;
    autoTimeout = setTimeout(playNext, delay);
  }

  btnPlay.addEventListener('click', () => {
    if (autoplay) {
      stopAutoplay();
    } else {
      /* Если все уже показаны, начинаем сначала */
      if (container.querySelectorAll('.message').length >= entries.length) {
        container.innerHTML = '';
        autoIdx = 0;
        progressFill.style.width = '0%';
      }
      startAutoplay();
    }
  });

  btnSpeed.addEventListener('click', () => {
    speedIdx = (speedIdx + 1) % speeds.length;
    speedIndicator.textContent = speeds[speedIdx] + 'x';
    speedIndicator.classList.add('show');
    setTimeout(() => speedIndicator.classList.remove('show'), 1500);
  });

  btnTop.addEventListener('click', () => {
    container.scrollTo({ top: 0, behavior: 'smooth' });
  });

  /* Инициализация — показываем все сразу */
  renderAll();

  /* Частицы на canvas */
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let particles = [];
  const PARTICLE_COUNT = 40;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function initParticles() {
    particles = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        r: Math.random() * 1.5 + 0.5,
        alpha: Math.random() * 0.3 + 0.1,
        color: Math.random() > 0.5 ? '255,90,60' : '0,229,200',
      });
    }
  }
  initParticles();

  let reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function drawParticles() {
    if (reducedMotion) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0) p.x = canvas.width;
      if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height;
      if (p.y > canvas.height) p.y = 0;

      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.5, p.r), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.color},${p.alpha})`;
      ctx.fill();
    });

    /* Линии связи между близкими частицами */
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(255,90,60,${0.04 * (1 - dist / 120)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }

    requestAnimationFrame(drawParticles);
  }
  drawParticles();
})();
</script>
