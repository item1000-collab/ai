<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>News Clips Interactive: Macron Slap & Trump Diplomacy | May 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #eef2f7 0%, #d4dee9 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .slider-container {
            max-width: 1100px;
            width: 100%;
            background: #fffef9;
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.35);
            overflow: hidden;
            transition: all 0.2s;
        }

        .slides-wrapper {
            background: #ffffff;
            padding: 1.8rem 2rem;
            border-bottom: 1px solid #ece3d8;
        }

        .slide {
            display: none;
            animation: fadeSlide 0.35s ease-out;
        }

        .slide.active-slide {
            display: block;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }

        h1 {
            font-size: 1.75rem;
            border-left: 6px solid #b22234;
            padding-left: 1rem;
            margin-bottom: 0.75rem;
            font-weight: 800;
            color: #1e2f3e;
            letter-spacing: -0.2px;
        }

        .news-meta {
            font-size: 0.8rem;
            color: #5e6f8d;
            border-bottom: 1px solid #e2dbc9;
            padding-bottom: 0.6rem;
            margin-bottom: 1.2rem;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .content-card {
            background: #fefbf5;
            border-radius: 1.2rem;
            padding: 1rem 1.2rem;
            margin-bottom: 1.2rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
            border: 1px solid #f3ede2;
        }

        .eng-paragraph {
            line-height: 1.5;
            margin-bottom: 0.8rem;
            font-size: 1rem;
            color: #1e2a36;
        }

        .eng-paragraph:last-child {
            margin-bottom: 0;
        }

        .highlight-bad {
            background-color: #ffecb3;
            color: #b6560c;
            font-weight: bold;
            border-radius: 12px;
            padding: 0 6px;
            display: inline-block;
            font-size: 0.9rem;
        }

        .image-note {
            font-size: 0.75rem;
            text-align: center;
            background: #f2efe8;
            padding: 0.4rem;
            border-radius: 30px;
            margin: 1rem 0 0.2rem;
            color: #5b5b4e;
        }

        .quiz-area {
            background: #f6f3ec;
            padding: 1.2rem 1.5rem;
            border-radius: 1.5rem;
            margin-top: 1rem;
        }

        .question-card {
            background: white;
            padding: 1rem 1.5rem;
            border-radius: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 1.25rem;
        }

        .question-text {
            font-weight: 700;
            font-size: 1.05rem;
            margin-bottom: 0.8rem;
            color: #1f4e6e;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            margin-bottom: 0.8rem;
        }

        .opt-btn {
            background: #eef2f5;
            border: 1px solid #cbd5e1;
            padding: 0.45rem 1.1rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1e2f3a;
        }

        .opt-btn:hover {
            background: #e0e7ef;
            transform: scale(0.97);
        }

        .feedback {
            font-size: 0.85rem;
            margin-top: 0.5rem;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            display: inline-block;
        }

        .correct-feedback {
            background: #dff0e3;
            color: #1f6d3c;
        }

        .wrong-feedback {
            background: #ffe2de;
            color: #b13b32;
        }

        .nav-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #e8e0d2;
            padding: 0.8rem 2rem;
            flex-wrap: wrap;
            gap: 12px;
        }

        .nav-buttons button {
            background: #2c3e50;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 0.5rem 1.2rem;
            margin: 0 0.3rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.1s;
        }

        .nav-buttons button:hover {
            background: #1f3142;
        }

        .slide-indicator {
            background: #b9c2ce;
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #1f2a36;
        }

        hr {
            margin: 0.5rem 0;
            border-color: #e7dfd1;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            padding: 1rem;
            color: #5f6c7a;
        }

        @media (max-width: 700px) {
            .slides-wrapper { padding: 1.2rem; }
            .quiz-area { padding: 1rem; }
        }
    </style>
</head>
<body>
<div class="slider-container">
    <div class="slides-wrapper" id="slidesWrapper"></div>
    <div class="nav-controls">
        <div class="nav-buttons">
            <button id="prevSlideBtn">◀ PREV</button>
            <button id="nextSlideBtn">NEXT ▶</button>
        </div>
        <div class="slide-indicator" id="slideCounter">Slide 1 / 5</div>
    </div>
    <div class="image-note">
        ⚠️ <span class="highlight-bad">Bold highlights</span> indicate potential factual or logical oddities from the original source (e.g., "fled France" vs. Iran context)
    </div>
</div>
<footer>Based on The Times & Rawstory clips — May 2026 | Interactive Q&A + bilingual structure removed, all in English</footer>

<script>
    // ----- SLIDES DATA (fully in English, with interactive questions & highlighted oddities)
    const slidesData = [
        { // SLIDE 1 — Macron slap, book claims, denials
            title: "🇫🇷 BRIGITTE MACRON SLAPPED HUSBAND OVER 'TEXTS TO ACTRESS'",
            meta: "Adam Sage, Paris | The Times, May 13 2026",
            paragraphs: [
                "Messages between Iranian film star Golshifteh Farahani and President Macron allegedly prompted the now-infamous, robustly denied incident. At the time, Macron dismissed the slap as horseplay, saying his wife Brigitte was 'joking' when she shoved her hands into his face after the presidential aircraft landed in Vietnam for a state visit last year.",
                "A new book, <em>Un Couple (Presque) Parfait — An (Almost) Perfect Couple</em> by Florian Tardif (Paris Match), claims the first lady was angry after seeing a text message to her husband from exiled Iranian actress Golshifteh Farahani. Farahani denied affair rumors. Tardif alleges the message made Mrs. Macron afraid her husband might leave her for Farahani.",
                "A source close to the first lady told <em>Le Parisien</em> that Mrs. Macron 'categorically denied' slapping her husband because of a text message and that she 'never looks into her husband’s phone.' Farahani, 42, denied any romantic liaison with Macron, 48. Tardif called it 'platonic' but said the president had sent messages like 'I find you very pretty.'",
                "The book states: 'Everything in the book is facts, facts and only facts.' An extract reads: 'What hurt Brigitte was not so much the contents of the message as what it hinted at: a possibility … nothing tangible but the idea alone was enough.'"
            ],
            imageCaption: "📸 Golshifteh Farahani denied affair with Macron (image caption from original)",
            questions: [
                { question: "How did President Macron initially describe the slap incident?", 
                  options: ["A political conspiracy", "Horseplay / joking", "A serious physical attack", "A deep state setup"],
                  correct: 1,
                  explanation: "Macron dismissed it as horseplay and said his wife was 'joking' when she shoved her hands in his face." },
                { question: "According to Florian Tardif's book, what triggered Brigitte Macron's anger?", 
                  options: ["Macron missed a state dinner", "She discovered a text message from Golshifteh Farahani", "The presidential plane was delayed", "Macron refused to visit Vietnam"],
                  correct: 1,
                  explanation: "The book claims she saw a text message from Farahani to her husband, which sparked the dispute." }
            ]
        },
        { // SLIDE 2 — International reactions, Trump mockery, Brigitte's explanation, highlighted error
            title: "🌍 Trump Mocks Macron & Brigitte's Own Account",
            meta: "Tensions rise: Paris-Washington & the slap video",
            paragraphs: [
                "In a country used to extramarital shenanigans, the claims are unlikely to dent Macron's standing — and may help end speculation that he is uninterested in women. On the global stage, the book reignited talk of an incident that strained Paris-Washington relations.",
                "In April, President Trump mocked Macron over France's refusal to join Israel and the US in the war against Iran. Trump said of Macron: 'His wife treats him extremely badly, he’s still recovering from the right to the jaw.' Macron retorted: 'I am not going to respond … They do not deserve a response.' However, he called Trump's words 'neither elegant nor up to scratch.'",
                "Brigitte Macron gave her own version: she had been 'very tired' after a turbulent flight, didn’t want to get out of the aircraft. 'He tried to make me laugh. He gave me some water and I pushed him away.' Advisers initially claimed the video was fake; later Macron said they were squabbling and joking, and he was taken by surprise.",
                "<span class='highlight-bad'>[Notable oddity in original source]</span> The article states that after a travel ban, Farahani 'managed to flee France' — but context from Iran suggests she fled Iran, not France. This logical inconsistency is highlighted."
            ],
            imageCaption: "🖼️ Brigitte Macron in Athens last month | Sir Keir Starmer & Macron in Yerevan, Armenia",
            questions: [
                { question: "What did Donald Trump say about Emmanuel Macron regarding the slap incident?", 
                  options: ["He praised Macron's diplomacy", "He said Macron's wife treats him extremely badly, still recovering from a jaw strike", "He claimed the video was AI-generated", "He offered to mediate"],
                  correct: 1,
                  explanation: "Trump mocked: 'His wife treats him extremely badly, he’s still recovering from the right to the jaw.'" },
                { question: "According to Brigitte Macron, why did she push her husband on the plane?", 
                  options: ["She saw a text message right there", "She was very tired after turbulence and didn’t want to exit", "She was angry about political decisions", "She was joking with bodyguards"],
                  correct: 1,
                  explanation: "She explained she was exhausted from turbulence, didn’t want to get out, and pushed him away when he gave her water." }
            ]
        },
        { // SLIDE 3 — Farahani's denials, activism, protest, and Western criticism
            title: "🎭 Golshifteh Farahani: Denials, Activism & Sharp Words",
            meta: "Exiled Iranian star speaks out against regimes and the West",
            paragraphs: [
                "Farahani twice denied the rumours. She told <em>Le Point</em>: 'I think that there is a lack of love for some people and they need to create romances like this to fill the void.' To <em>Gala</em> she said: 'Rumours, you have to let them go. Fair or unfair, they are only rumours. They are like waves that come and go.'",
                "A household name in Iran after films like <em>The Pear Tree</em>, she was fiercely criticized by the Islamic regime when she appeared without a hijab alongside Leonardo DiCaprio in Ridley Scott's <em>Body of Lies</em> (2008). Initially given a travel ban, she nevertheless managed to flee <span class='highlight-bad'>France [original says 'flee France' — but logically Iran]</span> — possible factual mix-up in the source.",
                "She caused further fury in her native country by posing topless for <em>Le Figaro</em> in 2012 as a political protest against Tehran. Banned from returning to Iran, she was unrepentant, later revealing her breasts again for a film promoting the Césars (French equivalent of the Oscars).",
                "A fierce critic of Iran’s clerics, she also denounced the West for plundering Iran: 'It was stolen from by the British, the Americans, the Europeans. Today, China and Russia are added to the list.' She was scathing of Trump but had little faith in Macron: 'Who cares about 12,000 people killed in only two days? NATO? France? What world are we living in? A world of brutal empires that just take their share and chew nations.'"
            ],
            imageCaption: "📽️ Farahani with Leonardo DiCaprio in 'Body of Lies' (2008)",
            questions: [
                { question: "How did Golshifteh Farahani characterize the affair rumors about her and Macron?", 
                  options: ["She confirmed a secret relationship", "She said rumours are like waves that come and go", "She threatened to sue the Élysée", "She said Macron asked her to marry him"],
                  correct: 1,
                  explanation: "She told Gala: 'Rumours are like waves that come and go; you have to let them go.'" },
                { question: "What political act did Farahani perform in 2012 that angered the Iranian regime?", 
                  options: ["She cut her hair short", "She posed topless for Le Figaro as a protest", "She refused to speak Persian", "She endorsed the Iranian opposition party"],
                  correct: 1,
                  explanation: "She posed topless for Le Figaro, widely interpreted as a political protest against Tehran." }
            ]
        },
        { // SLIDE 4 — Hundreds of diplomats fired by Trump (Reading 3)
            title: "🏛️ HUNDREDS OF DIPLOMATS FIRED BY TRUMP IN 'UNPRECEDENTED' MOVE",
            meta: "Bennito L. Kelty | May 16, 2026 | CNN & Rawstory",
            paragraphs: [
                "Hundreds of diplomats are being forced out of their jobs by the Trump administration despite ongoing global crises, according to a new report. The State Department finalized the firing of nearly 250 foreign service officers via email on Friday. The email read: 'Your reduction in force separation will be effective today. Thank you again for your service to the Department.'",
                "The reduction in forces also impacted staff that would have been able to 'provide guidance on the war in Iran,' former officials told CNN. On top of that, 'unprecedented numbers of people are choosing to leave' U.S. foreign services, said David Kostelancik, a retired diplomat.",
                "Roughly 2,000 foreign service officers left the State Department last year, CNN reported based on numbers from the American Foreign Service Association. Another 100 diplomatic posts in tense areas like the Middle East, Ukraine, and Russia still lack a Senate-confirmed ambassador.",
                "CNN also reported: 'The most sensitive diplomatic negotiations, on fraught topics like ending the war in Iran and securing an end to the Ukraine conflict, are being led by business associates and family members of President Donald Trump. Often without teams of experienced diplomats with regional expertise.'"
            ],
            imageCaption: "📷 U.S. Secretary of State Marco Rubio and President Trump aboard Air Force One, Oct 27, 2025",
            questions: [
                { question: "How many foreign service officers were fired by the State Department in the recent reduction (according to CNN)?", 
                  options: ["About 100", "Nearly 250", "Exactly 2,000", "Over 500"],
                  correct: 1,
                  explanation: "CNN reported that the State Department finalized the firing of nearly 250 foreign service officers via email." },
                { question: "Who is leading the most sensitive diplomatic negotiations according to the report?", 
                  options: ["Career ambassadors", "Senate-confirmed envoys", "Business associates and family members of President Trump", "NATO officials"],
                  correct: 2,
                  explanation: "CNN reported that negotiations are being led by Trump's business associates and family members, often without experienced diplomats." }
            ]
        },
        { // SLIDE 5 — Diplomatic vacuum and final context + war implications
            title: "⚠️ Global Crisis & Hollowed-Out Diplomacy",
            meta: "Iran war guidance, Ukraine, and unprecedented departures",
            paragraphs: [
                "The reduction comes amid active global crises: the war in Iran and the Ukraine conflict. Former officials warned that the fired staff included experts who could have provided critical guidance on Iran. The loss of institutional knowledge is described as alarming by retired diplomats.",
                "The American Foreign Service Association numbers show that roughly 2,000 foreign service officers left the State Department last year — an exodus described as 'unprecedented.' Many diplomatic posts in the Middle East, Ukraine, and Russia remain vacant without Senate-confirmed ambassadors.",
                "Critics argue that relying on political associates and family members for sensitive negotiations undermines U.S. credibility. The Trump administration has not publicly commented on the CNN report regarding the firings. Meanwhile, allies express concern about the hollowing out of professional diplomacy during active conflicts.",
                "As one former official noted: 'We are fighting wars without a full diplomatic corps. It’s risky and uncharted territory.' The long-term impact on U.S. foreign policy remains uncertain."
            ],
            imageCaption: "🌐 Diplomatic vacancies: 100+ posts unfilled in hotspots worldwide",
            questions: [
                { question: "According to the report, what is the consequence of firing diplomats with expertise on Iran?", 
                  options: ["It saves taxpayer money", "It removes guidance on the war in Iran", "It strengthens the Pentagon", "It was praised by allies"],
                  correct: 1,
                  explanation: "Former officials told CNN that the reduction impacted staff who would have provided guidance on the war in Iran." },
                { question: "How many diplomatic posts in tense regions like Middle East, Ukraine, Russia lack a Senate-confirmed ambassador?", 
                  options: ["25", "More than 100", "Exactly 50", "Nearly 300"],
                  correct: 1,
                  explanation: "CNN added that another 100 diplomatic posts around the world in tense areas still lack a Senate-confirmed ambassador." }
            ]
        }
    ];

    let currentSlide = 0;
    let userSelections = {}; // store selected option indices per slide per question? but not needed for persistence; we just render fresh each time

    function renderSlide(index) {
        const data = slidesData[index];
        const wrapper = document.getElementById('slidesWrapper');
        if (!wrapper) return;

        // build slide HTML
        let html = `<div class="slide active-slide" id="slide_${index}">`;
        html += `<h1>${data.title}</h1>`;
        html += `<div class="news-meta"><span>${data.meta}</span><span>🗞️ May 2026</span></div>`;

        // paragraphs
        data.paragraphs.forEach(para => {
            html += `<div class="content-card"><div class="eng-paragraph">${para}</div></div>`;
        });

        if (data.imageCaption) {
            html += `<div class="image-note" style="margin-top: 0.5rem;">🖼️ ${data.imageCaption}</div>`;
        }

        // interactive quiz section
        html += `<div class="quiz-area"><h3 style="font-weight: 600; margin-bottom: 0.75rem;">📖 Comprehension check</h3>`;
        data.questions.forEach((q, qIdx) => {
            const uniqueId = `q_${index}_${qIdx}`;
            const savedChoice = userSelections[uniqueId] !== undefined ? userSelections[uniqueId] : null;
            html += `<div class="question-card" id="${uniqueId}_card">`;
            html += `<div class="question-text">❓ ${q.question}</div>`;
            html += `<div class="options" id="${uniqueId}_opts">`;
            q.options.forEach((opt, optIdx) => {
                const isSelected = (savedChoice === optIdx);
                const selectedClass = isSelected ? 'opt-btn-selected' : '';
                html += `<button class="opt-btn ${selectedClass}" data-qid="${uniqueId}" data-opt="${optIdx}">${String.fromCharCode(65+optIdx)}. ${opt}</button>`;
            });
            html += `</div>`;
            if (savedChoice !== null) {
                const isCorrect = (savedChoice === q.correct);
                html += `<div class="feedback ${isCorrect ? 'correct-feedback' : 'wrong-feedback'}">`;
                if (isCorrect) html += `✅ Correct! ${q.explanation}`;
                else html += `❌ Incorrect. ${q.explanation}`;
                html += `</div>`;
            } else {
                html += `<div class="feedback" style="opacity:0.7;">💡 Click an option to check your understanding.</div>`;
            }
            html += `</div>`;
        });
        html += `</div></div>`;
        wrapper.innerHTML = html;
        document.getElementById('slideCounter').innerText = `Slide ${index+1} / ${slidesData.length}`;

        // attach event listeners to all option buttons
        document.querySelectorAll('.opt-btn').forEach(btn => {
            btn.removeEventListener('click', handleOptionClick);
            btn.addEventListener('click', handleOptionClick);
        });
    }

    function handleOptionClick(event) {
        const btn = event.currentTarget;
        const qid = btn.getAttribute('data-qid');
        const selectedOpt = parseInt(btn.getAttribute('data-opt'));
        if (isNaN(selectedOpt)) return;

        // extract slide index and q index from qid: format "q_<slideIdx>_<qIdx>"
        const parts = qid.split('_');
        if (parts.length < 3) return;
        const slideIdx = parseInt(parts[1]);
        const qIdx = parseInt(parts[2]);
        const slide = slidesData[slideIdx];
        if (!slide || !slide.questions[qIdx]) return;

        const correctIdx = slide.questions[qIdx].correct;
        const explanation = slide.questions[qIdx].explanation;
        const isCorrect = (selectedOpt === correctIdx);

        // store user selection
        userSelections[qid] = selectedOpt;

        // re-render current slide to show feedback and persist selection
        renderSlide(currentSlide);
        // after re-render, scroll slightly to quiz area to keep feedback visible
        const quizElement = document.querySelector('.quiz-area');
        if (quizElement) quizElement.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function nextSlide() {
        if (currentSlide < slidesData.length - 1) {
            currentSlide++;
            renderSlide(currentSlide);
        } else {
            // optional: loop or stay
            if (currentSlide === slidesData.length - 1) {
                // flash or just remain
                const indicator = document.getElementById('slideCounter');
                if (indicator) indicator.style.backgroundColor = "#f4cfb6";
                setTimeout(() => { if(indicator) indicator.style.backgroundColor = ""; }, 300);
            }
        }
    }

    function prevSlide() {
        if (currentSlide > 0) {
            currentSlide--;
            renderSlide(currentSlide);
        }
    }

    document.getElementById('prevSlideBtn')?.addEventListener('click', prevSlide);
    document.getElementById('nextSlideBtn')?.addEventListener('click', nextSlide);

    // initial render
    renderSlide(0);
</script>
</body>
</html>
