<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>News Quiz: Digital Sovereignty & Global Ceasefire</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f0f5fc 0%, #e6edf4 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }

        /* main quiz container */
        .quiz-container {
            max-width: 950px;
            margin: 0 auto;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(1px);
            border-radius: 3rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25), 0 2px 6px rgba(0,0,0,0.05);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* header area with dynamic status */
        .quiz-header {
            background: #0a1a2f;
            padding: 1.8rem 2rem 1.2rem 2rem;
            color: white;
        }

        .quiz-header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #FFFFFF, #b9e2ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .quiz-header p {
            opacity: 0.8;
            font-size: 0.95rem;
            margin-top: 0.3rem;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-top: 1.2rem;
            gap: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 1rem;
        }

        .score-box, .question-counter {
            background: rgba(255,255,255,0.12);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            backdrop-filter: blur(4px);
        }

        .score-box span, .question-counter span {
            font-weight: 700;
            font-size: 1.2rem;
            margin-left: 6px;
            color: #ffe5a3;
        }

        /* main quiz body */
        .quiz-card {
            padding: 2rem 2rem 2rem 2rem;
        }

        .question-text {
            font-size: 1.7rem;
            font-weight: 600;
            line-height: 1.35;
            color: #0a2942;
            margin-bottom: 2rem;
            border-left: 5px solid #2b7a62;
            padding-left: 1.2rem;
        }

        /* options grid */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .option-btn {
            background: #ffffff;
            border: 1.5px solid #cfdfed;
            border-radius: 1.5rem;
            padding: 1rem 1.5rem;
            font-size: 1rem;
            font-weight: 500;
            text-align: left;
            color: #1f3b4c;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(2px);
        }

        .option-prefix {
            font-weight: 700;
            background: #eef3fc;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
            color: #1f6392;
        }

        .option-btn:hover:not(:disabled) {
            background: #f4faff;
            border-color: #6c9ebf;
            transform: translateX(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .option-correct:disabled {
            background: #d4f0e3;
            border-color: #1f8a6b;
            color: #11553f;
        }

        .option-wrong:disabled {
            background: #ffe2e2;
            border-color: #cd5c5c;
            color: #9b2c2c;
            text-decoration: line-through;
        }

        .feedback-message {
            background: #f0f7fe;
            border-radius: 1.5rem;
            padding: 1rem 1.5rem;
            margin: 0.5rem 0 1.5rem;
            font-size: 0.95rem;
            border-left: 6px solid #2b7a62;
            color: #1f3e54;
        }

        .next-button {
            background: #0f3b2f;
            color: white;
            border: none;
            border-radius: 3rem;
            padding: 0.9rem 2rem;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            font-family: inherit;
            box-shadow: 0 5px 0 #062015;
            transform: translateY(-2px);
        }

        .next-button:hover:not(:disabled) {
            background: #1b5e48;
            transform: translateY(0px);
            box-shadow: 0 2px 0 #062015;
        }

        .next-button:disabled {
            background: #9bb7ac;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 2px 0 #5a7668;
        }

        .reset-area {
            text-align: center;
            margin-top: 2rem;
        }

        .reset-btn {
            background: transparent;
            border: 1px solid #7f9cae;
            color: #1f4e6e;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .reset-btn:hover {
            background: #eef2f7;
            border-color: #3c7a9e;
        }

        /* results style */
        .result-card {
            text-align: center;
            padding: 2rem;
        }

        .final-score {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(145deg, #0f3b2f, #226653);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 1rem 0;
        }

        hr {
            margin: 1rem 0;
            border: none;
            height: 2px;
            background: #cde0ec;
        }

        footer {
            font-size: 0.75rem;
            text-align: center;
            padding: 1rem;
            background: #f9fbfd;
            color: #6a7c8b;
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }
            .question-text {
                font-size: 1.3rem;
            }
            .quiz-card {
                padding: 1.5rem;
            }
            .option-btn {
                padding: 0.8rem 1rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-container" id="quizRoot">
    <!-- dynamic injection -->
    <div id="quizDynamic"></div>
    <footer>
        📰 Based on The Times (Celonis) & Fox News (Putin/ceasefire) • May 2026
    </footer>
</div>

<script>
    // ========================
    // QUIZ DATA from provided news clips: 
    // Reading 1 (Celonis, digital sovereignty, process mining, Palantir)
    // Reading 2 (Putin ceasefire, prisoner swap, Trump-brokered)
    // ========================
    const QUIZ_DATA = [
        {
            question: "What is the name of the German software company that offers 'process mining' and aims to provide a European alternative to US tech firms like Palantir?",
            options: ["SAP", "Celonis", "Airbus Digital", "Siemens AI"],
            correct: 1,
            explanation: "Celonis, co-founded by Bastian Nominacher, provides process mining and positions itself as a sovereign European solution."
        },
        {
            question: "According to the article, McKinsey estimated that spending on European sovereign technological capabilities could hit how much worldwide by the end of the decade?",
            options: ["$200 billion", "$400 billion", "$600 billion", "$1 trillion"],
            correct: 2,
            explanation: "McKinsey estimated spending could reach $600 billion worldwide by the end of the decade, boosting European digital sovereignty efforts."
        },
        {
            question: "Which controversial US company, founded by Peter Thiel, does Celonis increasingly compete against in the public and commercial sector?",
            options: ["Google", "Palantir", "Microsoft", "Amazon"],
            correct: 1,
            explanation: "Celonis directly competes with Palantir, which is known for its 'black box' approach. Celonis emphasizes transparency and European values."
        },
        {
            question: "Which UK public body signed a deal with Celonis in January to streamline processes for about half a million civil servants?",
            options: ["NHS England", "UK Cabinet Office", "Department for Transport", "HM Treasury"],
            correct: 1,
            explanation: "Celonis signed a deal with the UK Cabinet Office to consolidate back-office functions and improve efficiency for civil servants."
        },
        {
            question: "According to Bastian Nominacher, in which technological domain is Europe arguably ahead of the US, giving it an edge in combination with AI?",
            options: ["Large language models", "Process mining", "Cloud infrastructure", "Quantum computing"],
            correct: 1,
            explanation: "Nominacher stated that process mining is an area where Europe is ahead based on research and publications, creating a strong AI advantage."
        },
        {
            question: "Who is the digital minister of Germany that recently expressed desire for a European alternative to Palantir?",
            options: ["Karsten Wildberger", "Olaf Scholz", "Robert Habeck", "Anna Lena Baerbock"],
            correct: 0,
            explanation: "Karsten Wildberger, Germany’s digital minister, said he wanted a European alternative to Palantir, citing digital sovereignty concerns."
        },
        {
            question: "According to Reading 2 (Fox News), how long is the Trump-brokered ceasefire that began on May 9, 2026?",
            options: ["One day", "Three days (Saturday through Monday)", "One week", "Two days"],
            correct: 1,
            explanation: "The ceasefire began Saturday, May 9, and runs through Monday, May 11 — a three-day pause in kinetic activity."
        },
        {
            question: "What is the number of prisoners exchanged from each country under the ceasefire agreement mediated by the US?",
            options: ["500 prisoners", "750 prisoners", "1,000 prisoners", "2,000 prisoners"],
            correct: 2,
            explanation: "Both Russia and Ukraine agreed to swap 1,000 prisoners from each side, as confirmed by Trump and Zelenskyy."
        },
        {
            question: "Which former German chancellor did Putin mention he would prefer to talk to when asked about talks with European leaders?",
            options: ["Angela Merkel", "Helmut Kohl", "Gerhard Schroeder", "Olaf Scholz"],
            correct: 2,
            explanation: "Putin told reporters he would prefer to talk to former German Chancellor Gerhard Schroeder."
        },
        {
            question: "Celonis currently works with what fraction of the FTSE 100 companies, according to the article?",
            options: ["A tenth", "A fifth", "A third", "Half"],
            correct: 1,
            explanation: "Celonis works with a fifth of the FTSE 100, showing its strong footprint in the UK private sector."
        },
        {
            question: "Which European parliament resolution passed in January supports reducing the EU's reliance on foreign providers?",
            options: ["Digital Markets Act", "Technological sovereignty resolution", "AI Act", "Cloud Independence Pact"],
            correct: 1,
            explanation: "The European parliament passed a 'technological sovereignty' resolution to reduce dependency on foreign providers."
        },
        {
            question: "According to Putin's statement on May 9, 2026, how did he describe the current state of the war with Ukraine?",
            options: ["It is escalating", "It is coming to an end", "It is at a stalemate", "Just beginning"],
            correct: 1,
            explanation: "Putin told reporters: 'I think that the matter is coming to an end,' suggesting confidence in approaching conclusion."
        }
    ];

    // app state
    let currentIndex = 0;
    let userAnswers = new Array(QUIZ_DATA.length).fill(null); // stores { selectedIdx, isCorrect }
    let selectedOptionIdx = null;
    let answerLocked = false;    // after answering, block further clicks until next

    // DOM elements
    const quizRoot = document.getElementById("quizDynamic");

    function render() {
        if (!quizRoot) return;

        // if quiz finished
        const allAnswered = userAnswers.every(ans => ans !== null);
        if (allAnswered && currentIndex === QUIZ_DATA.length) {
            renderResults();
            return;
        }

        // make sure currentIndex within bounds
        if (currentIndex >= QUIZ_DATA.length) {
            renderResults();
            return;
        }

        const currentQ = QUIZ_DATA[currentIndex];
        const existingAnswer = userAnswers[currentIndex];
        const isAnswered = existingAnswer !== null;
        let correctAnswerIdx = -1;
        let userChosenWrong = false;
        let userChosenCorrect = false;
        let selectedIdxForDisplay = null;

        if (isAnswered) {
            selectedIdxForDisplay = existingAnswer.selectedIdx;
            correctAnswerIdx = currentQ.correct;
            userChosenCorrect = existingAnswer.isCorrect;
            userChosenWrong = !existingAnswer.isCorrect;
            answerLocked = true;
        } else {
            answerLocked = false;
            selectedOptionIdx = null;
        }

        // compute current score
        const totalScore = userAnswers.reduce((acc, ans) => acc + (ans && ans.isCorrect ? 1 : 0), 0);

        const html = `
            <div class="quiz-header">
                <h1>📰 News IQ Challenge</h1>
                <p>Test your knowledge on European digital sovereignty & Russia-Ukraine ceasefire (May 2026)</p>
                <div class="stats-row">
                    <div class="score-box">🎯 Score: <span>${totalScore}</span> / ${QUIZ_DATA.length}</div>
                    <div class="question-counter">📌 Question <span>${currentIndex+1}</span> / ${QUIZ_DATA.length}</div>
                </div>
            </div>
            <div class="quiz-card">
                <div class="question-text">${escapeHtml(currentQ.question)}</div>
                <div class="options-list" id="optionsContainer">
                    ${currentQ.options.map((opt, idx) => {
                        let additionalClass = "";
                        let disabledAttr = answerLocked ? "disabled" : "";
                        let prefixLetter = String.fromCharCode(65+idx); // A,B,C,D
                        let isSelectedForHighlight = (isAnswered && selectedIdxForDisplay === idx);
                        let isCorrectAnswer = (idx === currentQ.correct);
                        
                        // styling after answer given
                        if (isAnswered) {
                            if (isCorrectAnswer) {
                                additionalClass = "option-correct";
                            } else if (isSelectedForHighlight && !isCorrectAnswer) {
                                additionalClass = "option-wrong";
                            }
                        }
                        
                        return `
                            <button class="option-btn ${additionalClass}" data-opt-index="${idx}" ${disabledAttr}>
                                <span class="option-prefix">${prefixLetter}</span>
                                <span>${escapeHtml(opt)}</span>
                            </button>
                        `;
                    }).join('')}
                </div>
                ${isAnswered ? `
                    <div class="feedback-message">
                        <strong>📖 ${userChosenCorrect ? '✓ Correct!' : '✗ Incorrect'}</strong><br>
                        ${escapeHtml(currentQ.explanation)}
                    </div>
                ` : ''}
                <button class="next-button" id="nextButton" ${!isAnswered ? 'disabled' : ''}>
                    ${currentIndex + 1 === QUIZ_DATA.length ? '🏁 Finish Quiz' : 'Next Question →'}
                </button>
                <div class="reset-area">
                    <button class="reset-btn" id="resetQuizBtn">⟳ Restart Quiz</button>
                </div>
            </div>
        `;

        quizRoot.innerHTML = html;

        // attach event listeners for options if not answered
        if (!isAnswered) {
            const optionBtns = document.querySelectorAll('.option-btn');
            optionBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (answerLocked) return;
                    const idx = parseInt(btn.dataset.optIndex);
                    handleAnswer(idx);
                });
            });
        }

        const nextBtn = document.getElementById('nextButton');
        if (nextBtn) {
            nextBtn.addEventListener('click', handleNext);
        }
        const resetBtn = document.getElementById('resetQuizBtn');
        if (resetBtn) {
            resetBtn.addEventListener('click', resetQuiz);
        }
    }

    function handleAnswer(selectedIdx) {
        if (answerLocked) return;
        const currentQ = QUIZ_DATA[currentIndex];
        const isCorrect = (selectedIdx === currentQ.correct);
        // store answer
        userAnswers[currentIndex] = {
            selectedIdx: selectedIdx,
            isCorrect: isCorrect
        };
        answerLocked = true;
        // re-render with locked answer
        render();
    }

    function handleNext() {
        // ensure current question answered
        if (userAnswers[currentIndex] === null) return;

        if (currentIndex + 1 < QUIZ_DATA.length) {
            currentIndex++;
            // reset any local temporary locks, render new question
            answerLocked = false;
            selectedOptionIdx = null;
            render();
        } else if (currentIndex + 1 === QUIZ_DATA.length) {
            // finish quiz: move to final results
            currentIndex++; // set to length to trigger results view
            render();
        }
    }

    function resetQuiz() {
        // full reset
        currentIndex = 0;
        userAnswers = new Array(QUIZ_DATA.length).fill(null);
        answerLocked = false;
        selectedOptionIdx = null;
        render();
    }

    function renderResults() {
        const totalQuestions = QUIZ_DATA.length;
        const totalScore = userAnswers.reduce((acc, ans) => acc + (ans && ans.isCorrect ? 1 : 0), 0);
        const percentage = Math.round((totalScore / totalQuestions) * 100);
        let performanceMessage = "";
        if (percentage === 100) performanceMessage = "🏆 Flawless! News expert!";
        else if (percentage >= 80) performanceMessage = "📰 Impressive! You really know your news.";
        else if (percentage >= 60) performanceMessage = "👍 Solid understanding. Keep following global affairs!";
        else performanceMessage = "📚 Good try! Re-read the clippings to sharpen your knowledge.";

        // detailed results list
        let resultDetails = "";
        for (let i = 0; i < QUIZ_DATA.length; i++) {
            const q = QUIZ_DATA[i];
            const userAns = userAnswers[i];
            const isCorrect = userAns ? userAns.isCorrect : false;
            const userChoiceIdx = userAns ? userAns.selectedIdx : -1;
            const correctOptionText = q.options[q.correct];
            const userChoiceText = (userChoiceIdx !== -1) ? q.options[userChoiceIdx] : "Not answered";
            const statusIcon = isCorrect ? "✅" : "❌";
            resultDetails += `
                <div style="margin-bottom: 1rem; padding-bottom: 0.8rem; border-bottom: 1px solid #e0edf5;">
                    <div style="font-weight: 600;">${statusIcon} ${escapeHtml(q.question)}</div>
                    <div style="font-size: 0.85rem; margin-top: 6px;">✔️ Correct: ${escapeHtml(correctOptionText)}</div>
                    ${!isCorrect ? `<div style="font-size: 0.85rem; color:#b13a3a;">❌ Your answer: ${escapeHtml(userChoiceText)}</div>` : `<div style="font-size: 0.85rem; color:#2b7a62;">📌 Your answer: ${escapeHtml(userChoiceText)}</div>`}
                    <div style="font-size: 0.8rem; color:#4f6f8a; margin-top: 5px;">💡 ${escapeHtml(q.explanation)}</div>
                </div>
            `;
        }

        const resultsHtml = `
            <div class="quiz-header">
                <h1>📊 Quiz Completed</h1>
                <p>Your score on European digital sovereignty & Ukraine ceasefire news</p>
                <div class="stats-row">
                    <div class="score-box">🏅 Final Score: <span>${totalScore}</span> / ${totalQuestions}</div>
                    <div class="question-counter">📈 Accuracy: ${percentage}%</div>
                </div>
            </div>
            <div class="quiz-card result-card">
                <div class="final-score">${totalScore} / ${totalQuestions}</div>
                <p style="margin-bottom: 1rem;">${performanceMessage}</p>
                <hr/>
                <div style="text-align: left; margin-top: 1rem; max-height: 450px; overflow-y: auto; padding-right: 6px;">
                    ${resultDetails}
                </div>
                <div class="reset-area" style="margin-top: 2rem;">
                    <button class="reset-btn" id="resetFromResultsBtn">⟳ Take Quiz Again</button>
                </div>
            </div>
        `;
        quizRoot.innerHTML = resultsHtml;
        const resetBtn = document.getElementById('resetFromResultsBtn');
        if (resetBtn) {
            resetBtn.addEventListener('click', resetQuiz);
        }
    }

    // simple XSS prevention
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // initial render
    render();
</script>
</body>
</html>
