<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Prompt Selector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f3ef;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #1a1a1a;
            padding: 2rem 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .card {
            background: white;
            border-radius: 28px;
            padding: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #e7e3dc;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1f2b2c;
            margin-bottom: 1.5rem;
        }

        .selector-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #7b6e5d;
            margin-bottom: 0.5rem;
        }

        select {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 16px;
            border: 1px solid #ddd8cf;
            background: #fefcf9;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        select:hover {
            border-color: #b7aa98;
        }

        select:focus {
            outline: none;
            border-color: #b7aa98;
            background: #fff;
        }

        .prompt-display {
            background: #1e2829;
            color: #e5e9e8;
            padding: 1.2rem;
            border-radius: 16px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            white-space: pre-wrap;
            word-break: break-word;
            margin: 1rem 0;
            border: 1px solid #3b4b4a;
            min-height: 100px;
            max-height: 400px;
            overflow-y: auto;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 1rem 0;
        }

        .btn {
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-secondary {
            background: #f0ede8;
            color: #2b4a4d;
            border: 1px solid #ddd2c4;
        }

        .btn-secondary:hover {
            background: #e2d9cf;
        }

        .status {
            font-size: 0.8rem;
            color: #6f6a60;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📋 Simple Prompt Selector</h1>
            
            <div class="selector-group">
                <label>⭐ Favorite Prompts</label>
                <select id="favoritesSelect">
                    <option value="">— Choose a preset —</option>
                    <option value="standard">📋 English-Russian Table</option>
                    <option value="methodist">📝 Статья для Дзен</option>
                </select>
            </div>

            <div class="button-group">
                <button id="copyBtn" class="btn btn-secondary">📋 Copy Prompt</button>
            </div>

            <div class="prompt-display" id="promptDisplay">
                Select a preset to load a prompt template.
            </div>

            <div class="status" id="statusMessage">💡 Choose a preset from the dropdown above</div>
        </div>
    </div>

    <script>
        // --- Prompt Presets ---
        const prompts = {
            standard: {
                name: '📋 English-Russian Table',
                prompt: `DeepSeek: Translate the following text from English to Russian. Provide a clear, accurate translation with a focus on natural language flow.

REQUIREMENTS:
1. Provide a clean translation
2. Highlight any advanced vocabulary
3. Include a brief glossary of key terms
4. Format as a table: English | Russian

OUTPUT: Complete response only, no extra commentary.`
            },

            methodist: {
                name: '📝 Статья для Дзен',
                prompt: `Напиши интересную статью для Дзен на основе вложенных файлов pdf-презентации и транскрипции мероприятия.

ТРЕБОВАНИЯ К СТАТЬЕ:

Статья должна быть на русском языке.

Использование исходного материала:
В тексте статьи используй номера слайдов [SLIDE X] из презентации, которые надо вставить в определенные места статьи согласно ее содержанию. Номера слайдов во всем тексте не должны повторяться. Если на слайдах содержится англоязычный текст - повтори его в тексте сразу после слайда и напиши пояснения на русском языке. Если это приемлемо - сделай пояснения интересными. Если на слайдах русский текст - тогда указанное для английского текста не применяй. Если использовался AI - приведи полностью текст AI на английском и дай пояснения на русском.

Требования для работы с англоязычным исходным материалом:
— Опираться на слайды с вокабуляром. Если идиома или ключевое слово есть в слайде, обязательно указать это.
— Представить лексику в текстовом формате (НЕ ТАБЛИЦЫ).
Для каждой единицы лексики:
— Сама фраза/слово на английском.
— Буквальное значение (если применимо).
— Переносное значение / значение в контексте.
— Пример из материала (цитата + перевод).
— Как эта лексика объясняется в методичке (цитата из слайда + перевод).

Метафоры, символы и ключевые идеи
— Опираться на слайды, где анализируются глубинные смыслы. Цитировать их.
— 3-4 ключевых элемента из материала (символы, метафоры, основные тезисы).
— Объяснение их значения на русском.
— Цитата из слайда с трактовкой.

Структура статьи:

Заголовок
Должен быть кликабельным и информативным - содержать название темы и ключевую познавательную цель.

Структура
Вступление (1-2 абзаца):
— Интригующий вопрос или факт, связанный с темой материала.
— Краткое представление материала и его познавательную ценность (опираясь на вводные слайды.

Основная часть:
Раздел 1: Содержание и контекст
— Краткое изложение сути материала (2-3 абзаца)
— Ключевые моменты, важные для изучения языка.
— По каждому слайду приведи цитату идеи из слайда.
— Живой пример из урока (диалог учителя, ученика или AI), который ИЛЛЮСТРИРУЕТ эту идею из слайда.
— Практический совет для читателя, развивающий мысль из слайда.
— Комментарий учителя из транскрипции (если есть).

Заключение (1-2 абзаца):
— Вдохновляющая цитата из слайдов или материала.
— Главный вывод для изучающих язык, основанный на итоговом слайде.
— Призыв к действию (практиковаться, пересмотреть материал в оригинале, применить знания и т.д.).

ФОРМАТИРОВАНИЕ
Для Дзена:
— НЕ использовать таблицы (заменять на текст с маркированными списками или нумерованными списками).
— Использовать жирный шрифт для ключевых фраз.
— Использовать курсив для цитат на русском.
— Разделять разделы подзаголовками (##).
— Вставлять эмодзи (👩‍🏫, 💡, 📌, ⚠️) для визуального разнообразия.
— Ссылки на слайды ставить строго в квадратных скобках: [SLIDE 5].
Для цитат:
— Оригинал на английском → перевод на русском.
— Перевод выделять жирным или отдельным абзацем.
— Комментарии учителя помечать 👩‍🏫 и выделять курсивом.

СТИЛЬ ИЗЛОЖЕНИЯ
— Разговорный, но грамотный.
— Вдохновляющий и мотивирующий.

ВАЖНОЕ НАПОМИНАНИЕ:
ОБЯЗАТЕЛЬНО проверяй, что номера слайдов в статье соответствуют номерам в PDF.
Добавляй комментарии учителя из транскрипции, чтобы связать теорию из слайдов с живой практикой (если есть).

Еще раз напоминаю - если использовался AI - приведи полностью текст AI на английском и дай перевод и пояснения на русском.`
            }
        };

        // --- DOM Elements ---
        const favoritesSelect = document.getElementById('favoritesSelect');
        const copyBtn = document.getElementById('copyBtn');
        const promptDisplay = document.getElementById('promptDisplay');
        const statusMessage = document.getElementById('statusMessage');

        // --- Helper Functions ---
        function getSelectedPrompt() {
            const key = favoritesSelect.value;
            return prompts[key] || null;
        }

        function loadPrompt() {
            const selected = getSelectedPrompt();
            
            if (!selected) {
                promptDisplay.textContent = '⚠️ Please select a prompt preset from the dropdown.';
                statusMessage.textContent = 'ℹ️ No prompt selected.';
                statusMessage.style.color = '#6f6a60';
                return;
            }

            promptDisplay.textContent = selected.prompt;
            
            statusMessage.textContent = `✅ Loaded: ${selected.name}`;
            statusMessage.style.color = '#2c4b4e';
        }

        async function copyPrompt() {
            const text = promptDisplay.textContent;
            
            if (!text || 
                text === 'Select a preset to load a prompt template.' || 
                text === '⚠️ Please select a prompt preset from the dropdown.') {
                statusMessage.textContent = '⚠️ Select a preset first to copy a prompt.';
                statusMessage.style.color = '#a05252';
                return;
            }

            try {
                await navigator.clipboard.writeText(text);
                statusMessage.textContent = '✅ Copied to clipboard!';
                statusMessage.style.color = '#2c4b4e';
                copyBtn.textContent = '✅ Copied!';
                setTimeout(() => {
                    copyBtn.textContent = '📋 Copy Prompt';
                }, 2000);
            } catch (err) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                
                statusMessage.textContent = '✅ Copied to clipboard!';
                statusMessage.style.color = '#2c4b4e';
            }
        }

        // --- auto-update on any change ---
        function autoUpdate() {
            loadPrompt();
        }

        // --- Event Listeners ---
        copyBtn.addEventListener('click', copyPrompt);
        favoritesSelect.addEventListener('change', autoUpdate);

        // initial load
        autoUpdate();
    </script>
</body>
</html>
