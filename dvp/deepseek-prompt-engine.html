<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Prompt Selector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f3ef;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #1a1a1a;
            padding: 2rem 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .card {
            background: white;
            border-radius: 28px;
            padding: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #e7e3dc;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1f2b2c;
            margin-bottom: 1.5rem;
        }

        .selector-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #7b6e5d;
            margin-bottom: 0.5rem;
        }

        select, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 16px;
            border: 1px solid #ddd8cf;
            background: #fefcf9;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        select:hover, textarea:hover {
            border-color: #b7aa98;
        }

        select:focus, textarea:focus {
            outline: none;
            border-color: #b7aa98;
            background: #fff;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .prompt-display {
            background: #1e2829;
            color: #e5e9e8;
            padding: 1.2rem;
            border-radius: 16px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            white-space: pre-wrap;
            word-break: break-word;
            margin: 1rem 0;
            border: 1px solid #3b4b4a;
            min-height: 100px;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 1rem 0;
        }

        .btn {
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: #2c4b4e;
            color: white;
        }

        .btn-primary:hover {
            background: #1f3a3c;
            transform: scale(0.98);
        }

        .btn-secondary {
            background: #f0ede8;
            color: #2b4a4d;
            border: 1px solid #ddd2c4;
        }

        .btn-secondary:hover {
            background: #e2d9cf;
        }

        .badge {
            display: inline-block;
            background: #eae7e1;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #2f4b4e;
        }

        .status {
            font-size: 0.8rem;
            color: #6f6a60;
            margin-top: 0.5rem;
        }

        .favorites-section {
            border-top: 1px solid #eee8e0;
            padding-top: 1.5rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📋 Simple Prompt Selector</h1>
            
            <div class="selector-group">
                <label>⭐ Favorite Prompts</label>
                <select id="favoritesSelect">
                    <option value="">— Choose a preset —</option>
                    <option value="standard">📋 Standard Translation</option>
                    <option value="academic">🎓 Academic Style</option>
                    <option value="creative">✍️ Creative Writing</option>
                    <option value="technical">⚙️ Technical Focus</option>
                    <option value="custom">🔧 Custom Prompt</option>
                </select>
            </div>

            <div class="selector-group">
                <label>📝 Source Text (optional)</label>
                <textarea id="sourceText" placeholder="Paste your text here or use the preset..."></textarea>
            </div>

            <div class="button-group">
                <button id="loadBtn" class="btn btn-primary">📂 Load Selected Prompt</button>
                <button id="copyBtn" class="btn btn-secondary">📋 Copy Prompt</button>
            </div>

            <div class="prompt-display" id="promptDisplay">
                Select a preset to load a prompt template.
            </div>

            <div class="status" id="statusMessage">💡 Choose a preset from the dropdown above</div>
        </div>
    </div>

    <script>
        // --- Prompt Presets ---
        const prompts = {
            standard: {
                name: '📋 Standard Translation',
                prompt: `DeepSeek: Translate the following text from English to Russian. Provide a clear, accurate translation with a focus on natural language flow.

SOURCE TEXT:
{{text}}

REQUIREMENTS:
1. Provide a clean translation
2. Highlight any advanced vocabulary
3. Include a brief glossary of key terms
4. Format as a table: English | Russian

OUTPUT: Complete response only, no extra commentary.`
            },
            
            academic: {
                name: '🎓 Academic Style',
                prompt: `DeepSeek: Translate the following academic text from English to Russian. Maintain formal register and academic tone.

SOURCE TEXT:
{{text}}

REQUIREMENTS:
1. Use formal academic Russian
2. Preserve technical terminology
3. Include footnotes for key concepts
4. Provide a bibliography of translated terms

OUTPUT: Academic translation with proper formatting.`
            },
            
            creative: {
                name: '✍️ Creative Writing',
                prompt: `DeepSeek: Translate the following creative text from English to Russian. Capture the literary style, emotional tone, and artistic expression.

SOURCE TEXT:
{{text}}

REQUIREMENTS:
1. Preserve literary devices
2. Maintain emotional impact
3. Use poetic and expressive language
4. Keep the original's artistic voice

OUTPUT: Creative translation that reads naturally in Russian.`
            },
            
            technical: {
                name: '⚙️ Technical Focus',
                prompt: `DeepSeek: Translate the following technical documentation from English to Russian. Ensure precise terminology and clear technical communication.

SOURCE TEXT:
{{text}}

REQUIREMENTS:
1. Use standard technical Russian terminology
2. Create a glossary of technical terms
3. Add notes for complex concepts
4. Include code examples if present

OUTPUT: Technical translation with terminology reference.`
            },
            
            custom: {
                name: '🔧 Custom Prompt',
                prompt: `DeepSeek: Translate the following text from English to Russian according to your best judgment.

SOURCE TEXT:
{{text}}

OUTPUT: Provide a complete, well-formatted translation.`
            }
        };

        // --- DOM Elements ---
        const favoritesSelect = document.getElementById('favoritesSelect');
        const sourceText = document.getElementById('sourceText');
        const loadBtn = document.getElementById('loadBtn');
        const copyBtn = document.getElementById('copyBtn');
        const promptDisplay = document.getElementById('promptDisplay');
        const statusMessage = document.getElementById('statusMessage');

        // --- Helper Functions ---
        function getCurrentText() {
            return sourceText.value.trim() || 'No text provided. Please add source text.';
        }

        function getSelectedPrompt() {
            const key = favoritesSelect.value;
            return prompts[key] || null;
        }

        function loadPrompt() {
            const selected = getSelectedPrompt();
            
            if (!selected) {
                promptDisplay.textContent = '⚠️ Please select a prompt preset from the dropdown.';
                statusMessage.textContent = 'ℹ️ No prompt selected.';
                return;
            }

            const text = getCurrentText();
            const filledPrompt = selected.prompt.replace('{{text}}', text);
            
            promptDisplay.textContent = filledPrompt;
            statusMessage.textContent = `✅ Loaded: ${selected.name}`;
            statusMessage.style.color = '#2c4b4e';
        }

        async function copyPrompt() {
            const text = promptDisplay.textContent;
            
            if (!text || text === 'Select a preset to load a prompt template.' || text.includes('⚠️')) {
                statusMessage.textContent = '⚠️ Nothing to copy. Load a prompt first.';
                statusMessage.style.color = '#a05252';
                return;
            }

            try {
                await navigator.clipboard.writeText(text);
                statusMessage.textContent = '✅ Copied to clipboard!';
                statusMessage.style.color = '#2c4b4e';
                copyBtn.textContent = '✅ Copied!';
                setTimeout(() => {
                    copyBtn.textContent = '📋 Copy Prompt';
                }, 2000);
            } catch (err) {
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                
                statusMessage.textContent = '✅ Copied to clipboard!';
                statusMessage.style.color = '#2c4b4e';
            }
        }

        // --- Event Listeners ---
        loadBtn.addEventListener('click', loadPrompt);
        copyBtn.addEventListener('click', copyPrompt);
        
        favoritesSelect.addEventListener('change', () => {
            const selected = getSelectedPrompt();
            if (selected) {
                statusMessage.textContent = `📌 Selected: ${selected.name}`;
                statusMessage.style.color = '#6f6a60';
            } else {
                statusMessage.textContent = '💡 Choose a preset from the dropdown above';
                statusMessage.style.color = '#6f6a60';
            }
        });

        sourceText.addEventListener('input', () => {
            statusMessage.textContent = '✏️ Source text updated. Click "Load Selected Prompt" to refresh.';
            statusMessage.style.color = '#6f6a60';
        });

        // --- Load default on page load ---
        // Uncomment to auto-load a default preset
        // favoritesSelect.value = 'standard';
        // loadPrompt();
    </script>
</body>
</html>
