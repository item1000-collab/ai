<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Prompt Selector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f3ef;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #1a1a1a;
            padding: 2rem 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .card {
            background: white;
            border-radius: 28px;
            padding: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #e7e3dc;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1f2b2c;
            margin-bottom: 1.5rem;
        }

        .selector-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #7b6e5d;
            margin-bottom: 0.5rem;
        }

        select, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 16px;
            border: 1px solid #ddd8cf;
            background: #fefcf9;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        select:hover, textarea:hover {
            border-color: #b7aa98;
        }

        select:focus, textarea:focus {
            outline: none;
            border-color: #b7aa98;
            background: #fff;
        }

        .language-row {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .language-row select {
            flex: 1;
            min-width: 140px;
        }

        .arrow {
            font-size: 1.2rem;
            color: #7b6e5d;
            font-weight: 300;
            user-select: none;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.4rem 0;
            flex-wrap: wrap;
        }

        .toggle {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
            flex-shrink: 0;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #ccc;
            transition: .3s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background: white;
            transition: .3s;
            border-radius: 50%;
        }

        .toggle input:checked + .slider {
            background: #2c4b4e;
        }

        .toggle input:checked + .slider:before {
            transform: translateX(22px);
        }

        .toggle-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #1f2b2c;
        }

        .toggle-hint {
            font-size: 0.75rem;
            color: #7b6e5d;
            margin-left: auto;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .prompt-display {
            background: #1e2829;
            color: #e5e9e8;
            padding: 1.2rem;
            border-radius: 16px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            white-space: pre-wrap;
            word-break: break-word;
            margin: 1rem 0;
            border: 1px solid #3b4b4a;
            min-height: 100px;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 1rem 0;
        }

        .btn {
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: #2c4b4e;
            color: white;
        }

        .btn-primary:hover {
            background: #1f3a3c;
            transform: scale(0.98);
        }

        .btn-secondary {
            background: #f0ede8;
            color: #2b4a4d;
            border: 1px solid #ddd2c4;
        }

        .btn-secondary:hover {
            background: #e2d9cf;
        }

        .status {
            font-size: 0.8rem;
            color: #6f6a60;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📋 Simple Prompt Selector</h1>
            
            <div class="selector-group">
                <label>⭐ Favorite Prompts</label>
                <select id="favoritesSelect">
                    <option value="">— Choose a preset —</option>
                    <option value="standard">📋 Standard Translation</option>
                    <option value="academic">🎓 Academic Style</option>
                    <option value="creative">✍️ Creative Writing</option>
                    <option value="technical">⚙️ Technical Focus</option>
                    <option value="custom">🔧 Custom Prompt</option>
                </select>
            </div>

            <div class="selector-group">
                <label>🌐 Language Pair</label>
                <div class="language-row">
                    <select id="sourceLang">
                        <option value="English">English</option>
                        <option value="Russian">Russian</option>
                        <option value="Spanish">Spanish</option>
                        <option value="French">French</option>
                        <option value="German">German</option>
                        <option value="Chinese">Chinese</option>
                        <option value="Japanese">Japanese</option>
                        <option value="Korean">Korean</option>
                    </select>
                    <span class="arrow">→</span>
                    <select id="targetLang">
                        <option value="Russian">Russian</option>
                        <option value="English">English</option>
                        <option value="Spanish">Spanish</option>
                        <option value="French">French</option>
                        <option value="German">German</option>
                        <option value="Chinese">Chinese</option>
                        <option value="Japanese">Japanese</option>
                        <option value="Korean">Korean</option>
                    </select>
                </div>
            </div>

            <div class="selector-group">
                <div class="toggle-row">
                    <label class="toggle">
                        <input type="checkbox" id="bilingualToggle" checked>
                        <span class="slider"></span>
                    </label>
                    <span class="toggle-label">📊 Двуязычный перевод (таблица)</span>
                    <span class="toggle-hint">слева — исходный, справа — перевод</span>
                </div>
            </div>

            <div class="selector-group">
                <label>📝 Source Text (optional)</label>
                <textarea id="sourceText" placeholder="Paste your text here or use the preset..."></textarea>
            </div>

            <div class="button-group">
                <button id="loadBtn" class="btn btn-primary">📂 Load Selected Prompt</button>
                <button id="copyBtn" class="btn btn-secondary">📋 Copy Prompt</button>
            </div>

            <div class="prompt-display" id="promptDisplay">
                Select a preset to load a prompt template.
            </div>

            <div class="status" id="statusMessage">💡 Choose a preset from the dropdown above</div>
        </div>
    </div>

    <script>
        // --- Prompt Presets (with bilingual table support) ---
        const prompts = {
            standard: {
                name: '📋 Standard Translation',
                prompt: `DeepSeek: Translate the following text from {sourceLang} to {targetLang}. Provide a clear, accurate translation with a focus on natural language flow.

{bilingualSection}
REQUIREMENTS:
1. Provide a clean translation
2. Highlight any advanced vocabulary
3. Include a brief glossary of key terms
4. Format as a table: {sourceLang} | {targetLang}

OUTPUT: Complete response only, no extra commentary.`
            },
            
            academic: {
                name: '🎓 Academic Style',
                prompt: `DeepSeek: Translate the following academic text from {sourceLang} to {targetLang}. Maintain formal register and academic tone.

{bilingualSection}
REQUIREMENTS:
1. Use formal academic {targetLang}
2. Preserve technical terminology
3. Include footnotes for key concepts
4. Provide a bibliography of translated terms

OUTPUT: Academic translation with proper formatting.`
            },
            
            creative: {
                name: '✍️ Creative Writing',
                prompt: `DeepSeek: Translate the following creative text from {sourceLang} to {targetLang}. Capture the literary style, emotional tone, and artistic expression.

{bilingualSection}
REQUIREMENTS:
1. Preserve literary devices
2. Maintain emotional impact
3. Use poetic and expressive language
4. Keep the original's artistic voice

OUTPUT: Creative translation that reads naturally in {targetLang}.`
            },
            
            technical: {
                name: '⚙️ Technical Focus',
                prompt: `DeepSeek: Translate the following technical documentation from {sourceLang} to {targetLang}. Ensure precise terminology and clear technical communication.

{bilingualSection}
REQUIREMENTS:
1. Use standard technical {targetLang} terminology
2. Create a glossary of technical terms
3. Add notes for complex concepts
4. Include code examples if present

OUTPUT: Technical translation with terminology reference.`
            },
            
            custom: {
                name: '🔧 Custom Prompt',
                prompt: `DeepSeek: Translate the following text from {sourceLang} to {targetLang} according to your best judgment.

{bilingualSection}
OUTPUT: Provide a complete, well-formatted translation.`
            }
        };

        // --- DOM Elements ---
        const favoritesSelect = document.getElementById('favoritesSelect');
        const sourceLang = document.getElementById('sourceLang');
        const targetLang = document.getElementById('targetLang');
        const sourceText = document.getElementById('sourceText');
        const loadBtn = document.getElementById('loadBtn');
        const copyBtn = document.getElementById('copyBtn');
        const promptDisplay = document.getElementById('promptDisplay');
        const statusMessage = document.getElementById('statusMessage');
        const bilingualToggle = document.getElementById('bilingualToggle');

        // --- Helper Functions ---
        function getCurrentText() {
            return sourceText.value.trim();
        }

        function getSelectedPrompt() {
            const key = favoritesSelect.value;
            return prompts[key] || null;
        }

        function buildBilingualSection(source, target, text) {
            if (!bilingualToggle.checked) return '';

            const lines = text.split('\n').filter(line => line.trim() !== '');
            if (lines.length === 0) {
                return `SOURCE TEXT:\n(No text provided for bilingual table)\n\n`;
            }

            let table = `BILINGUAL TABLE (${source} → ${target}):\n\n`;
            table += `| ${source} | ${target} |\n`;
            table += `|----------|----------|\n`;
            
            for (const line of lines) {
                // Escape pipe characters to avoid breaking markdown table
                const escaped = line.replace(/\|/g, '\\|');
                table += `| ${escaped} | *(translation)* |\n`;
            }
            table += `\n(Replace *(translation)* with actual translated text)\n\n`;
            return table;
        }

        function loadPrompt() {
            const selected = getSelectedPrompt();
            
            if (!selected) {
                promptDisplay.textContent = '⚠️ Please select a prompt preset from the dropdown.';
                statusMessage.textContent = 'ℹ️ No prompt selected.';
                statusMessage.style.color = '#6f6a60';
                return;
            }

            const source = sourceLang.value;
            const target = targetLang.value;
            const text = getCurrentText();
            
            let bilingualSection = '';
            
            if (bilingualToggle.checked && text !== '') {
                bilingualSection = buildBilingualSection(source, target, text);
            } else if (bilingualToggle.checked && text === '') {
                bilingualSection = `BILINGUAL TABLE (${source} → ${target}):\n(Add source text to generate table)\n\n`;
            } else {
                // Bilingual off — show regular SOURCE TEXT
                if (text !== '') {
                    bilingualSection = `SOURCE TEXT:\n${text}\n\n`;
                } else {
                    bilingualSection = '';
                }
            }
            
            let filledPrompt = selected.prompt
                .replace(/\{sourceLang\}/g, source)
                .replace(/\{targetLang\}/g, target)
                .replace(/\{bilingualSection\}/g, bilingualSection);
            
            // Clean up extra empty lines
            filledPrompt = filledPrompt.replace(/\n{3,}/g, '\n\n').trim();
            
            promptDisplay.textContent = filledPrompt;
            
            const mode = bilingualToggle.checked ? '📊 bilingual table' : '📄 standard';
            statusMessage.textContent = `✅ Loaded: ${selected.name} (${source} → ${target}) — ${mode}`;
            statusMessage.style.color = '#2c4b4e';
        }

        async function copyPrompt() {
            const text = promptDisplay.textContent;
            
            if (!text || text === 'Select a preset to load a prompt template.' || text.includes('⚠️')) {
                statusMessage.textContent = '⚠️ Nothing to copy. Load a prompt first.';
                statusMessage.style.color = '#a05252';
                return;
            }

            try {
                await navigator.clipboard.writeText(text);
                statusMessage.textContent = '✅ Copied to clipboard!';
                statusMessage.style.color = '#2c4b4e';
                copyBtn.textContent = '✅ Copied!';
                setTimeout(() => {
                    copyBtn.textContent = '📋 Copy Prompt';
                }, 2000);
            } catch (err) {
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                
                statusMessage.textContent = '✅ Copied to clipboard!';
                statusMessage.style.color = '#2c4b4e';
            }
        }

        // --- Event Listeners ---
        loadBtn.addEventListener('click', loadPrompt);
        copyBtn.addEventListener('click', copyPrompt);
        
        favoritesSelect.addEventListener('change', () => {
            const selected = getSelectedPrompt();
            if (selected) {
                statusMessage.textContent = `📌 Selected: ${selected.name}`;
                statusMessage.style.color = '#6f6a60';
            } else {
                statusMessage.textContent = '💡 Choose a preset from the dropdown above';
                statusMessage.style.color = '#6f6a60';
            }
        });

        sourceText.addEventListener('input', () => {
            statusMessage.textContent = '✏️ Source text updated. Click "Load Selected Prompt" to refresh.';
            statusMessage.style.color = '#6f6a60';
        });

        sourceLang.addEventListener('change', () => {
            statusMessage.textContent = '🌐 Language changed. Click "Load Selected Prompt" to refresh.';
            statusMessage.style.color = '#6f6a60';
        });

        targetLang.addEventListener('change', () => {
            statusMessage.textContent = '🌐 Language changed. Click "Load Selected Prompt" to refresh.';
            statusMessage.style.color = '#6f6a60';
        });

        bilingualToggle.addEventListener('change', () => {
            const mode = bilingualToggle.checked ? '📊 bilingual table mode' : '📄 standard mode';
            statusMessage.textContent = `🔄 Switched to ${mode}. Click "Load Selected Prompt" to refresh.`;
            statusMessage.style.color = '#6f6a60';
        });

        // --- Load default on page load ---
        // favoritesSelect.value = 'standard';
        // loadPrompt();
    </script>
</body>
</html>
