<script>
const emotions = ["Deep Contemplation","Mysterious Depths","Calm Reflection","Cool Clarity","Quiet Strength"];
const correctIndex = 2;
let answered = false, selectedIdx = null;
const resultArea = document.getElementById("resultArea");
const feedbackDiv = document.getElementById("feedbackMessage");
const completedSpan = document.getElementById("completedCount");
const matchCountSpan = document.getElementById("matchCount");
const resetBtn = document.getElementById("resetBtn");
const authorNoteBlock = document.getElementById("authorNoteBlock");
function updateUI() {
    const btns = document.querySelectorAll(".emotion-btn");
    for(let i = 0; i < btns.length; i++) {
        btns[i].classList.remove("correct-answer", "wrong-answer", "selected");
        if(answered) {
            if(i === correctIndex) btns[i].classList.add("correct-answer");
            if(i === selectedIdx && i !== correctIndex) btns[i].classList.add("wrong-answer");
        }
        if(selectedIdx === i && !answered) btns[i].classList.add("selected");
    }
    if(answered) {
        authorNoteBlock.style.display = "block";
        const isMatch = (selectedIdx === correctIndex);
        let html = '<div class="match-result ' + (isMatch ? "match-match" : "match-mismatch") + '">';
        html += '<strong>' + (isMatch ? "✅ MATCH" : "❌ NO MATCH") + '</strong><br>';
        html += '<strong>Your choice:</strong> "' + emotions[selectedIdx] + '"<br>';
        html += '<strong>Author's mood:</strong> "' + emotions[correctIndex] + '"<br>';
        html += '<strong>📝 ' + (isMatch ? "Perfect! You felt the same as the author." : "The author\'s intended mood is different. Read the note above.") + '</strong>';
        html += '</div>';
        resultArea.innerHTML = html;
        completedSpan.innerText = "1";
        matchCountSpan.innerText = isMatch ? "1" : "0";
    } else {
        authorNoteBlock.style.display = "none";
        resultArea.innerHTML = "";
        completedSpan.innerText = "0";
        matchCountSpan.innerText = "0";
    }
}
const btns = document.querySelectorAll(".emotion-btn");
for(let i = 0; i < btns.length; i++) {
    btns[i].addEventListener("click", function() {
        if(answered) { feedbackDiv.innerHTML = "⚠️ Game completed. Press Reset to play again."; return; }
        selectedIdx = parseInt(this.getAttribute("data-idx"));
        answered = true;
        updateUI();
        feedbackDiv.innerHTML = (selectedIdx === correctIndex) ? "🎉 CORRECT! You matched the author\'s mood!" : "🔍 INCORRECT. The correct answer is highlighted in green.";
    });
}
resetBtn.addEventListener("click", function() { answered = false; selectedIdx = null; updateUI(); feedbackDiv.innerHTML = "✨ Game reset. Choose a mood — green = correct answer."; });
updateUI();
</script>
