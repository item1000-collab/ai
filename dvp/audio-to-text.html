<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemini API Diagnostic Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f4f9fe;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
            color: #1a3a4f;
        }
        .card {
            background: white;
            border-radius: 2rem;
            border: 1px solid #e2edf5;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.04);
            max-width: 860px;
            width: 100%;
            padding: 2rem 2.2rem 2.5rem;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1f6288, #2c7a5e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 0.4rem;
        }
        .sub {
            color: #6f95b2;
            font-size: 0.9rem;
            margin-bottom: 1.8rem;
            border-bottom: 1px solid #e9f0f5;
            padding-bottom: 1rem;
        }
        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            margin-bottom: 1.2rem;
        }
        .btn {
            background: white;
            border: 1px solid #d4e2ed;
            border-radius: 3rem;
            padding: 0.6rem 1.6rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: #1f5a7a;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.15s;
            background: #f9fcff;
        }
        .btn:hover { background: #eef4fa; border-color: #b3ccdf; }
        .btn-primary { background: #1f6288; border-color: #1f6288; color: white; }
        .btn-primary:hover { background: #17506f; border-color: #17506f; }
        .btn-danger { background: #c94f4f; border-color: #c94f4f; color: white; }
        .btn-danger:hover { background: #b14242; border-color: #b14242; }
        .btn-success { background: #2c7a5e; border-color: #2c7a5e; color: white; }
        .btn-success:hover { background: #1f634b; border-color: #1f634b; }
        .btn:disabled { opacity: 0.5; pointer-events: none; }
        .status {
            font-size: 0.85rem;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            display: inline-block;
        }
        .status.idle { background: #f0f4f8; color: #5b7f97; }
        .status.loading { background: #e3edf6; color: #1f6288; animation: pulse 1.2s infinite; }
        .status.error { background: #fee8e8; color: #b14242; }
        .status.success { background: #d4edda; color: #155724; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        .output-area {
            background: #fafdff;
            border: 1px solid #e2edf5;
            border-radius: 1.2rem;
            padding: 1rem;
            min-height: 200px;
            margin: 0.8rem 0;
            font-size: 0.85rem;
            line-height: 1.6;
            color: #1a3a4f;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 450px;
            overflow-y: auto;
            font-family: monospace;
        }
        .output-area.placeholder { color: #9bb5cb; }
        .api-key-input {
            border: 1px solid #d4e2ed;
            border-radius: 2rem;
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
            width: 350px;
            font-family: monospace;
            background: #fafdff;
        }
        .footer-note {
            margin-top: 1.4rem;
            font-size: 0.7rem;
            color: #8aaec2;
            text-align: center;
            border-top: 1px solid #eef2f8;
            padding-top: 1rem;
        }
        .model-list {
            background: #f8f9fa;
            border-radius: 0.5rem;
            padding: 0.5rem;
            margin: 0.5rem 0;
            max-height: 150px;
            overflow-y: auto;
            font-size: 0.75rem;
        }
        .model-item {
            padding: 0.15rem 0.3rem;
            border-bottom: 1px solid #e9ecef;
        }
        .model-item .name { font-weight: 600; color: #1f6288; }
        .model-item .status-badge { 
            font-size: 0.6rem; 
            padding: 0.05rem 0.4rem;
            border-radius: 30px;
            background: #d4edda;
            color: #155724;
        }
        @media (max-width: 550px) {
            .card { padding: 1.5rem; }
            .row { flex-direction: column; align-items: stretch; }
            .btn { justify-content: center; }
            .api-key-input { width: 100%; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1><span>🔬</span> Gemini API Diagnostic</h1>
    <div class="sub">Check your API key and find available models</div>

    <div class="row">
        <label style="font-size:0.8rem; font-weight:600; color:#1f5a7a; display:flex; align-items:center; gap:6px; width:100%; flex-wrap:wrap;">
            🔑 API Key:
            <input type="text" id="apiKeyInput" class="api-key-input" 
                   value="AQ.Ab8RN6KUHVGEG5mZHkRdtUllzbjgjV-zoWx5NfpfGx8XWAujYw"
                   placeholder="Paste your Gemini API key here" />
        </label>
    </div>

    <div class="row">
        <button class="btn btn-primary" id="listModelsBtn">📋 List Available Models</button>
        <button class="btn btn-success" id="testSimpleBtn">🧪 Simple Test</button>
        <button class="btn" id="clearBtn">🗑️ Clear Output</button>
        <span id="statusBadge" class="status idle">ready</span>
    </div>

    <div class="output-area placeholder" id="outputArea">
        Click "List Available Models" to see which models your API key can access.
    </div>

    <div class="footer-note">
        💡 This tool helps diagnose why your API key might not work with certain models.
    </div>
</div>

<script>
    (function() {
        const apiKeyInput = document.getElementById('apiKeyInput');
        const listModelsBtn = document.getElementById('listModelsBtn');
        const testSimpleBtn = document.getElementById('testSimpleBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusBadge = document.getElementById('statusBadge');
        const outputArea = document.getElementById('outputArea');

        let apiKey = apiKeyInput.value.trim();

        function setStatus(text, type = 'idle') {
            statusBadge.textContent = text;
            statusBadge.className = 'status ' + type;
        }

        function setOutput(text, isPlaceholder = false) {
            outputArea.textContent = text;
            if (isPlaceholder) {
                outputArea.classList.add('placeholder');
            } else {
                outputArea.classList.remove('placeholder');
            }
        }

        function appendOutput(text) {
            outputArea.textContent += '\n' + text;
            outputArea.classList.remove('placeholder');
        }

        // Load saved key
        const savedKey = localStorage.getItem('gemini_api_key');
        if (savedKey) {
            apiKeyInput.value = savedKey;
            apiKey = savedKey;
        }

        apiKeyInput.addEventListener('change', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                localStorage.setItem('gemini_api_key', key);
                apiKey = key;
            }
        });

        // --- List Models ---
        listModelsBtn.addEventListener('click', async () => {
            const key = apiKeyInput.value.trim() || apiKey;
            if (!key) {
                setStatus('Please enter an API key', 'error');
                return;
            }

            setStatus('Fetching models...', 'loading');
            listModelsBtn.disabled = true;
            setOutput('⏳ Fetching list of available models...', false);

            try {
                // Try the model list endpoint
                const url = `https://generativelanguage.googleapis.com/v1beta/models?key=${key}`;
                
                const response = await fetch(url);
                const data = await response.json();

                if (!response.ok) {
                    const errorMsg = data.error?.message || 'Unknown error';
                    throw new Error(errorMsg);
                }

                let output = '✅ Available Models for your API key:\n';
                output += '═'.repeat(50) + '\n\n';

                if (data.models && data.models.length > 0) {
                    const models = data.models;
                    output += `📚 Total models: ${models.length}\n\n`;
                    
                    models.forEach((model, index) => {
                        const name = model.name.replace('models/', '');
                        const supported = model.supportedGenerationMethods || [];
                        const canGenerate = supported.includes('generateContent');
                        const status = canGenerate ? '✅ generateContent' : '❌ not supported';
                        output += `${index + 1}. ${name}\n`;
                        output += `   ${status}\n`;
                        if (model.displayName) {
                            output += `   Display: ${model.displayName}\n`;
                        }
                        output += '\n';
                    });

                    setOutput(output, false);
                    setStatus('✅ Models loaded', 'success');
                } else {
                    setOutput('❌ No models found. Your API key may not have access to Gemini.\n\n' + JSON.stringify(data, null, 2), false);
                    setStatus('No models', 'error');
                }

            } catch (error) {
                setOutput(`❌ Error fetching models:\n\n${error.message}\n\nThis usually means:\n• Invalid API key\n• API key not activated for Gemini\n• Wrong project\n• Billing not enabled`, false);
                setStatus('Error', 'error');
            }

            listModelsBtn.disabled = false;
        });

        // --- Simple Test ---
        testSimpleBtn.addEventListener('click', async () => {
            const key = apiKeyInput.value.trim() || apiKey;
            if (!key) {
                setStatus('Please enter an API key', 'error');
                return;
            }

            setStatus('Testing...', 'loading');
            testSimpleBtn.disabled = true;
            setOutput('⏳ Testing API key with a simple request...', false);

            try {
                // Try different model names
                const modelsToTry = [
                    'gemini-1.5-flash',
                    'gemini-1.5-pro',
                    'gemini-pro',
                    'gemini-1.0-pro'
                ];

                let found = false;
                let output = '🔬 Testing API key with multiple models:\n';
                output += '═'.repeat(50) + '\n\n';

                for (const model of modelsToTry) {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
                    
                    const requestBody = {
                        contents: [{
                            parts: [{
                                text: 'Say "Hello World"'
                            }]
                        }]
                    };

                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(requestBody)
                        });

                        const data = await response.json();

                        if (response.ok) {
                            const text = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response';
                            output += `✅ ${model}: WORKING!\n   Response: "${text}"\n\n`;
                            found = true;
                        } else {
                            const error = data.error?.message || 'Unknown error';
                            output += `❌ ${model}: ${error}\n\n`;
                        }
                    } catch (e) {
                        output += `❌ ${model}: Network error\n\n`;
                    }
                }

                if (found) {
                    output += '\n🎉 Your API key works with at least one model! Use that model for transcription.';
                    setStatus('✅ Key works!', 'success');
                } else {
                    output += '\n❌ Your API key does not work with any Gemini model.\n\nPossible issues:\n• Invalid key\n• Billing not enabled\n• API not activated\n• Wrong Google Cloud project';
                    setStatus('❌ No working models', 'error');
                }

                setOutput(output, false);

            } catch (error) {
                setOutput(`❌ Error during test:\n\n${error.message}`, false);
                setStatus('Error', 'error');
            }

            testSimpleBtn.disabled = false;
        });

        // --- Clear ---
        clearBtn.addEventListener('click', () => {
            setOutput('Ready for new tests...', true);
            setStatus('ready', 'idle');
        });

        // --- Init ---
        setOutput('📋 This tool helps diagnose your Gemini API key.\n\nClick "List Available Models" to see which models your key can access.\nClick "Simple Test" to test your key with all possible models.', true);
        setStatus('ready', 'idle');

        console.log('🔬 Gemini Diagnostic Tool loaded');
        console.log('📚 API Key:', apiKey ? apiKey.substring(0, 15) + '...' : 'none');
    })();
</script>
</body>
</html>
