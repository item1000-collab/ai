<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Selected Songs · Shared Playlist | Genius + YouTube link</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(145deg, #f3f0ea 0%, #e8e2d8 100%);
      font-family: system-ui, 'Segoe UI', sans-serif;
      padding: 2rem 1.2rem;
      min-height: 100vh;
    }
    .container { max-width: 980px; margin: 0 auto; }
    .gist-card {
      background: white;
      border-radius: 2rem;
      box-shadow: 0 25px 40px -14px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .favorite-content { padding: 2rem; }
    
    /* top genius link bar */
    .genius-top-link {
      background: #fef5e6;
      border-radius: 2rem;
      padding: 0.75rem 1.2rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem;
      border: 1px solid #f0e2d0;
    }
    .genius-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      color: #1f1a14;
    }
    .genius-link-btn {
      background: #121212;
      color: #fff4e6;
      padding: 0.4rem 1.1rem;
      border-radius: 60px;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    .genius-link-btn:hover { background: #e07c3c; transform: translateY(-1px); }
    
    .title-section {
      margin-bottom: 2rem;
      border-left: 5px solid #e07c3c;
      padding-left: 1.2rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .title-section h1 {
      font-size: 2.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #2b241d, #6b5a48);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .song-count {
      background: #f0ede8;
      padding: 0.3rem 0.9rem;
      border-radius: 40px;
      font-size: 0.85rem;
    }
    .add-song-form {
      background: #fefcf8;
      border: 1px solid #ece3da;
      border-radius: 1.5rem;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .form-title {
      font-weight: 600;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .url-input-wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .url-input-wrapper input {
      flex: 1;
      padding: 0.85rem 1.2rem;
      border: 1px solid #e2d8cd;
      border-radius: 1rem;
      font-size: 0.9rem;
      font-family: monospace;
    }
    .url-input-wrapper input:focus {
      outline: none;
      border-color: #e07c3c;
    }
    .btn-add {
      background: #e07c3c;
      color: white;
      border: none;
      padding: 0.85rem 2rem;
      border-radius: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-add:hover { background: #c55a1a; transform: translateY(-2px); }
    .preview-card {
      margin-top: 1rem;
      padding: 0.8rem;
      background: #eef4ea;
      border-radius: 1rem;
      display: none;
      border-left: 3px solid #e07c3c;
    }
    .preview-card.show { display: flex; gap: 8px; flex-wrap: wrap; }
    .preview-artist { font-weight: 600; color: #2b5e2b; }
    .preview-track { color: #4a6e3b; }
    .error-msg {
      color: #c2410c;
      background: #fff0e6;
      padding: 0.5rem;
      border-radius: 0.8rem;
      margin-top: 0.75rem;
      display: none;
    }
    .error-msg.show { display: block; }
    .songs-list { display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem; }
    .song-item {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      background: #fefcf8;
      border: 1px solid #ece3da;
      border-radius: 1.2rem;
      padding: 1rem 1.2rem;
      transition: all 0.2s;
    }
    .song-item:hover { border-color: #e07c3c; transform: translateX(3px); }
    .song-info {
      flex: 2;
      min-width: 180px;
    }
    .song-title { font-size: 1.2rem; font-weight: 600; }
    .song-artist { font-size: 0.8rem; color: #8a7c6b; margin-top: 2px; }
    .song-links {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }
    .listen-link {
      background: #181511;
      color: #fef5e6;
      text-decoration: none;
      padding: 0.45rem 1.1rem;
      border-radius: 60px;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .listen-link.yt-link { background: #c4302b; }
    .listen-link.yt-link:hover { background: #a02722; }
    .listen-link.genius-link { background: #1f1a14; }
    .listen-link:hover { background: #e07c3c; transform: translateY(-2px); }
    .btn-delete {
      background: none;
      border: 1px solid #e0cfbf;
      border-radius: 40px;
      padding: 0.45rem 1rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-delete:hover { background: #fde8dd; border-color: #e07c3c; }
    .btn-add-youtube {
      background: #c4302b20;
      border: 1px solid #c4302b;
      border-radius: 40px;
      padding: 0.45rem 1rem;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 500;
      color: #c4302b;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .btn-add-youtube:hover {
      background: #c4302b;
      color: white;
      transform: translateY(-2px);
    }
    .youtube-input-group {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .youtube-input-group input {
      flex: 1;
      padding: 0.5rem 0.8rem;
      border: 1px solid #e2d8cd;
      border-radius: 2rem;
      font-size: 0.75rem;
      font-family: monospace;
    }
    .youtube-input-group button {
      background: #c4302b;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-size: 0.7rem;
      cursor: pointer;
    }
    .empty-message { text-align: center; padding: 2.5rem; color: #b8aa99; }
    .status-bar {
      font-size: 0.7rem;
      color: #1db954;
      margin-bottom: 1rem;
      padding: 0.3rem 0.8rem;
      background: #e6f4ea;
      border-radius: 40px;
      display: inline-block;
    }
    /* Password modal */
    .password-modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .password-modal.active { display: flex; }
    .modal-card {
      background: white;
      border-radius: 2rem;
      max-width: 380px;
      width: 90%;
      padding: 1.8rem;
      text-align: center;
      box-shadow: 0 25px 40px rgba(0,0,0,0.3);
    }
    .modal-card input {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid #ddd2c4;
      border-radius: 1.2rem;
      margin: 1rem 0;
      font-family: monospace;
    }
    .modal-buttons { display: flex; gap: 0.8rem; justify-content: center; }
    .confirm-delete-btn { background: #c2410c; color: white; border: none; padding: 0.5rem 1.4rem; border-radius: 2rem; cursor: pointer; }
    .cancel-modal-btn { background: #e9e2d8; border: none; padding: 0.5rem 1.4rem; border-radius: 2rem; cursor: pointer; }
    
    .song-actions-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }
    .action-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    @media (max-width: 680px) {
      .favorite-content { padding: 1.5rem; }
      .song-item { flex-direction: column; align-items: stretch; gap: 12px; }
      .song-actions-right { align-items: stretch; }
      .action-buttons { justify-content: flex-start; }
      .url-input-wrapper { flex-direction: column; }
      .btn-add { width: 100%; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="gist-card">
    <div class="favorite-content">
      <!-- Top Genius link -->
      <div class="genius-top-link">
        <div class="genius-brand"><span>🎤</span> <span>Genius</span><span style="font-size:0.8rem;"> • lyrics & annotations</span></div>
        <a href="https://genius.com/" class="genius-link-btn" target="_blank">🔗 Visit Genius.com →</a>
      </div>

      <div class="title-section">
        <h1>Selected Songs <span>🎵</span></h1>
        <div class="song-count" id="song-counter">0 songs</div>
      </div>

      <!-- Main Genius Add Section -->
      <div class="add-song-form">
        <div class="form-title">
          <span>🔗</span> Add song via Genius link
        </div>
        <div class="url-input-wrapper">
          <input type="url" id="genius-url" placeholder="https://genius.com/Nirvana-smells-like-teen-spirit-lyrics">
          <button class="btn-add" id="add-song-btn">➕ Add from Genius</button>
        </div>
        <div id="preview-card" class="preview-card">
          <span>🔍 Detected:</span>
          <span class="preview-artist" id="preview-artist"></span>
          <span>–</span>
          <span class="preview-track" id="preview-track"></span>
        </div>
        <div id="form-error" class="error-msg"></div>
      </div>

      <div id="status" class="status-bar">🔄 Loading from cloud...</div>
      <div id="songs-list-container" class="songs-list"></div>
    </div>
  </div>
</div>

<!-- Password deletion modal -->
<div id="deletePasswordModal" class="password-modal">
  <div class="modal-card">
    <h3>🔐 Confirm deletion</h3>
    <p>Enter password to delete this song</p>
    <input type="password" id="deletePasswordInput" placeholder="Password" autocomplete="off">
    <div class="modal-buttons">
      <button class="cancel-modal-btn" id="cancelDeleteBtn">Cancel</button>
      <button class="confirm-delete-btn" id="confirmDeleteBtn">Delete</button>
    </div>
  </div>
</div>

<script>
  // ========== CONFIGURATION ==========
  const JSONBIN_BIN_ID = '6a2bba45f5f4af5e29e4dead';
  const JSONBIN_API_KEY = '$2a$10$0Jg23.3TQdidpakvguzsKOlt/9e6obrZxt3nsjzUbHmWEx2y7m7Iq';
  const REQUIRED_DELETE_PASSWORD = "321";
  // ===================================

  let songs = [];      // each song: { artist, track, geniusUrl, youtubeUrl? }
  let pendingDeleteIndex = null;

  // Parse Genius URL
  function parseGeniusUrl(url) {
    try {
      const urlObj = new URL(url);
      if (!urlObj.hostname.includes('genius.com')) return null;
      let path = urlObj.pathname.replace(/^\/+|\/+$/g, '');
      path = path.replace(/-lyrics$/, '').replace(/\.html?$/, '');
      if (!path) return null;
      let parts = path.split('-').filter(p => p.length > 0);
      if (parts.length < 2) return null;
      parts = parts.map(p => decodeURIComponent(p));
      let artist = parts[0];
      let track = parts.slice(1).join(' - ');
      artist = artist.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      track = track.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      track = track.replace(/\s+Lyrics$/i, '');
      return { artist: artist.trim(), track: track.trim() };
    } catch(e) { return null; }
  }

  function isValidGeniusUrl(url) {
    if (!url || url.trim() === '') return false;
    try {
      const urlObj = new URL(url);
      return urlObj.hostname.includes('genius.com');
    } catch(e) { return false; }
  }

  // Extract YouTube video ID from various link formats
  function extractYouTubeId(url) {
    if (!url) return null;
    const patterns = [
      /(?:youtube\.com\/watch\?v=)([\w-]+)/,
      /(?:youtu\.be\/)([\w-]+)/,
      /(?:youtube\.com\/embed\/)([\w-]+)/,
      /(?:youtube\.com\/v\/)([\w-]+)/
    ];
    for (const pattern of patterns) {
      const match = url.match(pattern);
      if (match) return match[1];
    }
    return null;
  }

  // Validate and fetch YouTube video title (to confirm link works)
  async function validateYouTubeLink(url) {
    const videoId = extractYouTubeId(url);
    if (!videoId) return null;
    try {
      const oembedUrl = `https://noembed.com/embed?url=https://www.youtube.com/watch?v=${videoId}`;
      const response = await fetch(oembedUrl);
      if (!response.ok) return null;
      const data = await response.json();
      if (data && data.title) {
        return {
          videoId: videoId,
          title: data.title,
          validUrl: `https://www.youtube.com/watch?v=${videoId}`
        };
      }
    } catch(e) { console.warn("YouTube validation error", e); }
    return null;
  }

  // ========== CLOUD STORAGE ==========
  async function loadSongsFromCloud() {
    const statusDiv = document.getElementById('status');
    try {
      statusDiv.textContent = '🔄 Loading from cloud...';
      const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
        headers: { 'X-Master-Key': JSONBIN_API_KEY }
      });
      if (response.status === 401) {
        statusDiv.textContent = '⚠️ Invalid API Key. Using local storage only.';
        loadFromLocalFallback();
        return;
      }
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      songs = data.record.songs || [];
      statusDiv.textContent = '✅ Loaded from cloud (shared across all users)';
      renderSongs();
    } catch (error) {
      console.error(error);
      statusDiv.textContent = '⚠️ Cloud unavailable. Using local storage (private).';
      loadFromLocalFallback();
    }
  }

  function loadFromLocalFallback() {
    const stored = localStorage.getItem('selected_songs_fallback');
    if (stored) {
      songs = JSON.parse(stored);
    } else {
      songs = [
        { artist: "The Beatles", track: "Across the Universe", geniusUrl: "https://genius.com/The-beatles-across-the-universe-lyrics", youtubeUrl: null },
        { artist: "Radiohead", track: "Creep", geniusUrl: "https://genius.com/Radiohead-creep-lyrics", youtubeUrl: null },
        { artist: "Queen", track: "Bohemian Rhapsody", geniusUrl: "https://genius.com/Queen-bohemian-rhapsody-lyrics", youtubeUrl: null }
      ];
    }
    renderSongs();
  }

  async function saveSongsToCloud() {
    const statusDiv = document.getElementById('status');
    try {
      statusDiv.textContent = '💾 Saving to cloud...';
      const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': JSONBIN_API_KEY
        },
        body: JSON.stringify({ songs: songs })
      });
      if (response.status === 401) {
        statusDiv.textContent = '⚠️ Invalid API Key. Saved to local storage only.';
        localStorage.setItem('selected_songs_fallback', JSON.stringify(songs));
        return;
      }
      if (!response.ok) throw new Error('Save failed');
      statusDiv.textContent = '✅ Saved to cloud! All users see changes.';
      setTimeout(() => {
        statusDiv.textContent = '☁️ Data in shared cloud storage';
      }, 3000);
    } catch (error) {
      console.error(error);
      statusDiv.textContent = '⚠️ Cloud save failed. Saved locally.';
      localStorage.setItem('selected_songs_fallback', JSON.stringify(songs));
    }
  }

  // ========== ADD SONG FROM GENIUS ==========
  async function addSongFromGenius() {
    const geniusUrl = document.getElementById('genius-url').value.trim();
    if (!isValidGeniusUrl(geniusUrl)) {
      showFormError("❌ Please enter a valid Genius URL");
      return false;
    }
    const parsed = parseGeniusUrl(geniusUrl);
    if (!parsed || !parsed.artist || !parsed.track) {
      showFormError("❌ Could not detect artist and track name from URL");
      return false;
    }
    const duplicate = songs.some(s => 
      s.artist.toLowerCase() === parsed.artist.toLowerCase() && 
      s.track.toLowerCase() === parsed.track.toLowerCase()
    );
    if (duplicate) {
      showFormError(`⚠️ "${parsed.artist} – ${parsed.track}" already exists!`);
      return false;
    }
    songs.push({ 
      artist: parsed.artist, 
      track: parsed.track, 
      geniusUrl: geniusUrl,
      youtubeUrl: null
    });
    await saveSongsToCloud();
    renderSongs();
    clearGeniusForm();
    return true;
  }

  // ========== ADD YOUTUBE LINK TO EXISTING SONG ==========
  async function addYouTubeLinkToSong(songIndex, youtubeLink) {
    if (!youtubeLink || youtubeLink.trim() === '') {
      showFormError("Please enter a valid YouTube link");
      return false;
    }
    
    // Validate YouTube link
    const validated = await validateYouTubeLink(youtubeLink);
    if (!validated) {
      showFormError("❌ Invalid YouTube link or video not found. Please check the URL.");
      return false;
    }
    
    if (songs[songIndex]) {
      songs[songIndex].youtubeUrl = validated.validUrl;
      await saveSongsToCloud();
      renderSongs();
      showSuccessMessage(`✅ YouTube link added for "${songs[songIndex].artist} – ${songs[songIndex].track}"`);
      return true;
    }
    return false;
  }

  // Remove YouTube link from song
  async function removeYouTubeLink(songIndex) {
    if (songs[songIndex] && songs[songIndex].youtubeUrl) {
      songs[songIndex].youtubeUrl = null;
      await saveSongsToCloud();
      renderSongs();
      showSuccessMessage(`🗑️ YouTube link removed`);
    }
  }

  // ========== DELETE SONG ==========
  async function deleteSong(index) {
    songs.splice(index, 1);
    await saveSongsToCloud();
    renderSongs();
  }

  // ========== RENDER UI ==========
  function renderSongs() {
    const container = document.getElementById('songs-list-container');
    const counter = document.getElementById('song-counter');
    if (songs.length === 0) {
      container.innerHTML = '<div class="empty-message">✨ No songs. Add your first one via Genius! ✨</div>';
      counter.textContent = '0 songs';
      return;
    }
    counter.textContent = `${songs.length} ${songs.length === 1 ? 'song' : 'songs'}`;
    
    container.innerHTML = songs.map((song, idx) => {
      const hasYoutube = song.youtubeUrl && song.youtubeUrl.length > 0;
      return `
        <div class="song-item" data-song-index="${idx}">
          <div class="song-info">
            <div class="song-title">${escapeHtml(song.artist)} – ${escapeHtml(song.track)}</div>
            <div class="song-artist">🎤 added via Genius</div>
            <div class="song-links">
              <a href="${escapeHtml(song.geniusUrl)}" class="listen-link genius-link" target="_blank">🎤 View on Genius</a>
              ${hasYoutube ? `<a href="${escapeHtml(song.youtubeUrl)}" class="listen-link yt-link" target="_blank">▶️ Watch on YouTube</a>` : ''}
            </div>
          </div>
          <div class="song-actions-right">
            <div class="action-buttons">
              ${!hasYoutube ? `
                <button class="btn-add-youtube" data-index="${idx}" data-action="show-youtube-input">
                  📺 + Add YouTube link
                </button>
              ` : `
                <button class="btn-add-youtube" data-index="${idx}" data-action="remove-youtube" style="background:#f0e2d0; color:#8a2b1a; border-color:#c4302b;">
                  🗑️ Remove YouTube
                </button>
              `}
              <button class="btn-delete" data-index="${idx}" data-action="delete">🗑️ Delete song</button>
            </div>
            ${!hasYoutube ? `
              <div id="youtube-input-${idx}" class="youtube-input-group" style="display: none;">
                <input type="text" id="youtube-url-${idx}" placeholder="Paste YouTube link (e.g., https://youtu.be/... or https://youtube.com/watch?v=...)">
                <button data-index="${idx}" class="confirm-youtube-btn">✔ Save</button>
                <button data-index="${idx}" class="cancel-youtube-btn">✖ Cancel</button>
              </div>
            ` : ''}
          </div>
        </div>
      `;
    }).join('');
    
    // Attach event listeners for delete buttons
    document.querySelectorAll('.btn-delete').forEach(btn => {
      const idx = parseInt(btn.dataset.index);
      btn.addEventListener('click', () => requestDeleteWithPassword(idx));
    });
    
    // Attach event listeners for "Add YouTube link" buttons
    document.querySelectorAll('.btn-add-youtube').forEach(btn => {
      const idx = parseInt(btn.dataset.index);
      const action = btn.dataset.action;
      
      if (action === 'show-youtube-input') {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const inputGroup = document.getElementById(`youtube-input-${idx}`);
          if (inputGroup) {
            inputGroup.style.display = inputGroup.style.display === 'none' ? 'flex' : 'none';
          }
        });
      } else if (action === 'remove-youtube') {
        btn.addEventListener('click', () => removeYouTubeLink(idx));
      }
    });
    
    // Attach confirm/cancel for YouTube inputs
    document.querySelectorAll('.confirm-youtube-btn').forEach(btn => {
      const idx = parseInt(btn.dataset.index);
      btn.addEventListener('click', async () => {
        const input = document.getElementById(`youtube-url-${idx}`);
        const link = input.value.trim();
        if (link) {
          await addYouTubeLinkToSong(idx, link);
        } else {
          showFormError("Please paste a YouTube link");
        }
        const inputGroup = document.getElementById(`youtube-input-${idx}`);
        if (inputGroup) inputGroup.style.display = 'none';
      });
    });
    
    document.querySelectorAll('.cancel-youtube-btn').forEach(btn => {
      const idx = parseInt(btn.dataset.index);
      btn.addEventListener('click', () => {
        const inputGroup = document.getElementById(`youtube-input-${idx}`);
        if (inputGroup) inputGroup.style.display = 'none';
      });
    });
  }
  
  function escapeHtml(str) { 
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) { 
      return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; 
    }); 
  }
  
  function clearGeniusForm() {
    document.getElementById('genius-url').value = '';
    document.getElementById('preview-card').classList.remove('show');
  }
  
  function showFormError(msg) {
    const err = document.getElementById('form-error');
    err.textContent = msg;
    err.classList.add('show');
    setTimeout(() => err.classList.remove('show'), 3500);
  }
  
  function showSuccessMessage(msg) {
    const statusDiv = document.getElementById('status');
    const originalText = statusDiv.textContent;
    statusDiv.textContent = msg;
    statusDiv.style.background = "#d4edda";
    setTimeout(() => {
      statusDiv.textContent = originalText;
      statusDiv.style.background = "#e6f4ea";
    }, 2500);
  }
  
  function updatePreview() {
    const url = document.getElementById('genius-url').value.trim();
    if (isValidGeniusUrl(url)) {
      const parsed = parseGeniusUrl(url);
      if (parsed) {
        document.getElementById('preview-artist').textContent = parsed.artist;
        document.getElementById('preview-track').textContent = parsed.track;
        document.getElementById('preview-card').classList.add('show');
        return;
      }
    }
    document.getElementById('preview-card').classList.remove('show');
  }
  
  // ========== PASSWORD PROTECTED DELETE ==========
  function requestDeleteWithPassword(index) {
    pendingDeleteIndex = index;
    const modal = document.getElementById('deletePasswordModal');
    const input = document.getElementById('deletePasswordInput');
    input.value = '';
    modal.classList.add('active');
    input.focus();
  }
  
  function closePasswordModal() {
    document.getElementById('deletePasswordModal').classList.remove('active');
    pendingDeleteIndex = null;
  }
  
  function verifyAndDelete() {
    const password = document.getElementById('deletePasswordInput').value;
    if (password === REQUIRED_DELETE_PASSWORD) {
      if (pendingDeleteIndex !== null) {
        deleteSong(pendingDeleteIndex);
      }
      closePasswordModal();
    } else {
      showFormError('🔒 Wrong password! Deletion requires password: 321');
      const inp = document.getElementById('deletePasswordInput');
      inp.style.border = '1px solid #c2410c';
      setTimeout(() => inp.style.border = '', 500);
      inp.value = '';
    }
  }
  
  // Initialize
  document.addEventListener('DOMContentLoaded', () => {
    loadSongsFromCloud();
    document.getElementById('genius-url').addEventListener('input', updatePreview);
    document.getElementById('add-song-btn').addEventListener('click', () => addSongFromGenius());
    document.getElementById('genius-url').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addSongFromGenius();
    });
    document.getElementById('confirmDeleteBtn').addEventListener('click', verifyAndDelete);
    document.getElementById('cancelDeleteBtn').addEventListener('click', closePasswordModal);
    document.getElementById('deletePasswordModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('deletePasswordModal')) closePasswordModal();
    });
  });
</script>
</body>
</html>
