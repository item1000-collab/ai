<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Selected Songs · Shared Playlist</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(145deg, #f3f0ea 0%, #e8e2d8 100%);
      font-family: system-ui, 'Segoe UI', sans-serif;
      padding: 2rem 1.2rem;
      min-height: 100vh;
    }
    .container { max-width: 880px; margin: 0 auto; }
    .gist-card {
      background: white;
      border-radius: 2rem;
      box-shadow: 0 25px 40px -14px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .favorite-content { padding: 2rem; }
    
    /* top genius link bar */
    .genius-top-link {
      background: #fef5e6;
      border-radius: 2rem;
      padding: 0.75rem 1.2rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem;
      border: 1px solid #f0e2d0;
    }
    .genius-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      color: #1f1a14;
    }
    .genius-brand span {
      font-size: 1.3rem;
    }
    .genius-link-btn {
      background: #121212;
      color: #fff4e6;
      padding: 0.4rem 1.1rem;
      border-radius: 60px;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    .genius-link-btn:hover {
      background: #e07c3c;
      transform: translateY(-1px);
    }
    
    .title-section {
      margin-bottom: 2rem;
      border-left: 5px solid #e07c3c;
      padding-left: 1.2rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .title-section h1 {
      font-size: 2.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #2b241d, #6b5a48);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .song-count {
      background: #f0ede8;
      padding: 0.3rem 0.9rem;
      border-radius: 40px;
      font-size: 0.85rem;
    }
    .add-song-form {
      background: #fefcf8;
      border: 1px solid #ece3da;
      border-radius: 1.5rem;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .form-title {
      font-weight: 600;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .url-input-wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .url-input-wrapper input {
      flex: 1;
      padding: 0.85rem 1.2rem;
      border: 1px solid #e2d8cd;
      border-radius: 1rem;
      font-size: 0.9rem;
      font-family: monospace;
    }
    .url-input-wrapper input:focus {
      outline: none;
      border-color: #e07c3c;
    }
    .btn-add {
      background: #e07c3c;
      color: white;
      border: none;
      padding: 0.85rem 2rem;
      border-radius: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-add:hover { background: #c55a1a; transform: translateY(-2px); }
    .preview-card {
      margin-top: 1rem;
      padding: 0.8rem;
      background: #eef4ea;
      border-radius: 1rem;
      display: none;
      border-left: 3px solid #e07c3c;
    }
    .preview-card.show { display: flex; gap: 8px; flex-wrap: wrap; }
    .preview-artist { font-weight: 600; color: #2b5e2b; }
    .preview-track { color: #4a6e3b; }
    .error-msg {
      color: #c2410c;
      background: #fff0e6;
      padding: 0.5rem;
      border-radius: 0.8rem;
      margin-top: 0.75rem;
      display: none;
    }
    .error-msg.show { display: block; }
    .songs-list { display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem; }
    .song-item {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      background: #fefcf8;
      border: 1px solid #ece3da;
      border-radius: 1.2rem;
      padding: 1rem 1.2rem;
    }
    .song-item:hover { border-color: #e07c3c; transform: translateX(3px); }
    .song-title { font-size: 1.2rem; font-weight: 600; }
    .song-artist { font-size: 0.8rem; color: #8a7c6b; margin-top: 2px; }
    .song-actions { display: flex; gap: 0.75rem; align-items: center; }
    .listen-link {
      background: #181511;
      color: #fef5e6;
      text-decoration: none;
      padding: 0.45rem 1.1rem;
      border-radius: 60px;
      font-size: 0.8rem;
    }
    .listen-link:hover { background: #e07c3c; }
    .btn-delete {
      background: none;
      border: 1px solid #e0cfbf;
      border-radius: 40px;
      padding: 0.45rem 1rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-delete:hover { background: #fde8dd; border-color: #e07c3c; }
    .empty-message { text-align: center; padding: 2.5rem; color: #b8aa99; }
    .status-bar {
      font-size: 0.7rem;
      color: #1db954;
      margin-bottom: 1rem;
      padding: 0.3rem 0.8rem;
      background: #e6f4ea;
      border-radius: 40px;
      display: inline-block;
    }
    /* Password modal overlay */
    .password-modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .password-modal.active {
      display: flex;
    }
    .modal-card {
      background: white;
      border-radius: 2rem;
      max-width: 380px;
      width: 90%;
      padding: 1.8rem;
      text-align: center;
      box-shadow: 0 25px 40px rgba(0,0,0,0.3);
    }
    .modal-card h3 {
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
    }
    .modal-card p {
      color: #5e5343;
      margin-bottom: 1rem;
    }
    .modal-card input {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid #ddd2c4;
      border-radius: 1.2rem;
      font-size: 1rem;
      margin-bottom: 1.2rem;
      font-family: monospace;
    }
    .modal-buttons {
      display: flex;
      gap: 0.8rem;
      justify-content: center;
    }
    .modal-buttons button {
      padding: 0.5rem 1.4rem;
      border-radius: 2rem;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    .confirm-delete-btn {
      background: #c2410c;
      color: white;
    }
    .cancel-modal-btn {
      background: #e9e2d8;
      color: #2b241d;
    }
    @media (max-width: 620px) {
      .favorite-content { padding: 1.5rem; }
      .song-item { flex-direction: column; gap: 12px; align-items: stretch; }
      .song-actions { justify-content: flex-start; }
      .url-input-wrapper { flex-direction: column; }
      .btn-add { width: 100%; justify-content: center; }
      .genius-top-link { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="gist-card">
    <div class="favorite-content">
      <!-- TOP GENIUS LINK (direct to genius.com) -->
      <div class="genius-top-link">
        <div class="genius-brand">
          <span>🎤</span> 
          <span style="font-weight:600;">Genius</span>
          <span style="font-size:0.8rem; color:#8a7c6b;">• song annotations & lyrics</span>
        </div>
        <a href="https://genius.com/" class="genius-link-btn" target="_blank" rel="noopener noreferrer">
          🔗 Visit Genius.com →
        </a>
      </div>

      <div class="title-section">
        <h1>Selected Songs <span>🎵</span></h1>
        <div class="song-count" id="song-counter">0 songs</div>
      </div>

      <div class="add-song-form">
        <div class="form-title">
          <span>🔗</span> Add song via Genius link
        </div>
        <div class="url-input-wrapper">
          <input type="url" id="genius-url" placeholder="https://genius.com/Nirvana-smells-like-teen-spirit-lyrics">
          <button class="btn-add" id="add-song-btn">➕ Add</button>
        </div>
        <div id="preview-card" class="preview-card">
          <span>🔍 Detected:</span>
          <span class="preview-artist" id="preview-artist"></span>
          <span>–</span>
          <span class="preview-track" id="preview-track"></span>
        </div>
        <div id="form-error" class="error-msg"></div>
      </div>

      <div id="status" class="status-bar">🔄 Loading from cloud...</div>
      <div id="songs-list-container" class="songs-list"></div>
    </div>
  </div>
</div>

<!-- Password deletion modal -->
<div id="deletePasswordModal" class="password-modal">
  <div class="modal-card">
    <h3>🔐 Confirm deletion</h3>
    <p>Enter password to delete this song</p>
    <input type="password" id="deletePasswordInput" placeholder="Password" autocomplete="off">
    <div class="modal-buttons">
      <button class="cancel-modal-btn" id="cancelDeleteBtn">Cancel</button>
      <button class="confirm-delete-btn" id="confirmDeleteBtn">Delete</button>
    </div>
  </div>
</div>

<script>
  // ========== YOUR JSONBin.io CONFIGURATION ==========
  const JSONBIN_BIN_ID = '6a2bba45f5f4af5e29e4dead';
  const JSONBIN_API_KEY = '$2a$10$0Jg23.3TQdidpakvguzsKOlt/9e6obrZxt3nsjzUbHmWEx2y7m7Iq';
  // ==================================================
  const REQUIRED_DELETE_PASSWORD = "321";    // Password required for deletion

  let songs = [];
  let pendingDeleteIndex = null;      // store index of song to delete

  // Parse Genius URL to extract artist and track name
  function parseGeniusUrl(url) {
    try {
      const urlObj = new URL(url);
      if (!urlObj.hostname.includes('genius.com')) return null;
      let path = urlObj.pathname.replace(/^\/+|\/+$/g, '');
      path = path.replace(/-lyrics$/, '').replace(/\.html?$/, '');
      if (!path) return null;
      let parts = path.split('-').filter(p => p.length > 0);
      if (parts.length < 2) return null;
      parts = parts.map(p => decodeURIComponent(p));
      let artist = parts[0];
      let track = parts.slice(1).join(' - ');
      artist = artist.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      track = track.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      track = track.replace(/\s+Lyrics$/i, '');
      return { artist: artist.trim(), track: track.trim() };
    } catch(e) { return null; }
  }

  function isValidGeniusUrl(url) {
    if (!url || url.trim() === '') return false;
    try {
      const urlObj = new URL(url);
      return urlObj.hostname.includes('genius.com');
    } catch(e) { return false; }
  }

  // ========== JSONBin.io CLOUD STORAGE ==========
  async function loadSongsFromCloud() {
    const statusDiv = document.getElementById('status');
    try {
      statusDiv.textContent = '🔄 Loading from cloud...';
      const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
        headers: { 'X-Master-Key': JSONBIN_API_KEY }
      });
      if (response.status === 401) {
        statusDiv.textContent = '⚠️ Invalid API Key. Using local storage only.';
        loadFromLocalFallback();
        return;
      }
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      songs = data.record.songs || [];
      statusDiv.textContent = '✅ Loaded from cloud (shared across all users)';
      renderSongs();
    } catch (error) {
      console.error(error);
      statusDiv.textContent = '⚠️ Cloud unavailable. Using local storage (private).';
      loadFromLocalFallback();
    }
  }

  function loadFromLocalFallback() {
    const stored = localStorage.getItem('selected_songs_fallback');
    if (stored) {
      songs = JSON.parse(stored);
    } else {
      songs = [
        { artist: "The Beatles", track: "Across the Universe", geniusUrl: "https://genius.com/The-beatles-across-the-universe-lyrics" },
        { artist: "Radiohead", track: "Creep", geniusUrl: "https://genius.com/Radiohead-creep-lyrics" },
        { artist: "Queen", track: "Bohemian Rhapsody", geniusUrl: "https://genius.com/Queen-bohemian-rhapsody-lyrics" }
      ];
    }
    renderSongs();
  }

  async function saveSongsToCloud() {
    const statusDiv = document.getElementById('status');
    try {
      statusDiv.textContent = '💾 Saving to cloud...';
      const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': JSONBIN_API_KEY
        },
        body: JSON.stringify({ songs: songs })
      });
      if (response.status === 401) {
        statusDiv.textContent = '⚠️ Invalid API Key. Saved to local storage only.';
        localStorage.setItem('selected_songs_fallback', JSON.stringify(songs));
        return;
      }
      if (!response.ok) throw new Error('Save failed');
      statusDiv.textContent = '✅ Saved to cloud! All users see changes.';
      setTimeout(() => {
        statusDiv.textContent = '☁️ Data in shared cloud storage';
      }, 3000);
    } catch (error) {
      console.error(error);
      statusDiv.textContent = '⚠️ Cloud save failed. Saved locally.';
      localStorage.setItem('selected_songs_fallback', JSON.stringify(songs));
    }
  }

  // ========== ADD & DELETE (with password guard) ==========
  async function addSongFromUrl(geniusUrl) {
    geniusUrl = geniusUrl.trim();
    if (!isValidGeniusUrl(geniusUrl)) {
      showFormError("❌ Please enter a valid Genius URL");
      return false;
    }
    const parsed = parseGeniusUrl(geniusUrl);
    if (!parsed || !parsed.artist || !parsed.track) {
      showFormError("❌ Could not detect artist and track name from URL");
      return false;
    }
    const duplicate = songs.some(s => 
      s.artist.toLowerCase() === parsed.artist.toLowerCase() && 
      s.track.toLowerCase() === parsed.track.toLowerCase()
    );
    if (duplicate) {
      showFormError(`⚠️ "${parsed.artist} – ${parsed.track}" already exists!`);
      return false;
    }
    songs.push({ artist: parsed.artist, track: parsed.track, geniusUrl });
    await saveSongsToCloud();
    renderSongs();
    clearForm();
    return true;
  }

  // called after password validation
  async function executeDeleteSong(index) {
    if (index === undefined || index < 0 || index >= songs.length) return;
    songs.splice(index, 1);
    await saveSongsToCloud();
    renderSongs();
  }

  // Show password modal for deletion
  function requestDeleteWithPassword(index) {
    pendingDeleteIndex = index;
    const modal = document.getElementById('deletePasswordModal');
    const input = document.getElementById('deletePasswordInput');
    input.value = '';
    modal.classList.add('active');
    input.focus();
  }

  function closePasswordModal() {
    const modal = document.getElementById('deletePasswordModal');
    modal.classList.remove('active');
    pendingDeleteIndex = null;
  }

  function verifyAndDelete() {
    const passwordInput = document.getElementById('deletePasswordInput').value;
    if (passwordInput === REQUIRED_DELETE_PASSWORD) {
      if (pendingDeleteIndex !== null) {
        executeDeleteSong(pendingDeleteIndex);
        closePasswordModal();
      } else {
        closePasswordModal();
      }
    } else {
      // wrong password feedback
      const errDiv = document.getElementById('form-error');
      errDiv.textContent = '🔒 Wrong password! Deletion requires password: 321';
      errDiv.classList.add('show');
      setTimeout(() => errDiv.classList.remove('show'), 2500);
      // shake input effect
      const inp = document.getElementById('deletePasswordInput');
      inp.style.border = '1px solid #c2410c';
      setTimeout(() => inp.style.border = '', 500);
      inp.value = '';
      inp.focus();
    }
  }

  // ========== RENDER UI ==========
  function renderSongs() {
    const container = document.getElementById('songs-list-container');
    const counter = document.getElementById('song-counter');
    if (songs.length === 0) {
      container.innerHTML = '<div class="empty-message">✨ No songs. Add your first one! ✨</div>';
      counter.textContent = '0 songs';
      return;
    }
    counter.textContent = `${songs.length} ${songs.length === 1 ? 'song' : 'songs'}`;
    container.innerHTML = songs.map((song, idx) => `
      <div class="song-item">
        <div class="song-info">
          <div class="song-title">${escapeHtml(song.artist)} – ${escapeHtml(song.track)}</div>
          <div class="song-artist">🎤 shared playlist</div>
        </div>
        <div class="song-actions">
          <a href="${escapeHtml(song.geniusUrl)}" class="listen-link" target="_blank">🎧 On Genius</a>
          <button class="btn-delete" data-index="${idx}">🗑️ Delete</button>
        </div>
      </div>
    `).join('');
    // attach delete event with password modal trigger
    document.querySelectorAll('.btn-delete').forEach(btn => {
      const idx = parseInt(btn.dataset.index);
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        requestDeleteWithPassword(idx);
      });
    });
  }

  function escapeHtml(str) { 
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) { 
      return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; 
    }); 
  }
  
  function clearForm() {
    document.getElementById('genius-url').value = '';
    document.getElementById('preview-card').classList.remove('show');
  }
  
  function showFormError(msg) {
    const err = document.getElementById('form-error');
    err.textContent = msg;
    err.classList.add('show');
    setTimeout(() => err.classList.remove('show'), 3000);
  }
  
  function updatePreview() {
    const url = document.getElementById('genius-url').value.trim();
    if (isValidGeniusUrl(url)) {
      const parsed = parseGeniusUrl(url);
      if (parsed && parsed.artist && parsed.track) {
        document.getElementById('preview-artist').textContent = parsed.artist;
        document.getElementById('preview-track').textContent = parsed.track;
        document.getElementById('preview-card').classList.add('show');
        return;
      }
    }
    document.getElementById('preview-card').classList.remove('show');
  }

  // modal event binding
  function bindModalEvents() {
    const modal = document.getElementById('deletePasswordModal');
    const cancelBtn = document.getElementById('cancelDeleteBtn');
    const confirmBtn = document.getElementById('confirmDeleteBtn');
    const passwordInput = document.getElementById('deletePasswordInput');
    
    cancelBtn.addEventListener('click', () => closePasswordModal());
    confirmBtn.addEventListener('click', () => verifyAndDelete());
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closePasswordModal();
    });
    passwordInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') verifyAndDelete();
    });
  }

  // Initialize
  document.addEventListener('DOMContentLoaded', () => {
    bindModalEvents();
    loadSongsFromCloud();
    const urlInput = document.getElementById('genius-url');
    const addBtn = document.getElementById('add-song-btn');
    urlInput.addEventListener('input', updatePreview);
    addBtn.addEventListener('click', () => addSongFromUrl(urlInput.value));
    urlInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addSongFromUrl(e.target.value);
    });
  });
</script>
</body>
</html>
