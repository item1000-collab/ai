<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Selected Songs · Shared Playlist | Genius + YouTube</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(145deg, #f3f0ea 0%, #e8e2d8 100%);
      font-family: system-ui, 'Segoe UI', sans-serif;
      padding: 2rem 1.2rem;
      min-height: 100vh;
    }
    .container { max-width: 920px; margin: 0 auto; }
    .gist-card {
      background: white;
      border-radius: 2rem;
      box-shadow: 0 25px 40px -14px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .favorite-content { padding: 2rem; }
    
    /* top genius link bar */
    .genius-top-link {
      background: #fef5e6;
      border-radius: 2rem;
      padding: 0.75rem 1.2rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem;
      border: 1px solid #f0e2d0;
    }
    .genius-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      color: #1f1a14;
    }
    .genius-link-btn {
      background: #121212;
      color: #fff4e6;
      padding: 0.4rem 1.1rem;
      border-radius: 60px;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    .genius-link-btn:hover { background: #e07c3c; transform: translateY(-1px); }
    
    /* double tab style: genius + youtube sections */
    .input-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
      border-bottom: 2px solid #ece3da;
      padding-bottom: 0.5rem;
    }
    .tab-btn {
      background: transparent;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      cursor: pointer;
      color: #6b5a48;
      transition: 0.2s;
    }
    .tab-btn.active {
      background: #e07c3c20;
      color: #e07c3c;
      border-bottom: 2px solid #e07c3c;
      border-radius: 1rem 1rem 0 0;
    }
    .tab-pane {
      display: none;
      animation: fade 0.2s ease;
    }
    .tab-pane.active-pane {
      display: block;
    }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    
    .add-song-form {
      background: #fefcf8;
      border: 1px solid #ece3da;
      border-radius: 1.5rem;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .form-title {
      font-weight: 600;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .url-input-wrapper, .youtube-search-wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .url-input-wrapper input, .youtube-search-wrapper input {
      flex: 1;
      padding: 0.85rem 1.2rem;
      border: 1px solid #e2d8cd;
      border-radius: 1rem;
      font-size: 0.9rem;
    }
    .url-input-wrapper input:focus, .youtube-search-wrapper input:focus {
      outline: none;
      border-color: #e07c3c;
    }
    .btn-add, .btn-youtube {
      background: #e07c3c;
      color: white;
      border: none;
      padding: 0.85rem 2rem;
      border-radius: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-youtube { background: #c4302b; }
    .btn-youtube:hover { background: #9e2a26; transform: translateY(-2px); }
    .preview-card {
      margin-top: 1rem;
      padding: 0.8rem;
      background: #eef4ea;
      border-radius: 1rem;
      display: none;
      border-left: 3px solid #e07c3c;
    }
    .preview-card.show { display: flex; gap: 8px; flex-wrap: wrap; }
    .preview-artist { font-weight: 600; color: #2b5e2b; }
    .preview-track { color: #4a6e3b; }
    .error-msg {
      color: #c2410c;
      background: #fff0e6;
      padding: 0.5rem;
      border-radius: 0.8rem;
      margin-top: 0.75rem;
      display: none;
    }
    .error-msg.show { display: block; }
    .songs-list { display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem; }
    .song-item {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      background: #fefcf8;
      border: 1px solid #ece3da;
      border-radius: 1.2rem;
      padding: 1rem 1.2rem;
    }
    .song-item:hover { border-color: #e07c3c; transform: translateX(3px); }
    .song-title { font-size: 1.2rem; font-weight: 600; }
    .song-artist { font-size: 0.8rem; color: #8a7c6b; margin-top: 2px; }
    .song-actions { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
    .listen-link {
      background: #181511;
      color: #fef5e6;
      text-decoration: none;
      padding: 0.45rem 1.1rem;
      border-radius: 60px;
      font-size: 0.8rem;
    }
    .listen-link.yt-link { background: #c4302b; }
    .listen-link.yt-link:hover { background: #e07c3c; }
    .btn-delete {
      background: none;
      border: 1px solid #e0cfbf;
      border-radius: 40px;
      padding: 0.45rem 1rem;
      cursor: pointer;
    }
    .empty-message { text-align: center; padding: 2.5rem; color: #b8aa99; }
    .status-bar {
      font-size: 0.7rem;
      color: #1db954;
      margin-bottom: 1rem;
      padding: 0.3rem 0.8rem;
      background: #e6f4ea;
      border-radius: 40px;
      display: inline-block;
    }
    /* Password modal */
    .password-modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .password-modal.active { display: flex; }
    .modal-card {
      background: white;
      border-radius: 2rem;
      max-width: 380px;
      width: 90%;
      padding: 1.8rem;
      text-align: center;
      box-shadow: 0 25px 40px rgba(0,0,0,0.3);
    }
    .modal-card input {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid #ddd2c4;
      border-radius: 1.2rem;
      margin: 1rem 0;
      font-family: monospace;
    }
    .modal-buttons { display: flex; gap: 0.8rem; justify-content: center; }
    .confirm-delete-btn { background: #c2410c; color: white; border: none; padding: 0.5rem 1.4rem; border-radius: 2rem; cursor: pointer; }
    .cancel-modal-btn { background: #e9e2d8; border: none; padding: 0.5rem 1.4rem; border-radius: 2rem; cursor: pointer; }
    @media (max-width: 620px) {
      .favorite-content { padding: 1.5rem; }
      .song-item { flex-direction: column; align-items: stretch; gap: 12px; }
      .url-input-wrapper, .youtube-search-wrapper { flex-direction: column; }
      .btn-add, .btn-youtube { width: 100%; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="gist-card">
    <div class="favorite-content">
      <!-- Genius top link -->
      <div class="genius-top-link">
        <div class="genius-brand"><span>🎤</span> <span>Genius</span><span style="font-size:0.8rem;"> • lyrics & annotations</span></div>
        <a href="https://genius.com/" class="genius-link-btn" target="_blank">🔗 Visit Genius.com →</a>
      </div>

      <div class="title-section">
        <h1>Selected Songs <span>🎵</span></h1>
        <div class="song-count" id="song-counter">0 songs</div>
      </div>

      <!-- TABS: Genius URL or YouTube Search -->
      <div class="input-tabs">
        <button class="tab-btn active" data-tab="geniusTab">📜 Genius URL</button>
        <button class="tab-btn" data-tab="youtubeTab">▶️ YouTube search</button>
      </div>

      <!-- Genius Tab -->
      <div id="geniusTab" class="tab-pane active-pane">
        <div class="add-song-form">
          <div class="form-title"><span>🔗</span> Add via Genius link</div>
          <div class="url-input-wrapper">
            <input type="url" id="genius-url" placeholder="https://genius.com/Nirvana-smells-like-teen-spirit-lyrics">
            <button class="btn-add" id="add-genius-btn">➕ Add from Genius</button>
          </div>
          <div id="preview-card" class="preview-card">
            <span>🔍 Detected:</span>
            <span class="preview-artist" id="preview-artist"></span>
            <span>–</span>
            <span class="preview-track" id="preview-track"></span>
          </div>
        </div>
      </div>

      <!-- YouTube Search Tab -->
      <div id="youtubeTab" class="tab-pane">
        <div class="add-song-form">
          <div class="form-title"><span>🎬</span> Search & add from YouTube</div>
          <div class="youtube-search-wrapper">
            <input type="text" id="youtube-query" placeholder="Enter song name + artist... e.g., 'Nirvana Smells Like Teen Spirit'">
            <button class="btn-youtube" id="search-youtube-btn">🔍 Search & Add</button>
          </div>
          <div id="youtube-preview" class="preview-card" style="flex-direction:column; gap:6px;">
            <div style="font-weight:500;">📺 Top result preview:</div>
            <div id="yt-preview-info" style="font-size:0.85rem;">—</div>
            <div id="yt-preview-link" style="font-size:0.75rem; color:#2b5e2b;"></div>
          </div>
        </div>
      </div>

      <div id="form-error" class="error-msg"></div>
      <div id="status" class="status-bar">🔄 Loading from cloud...</div>
      <div id="songs-list-container" class="songs-list"></div>
    </div>
  </div>
</div>

<!-- Password deletion modal -->
<div id="deletePasswordModal" class="password-modal">
  <div class="modal-card">
    <h3>🔐 Confirm deletion</h3>
    <p>Enter password to delete this song</p>
    <input type="password" id="deletePasswordInput" placeholder="Password" autocomplete="off">
    <div class="modal-buttons">
      <button class="cancel-modal-btn" id="cancelDeleteBtn">Cancel</button>
      <button class="confirm-delete-btn" id="confirmDeleteBtn">Delete</button>
    </div>
  </div>
</div>

<script>
  // === CONFIGURATION ===
  const JSONBIN_BIN_ID = '6a2bba45f5f4af5e29e4dead';
  const JSONBIN_API_KEY = '$2a$10$0Jg23.3TQdidpakvguzsKOlt/9e6obrZxt3nsjzUbHmWEx2y7m7Iq';
  const REQUIRED_DELETE_PASSWORD = "321";
  
  // Song structure: each song has artist, track, geniusUrl OR youtubeUrl (or both), but we store main url for listen
  // For compatibility: we extend to store 'url' (preferred listen link) and 'sourceType'
  let songs = [];
  let pendingDeleteIndex = null;

  // ----- Helper Functions -----
  function parseGeniusUrl(url) {
    try {
      const urlObj = new URL(url);
      if (!urlObj.hostname.includes('genius.com')) return null;
      let path = urlObj.pathname.replace(/^\/+|\/+$/g, '');
      path = path.replace(/-lyrics$/, '').replace(/\.html?$/, '');
      if (!path) return null;
      let parts = path.split('-').filter(p => p.length > 0);
      if (parts.length < 2) return null;
      parts = parts.map(p => decodeURIComponent(p));
      let artist = parts[0];
      let track = parts.slice(1).join(' - ');
      artist = artist.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      track = track.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      track = track.replace(/\s+Lyrics$/i, '');
      return { artist: artist.trim(), track: track.trim() };
    } catch(e) { return null; }
  }

  function isValidGeniusUrl(url) {
    if (!url || url.trim() === '') return false;
    try { return new URL(url).hostname.includes('genius.com'); } catch(e) { return false; }
  }

  // YouTube search via no-cors friendly: we'll use public oembed + innertube? we need a simple proxy: use YouTube Data API v3? but no API key? 
  // Alternative: use a public no-key scraper? not reliable. We'll use a fetch to a JSONP? But since we want clean: 
  // We'll use 'https://noembed.com' or similar? Actually noembed supports youtube. Perfect: no API key required!
  async function searchYouTubeVideo(query) {
    try {
      const endpoint = `https://noembed.com/embed?url=https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
      // noembed doesn't support search directly. We'll use 'https://www.youtube.com/oembed?url=https://youtube.com/watch?v=...' not for search.
      // Better: use 'https://api.allorigins.win/raw?url=' but search is complex. I'll implement a simple fetch to yt search via 'invidious' public instance?
      // For demo reliability, we'll use a public cors proxy + fetch from yt search? Might be unstable.
      // Instead I'll implement a safe workaround: Use YouTube's search suggest? but no videoID. Simpler: use 'https://yt.lemnoslife.com' no key? 
      // I will use the popular public API "YouTube Music API" substitute: 'https://www.googleapis.com/youtube/v3/search' requires key. 
      // To keep fully working without external keys, I'll implement a function that uses a public CORS proxy and scrapes? 
      // But we must respect cross-origin. Instead, I'll embed a clean solution: use 'https://corsproxy.io/?' + youtube search but heavy.
      // For seamless UX, I'll use a reliable public youtube search API: 'https://pipedapi.kavin.rocks' (piped instance) which returns JSON.
      const searchUrl = `https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(query)}&filter=music_songs`;
      const response = await fetch(searchUrl);
      if (!response.ok) throw new Error('YT search failed');
      const data = await response.json();
      if (data.items && data.items.length > 0) {
        const first = data.items[0];
        const videoId = first.url?.split('v=')[1] || first.videoId;
        if (videoId) {
          const title = first.title || query;
          const uploader = first.uploaderName || 'Unknown Artist';
          const youtubeUrl = `https://www.youtube.com/watch?v=${videoId}`;
          // try to extract artist from uploader and title
          let artist = uploader;
          let track = title;
          // smart cleaning
          if (title.includes(' - ')) {
            const parts = title.split(' - ');
            artist = parts[0];
            track = parts.slice(1).join(' - ');
          }
          return { artist: artist.trim(), track: track.trim(), youtubeUrl };
        }
      }
      return null;
    } catch (err) {
      console.warn(err);
      return null;
    }
  }

  // show error globally
  function showFormError(msg) {
    const errDiv = document.getElementById('form-error');
    errDiv.textContent = msg;
    errDiv.classList.add('show');
    setTimeout(() => errDiv.classList.remove('show'), 3500);
  }

  // add song to storage (generic)
  async function addSong(songObj) {
    if (!songObj.artist || !songObj.track || !songObj.url) return false;
    const duplicate = songs.some(s => s.artist.toLowerCase() === songObj.artist.toLowerCase() && s.track.toLowerCase() === songObj.track.toLowerCase());
    if (duplicate) {
      showFormError(`⚠️ "${songObj.artist} – ${songObj.track}" already exists!`);
      return false;
    }
    songs.push({ artist: songObj.artist, track: songObj.track, geniusUrl: songObj.url, source: songObj.source || 'link' });
    await saveSongsToCloud();
    renderSongs();
    return true;
  }

  // Genius addition
  async function addFromGenius() {
    const urlInput = document.getElementById('genius-url');
    let geniusUrl = urlInput.value.trim();
    if (!isValidGeniusUrl(geniusUrl)) {
      showFormError("❌ Please enter a valid Genius URL");
      return;
    }
    const parsed = parseGeniusUrl(geniusUrl);
    if (!parsed || !parsed.artist || !parsed.track) {
      showFormError("❌ Could not detect artist/track from Genius URL");
      return;
    }
    const success = await addSong({ artist: parsed.artist, track: parsed.track, url: geniusUrl, source: 'genius' });
    if (success) {
      document.getElementById('genius-url').value = '';
      document.getElementById('preview-card').classList.remove('show');
    }
  }

  // YouTube search & add
  async function searchAndAddYouTube() {
    const queryInput = document.getElementById('youtube-query');
    const query = queryInput.value.trim();
    if (!query) {
      showFormError("🎵 Please enter a song name or artist to search on YouTube");
      return;
    }
    const previewDiv = document.getElementById('youtube-preview');
    const previewInfo = document.getElementById('yt-preview-info');
    const previewLinkSpan = document.getElementById('yt-preview-link');
    previewInfo.textContent = '🔎 Searching YouTube...';
    previewLinkSpan.textContent = '';
    previewDiv.classList.add('show');
    
    const result = await searchYouTubeVideo(query);
    if (!result || !result.youtubeUrl) {
      previewInfo.textContent = '⚠️ No results. Try different keywords.';
      showFormError('Could not find matching YouTube video. Try more specific query.');
      return;
    }
    previewInfo.innerHTML = `🎤 <strong>${escapeHtml(result.artist)}</strong> – <strong>${escapeHtml(result.track)}</strong>`;
    previewLinkSpan.innerHTML = `📺 <a href="${result.youtubeUrl}" target="_blank" style="color:#c4302b;">Preview on YouTube</a>`;
    
    const added = await addSong({ artist: result.artist, track: result.track, url: result.youtubeUrl, source: 'youtube' });
    if (added) {
      queryInput.value = '';
      previewDiv.classList.remove('show');
    }
  }

  // ========== CLOUD STORAGE ==========
  async function loadSongsFromCloud() {
    const statusDiv = document.getElementById('status');
    try {
      statusDiv.textContent = '🔄 Loading from cloud...';
      const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
        headers: { 'X-Master-Key': JSONBIN_API_KEY }
      });
      if (response.status === 401) {
        statusDiv.textContent = '⚠️ Invalid API Key. Using local storage only.';
        loadFromLocalFallback();
        return;
      }
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      songs = data.record.songs || [];
      // migrate any old songs missing url type
      statusDiv.textContent = '✅ Loaded from cloud (shared across users)';
      renderSongs();
    } catch (error) {
      statusDiv.textContent = '⚠️ Cloud unavailable. Using local storage (private).';
      loadFromLocalFallback();
    }
  }

  function loadFromLocalFallback() {
    const stored = localStorage.getItem('selected_songs_fallback');
    if (stored) {
      songs = JSON.parse(stored);
    } else {
      songs = [
        { artist: "The Beatles", track: "Across the Universe", geniusUrl: "https://genius.com/The-beatles-across-the-universe-lyrics", source: "genius" },
        { artist: "Radiohead", track: "Creep", geniusUrl: "https://genius.com/Radiohead-creep-lyrics", source: "genius" },
        { artist: "Queen", track: "Bohemian Rhapsody", geniusUrl: "https://genius.com/Queen-bohemian-rhapsody-lyrics", source: "genius" }
      ];
    }
    renderSongs();
  }

  async function saveSongsToCloud() {
    const statusDiv = document.getElementById('status');
    try {
      statusDiv.textContent = '💾 Saving to cloud...';
      const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY },
        body: JSON.stringify({ songs: songs })
      });
      if (response.status === 401) {
        statusDiv.textContent = '⚠️ API Key issue. Saved locally.';
        localStorage.setItem('selected_songs_fallback', JSON.stringify(songs));
        return;
      }
      if (!response.ok) throw new Error('Save failed');
      statusDiv.textContent = '✅ Saved to cloud! All users see changes.';
      setTimeout(() => { statusDiv.textContent = '☁️ Data in shared cloud storage'; }, 3000);
    } catch (error) {
      localStorage.setItem('selected_songs_fallback', JSON.stringify(songs));
      statusDiv.textContent = '⚠️ Cloud save failed. Saved locally.';
    }
  }

  // DELETE with password
  async function executeDeleteSong(index) {
    if (index !== undefined && index >= 0 && index < songs.length) {
      songs.splice(index, 1);
      await saveSongsToCloud();
      renderSongs();
    }
  }

  function requestDeleteWithPassword(index) {
    pendingDeleteIndex = index;
    const modal = document.getElementById('deletePasswordModal');
    const input = document.getElementById('deletePasswordInput');
    input.value = '';
    modal.classList.add('active');
    input.focus();
  }

  function closePasswordModal() {
    document.getElementById('deletePasswordModal').classList.remove('active');
    pendingDeleteIndex = null;
  }

  function verifyAndDelete() {
    const password = document.getElementById('deletePasswordInput').value;
    if (password === REQUIRED_DELETE_PASSWORD) {
      if (pendingDeleteIndex !== null) executeDeleteSong(pendingDeleteIndex);
      closePasswordModal();
    } else {
      showFormError('🔒 Wrong password! Deletion requires password: 321');
      const inp = document.getElementById('deletePasswordInput');
      inp.style.border = '1px solid #c2410c';
      setTimeout(() => inp.style.border = '', 500);
      inp.value = '';
    }
  }

  // Render songs with proper listen link (Genius or YouTube)
  function renderSongs() {
    const container = document.getElementById('songs-list-container');
    const counter = document.getElementById('song-counter');
    if (songs.length === 0) {
      container.innerHTML = '<div class="empty-message">✨ No songs. Add from Genius or YouTube! ✨</div>';
      counter.textContent = '0 songs';
      return;
    }
    counter.textContent = `${songs.length} ${songs.length === 1 ? 'song' : 'songs'}`;
    container.innerHTML = songs.map((song, idx) => {
      let listenUrl = song.geniusUrl || (song.url ? song.url : '#');
      let linkLabel = '🎧 Listen';
      let linkClass = '';
      if (listenUrl && listenUrl.includes('youtube.com')) {
        linkLabel = '▶️ Watch on YouTube';
        linkClass = 'yt-link';
      } else if (listenUrl && listenUrl.includes('genius.com')) {
        linkLabel = '🎤 View on Genius';
      }
      return `
        <div class="song-item">
          <div class="song-info">
            <div class="song-title">${escapeHtml(song.artist)} – ${escapeHtml(song.track)}</div>
            <div class="song-artist">${song.source === 'youtube' ? '📺 YouTube source' : '📜 Genius source'}</div>
          </div>
          <div class="song-actions">
            <a href="${escapeHtml(listenUrl)}" class="listen-link ${linkClass}" target="_blank">${linkLabel}</a>
            <button class="btn-delete" data-index="${idx}">🗑️ Delete</button>
          </div>
        </div>
      `;
    }).join('');
    document.querySelectorAll('.btn-delete').forEach(btn => {
      const idx = parseInt(btn.dataset.index);
      btn.addEventListener('click', () => requestDeleteWithPassword(idx));
    });
  }

  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
  function updateGeniusPreview() {
    const url = document.getElementById('genius-url').value.trim();
    if (isValidGeniusUrl(url)) {
      const parsed = parseGeniusUrl(url);
      if (parsed) {
        document.getElementById('preview-artist').textContent = parsed.artist;
        document.getElementById('preview-track').textContent = parsed.track;
        document.getElementById('preview-card').classList.add('show');
        return;
      }
    }
    document.getElementById('preview-card').classList.remove('show');
  }

  // Tab switching
  function initTabs() {
    const tabs = document.querySelectorAll('.tab-btn');
    const panes = document.querySelectorAll('.tab-pane');
    tabs.forEach(btn => {
      btn.addEventListener('click', () => {
        const targetId = btn.dataset.tab;
        tabs.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        panes.forEach(pane => pane.classList.remove('active-pane'));
        document.getElementById(targetId).classList.add('active-pane');
      });
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    initTabs();
    loadSongsFromCloud();
    document.getElementById('add-genius-btn').addEventListener('click', addFromGenius);
    document.getElementById('search-youtube-btn').addEventListener('click', searchAndAddYouTube);
    document.getElementById('genius-url').addEventListener('input', updateGeniusPreview);
    document.getElementById('youtube-query').addEventListener('keypress', (e) => { if(e.key === 'Enter') searchAndAddYouTube(); });
    document.getElementById('confirmDeleteBtn').addEventListener('click', verifyAndDelete);
    document.getElementById('cancelDeleteBtn').addEventListener('click', closePasswordModal);
    document.getElementById('deletePasswordModal').addEventListener('click', (e) => { if(e.target === document.getElementById('deletePasswordModal')) closePasswordModal(); });
  });
</script>
</body>
</html>
