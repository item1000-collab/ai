<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selected Songs · Общий плейлист</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(145deg, #f3f0ea 0%, #e8e2d8 100%);
      font-family: system-ui, 'Segoe UI', sans-serif;
      padding: 2rem 1.2rem;
      min-height: 100vh;
    }
    .container { max-width: 920px; margin: 0 auto; }
    .gist-card {
      background: white;
      border-radius: 2rem;
      box-shadow: 0 25px 40px -14px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .favorite-content { padding: 2rem; }
    
    .genius-top-link {
      background: #fef5e6;
      border-radius: 2rem;
      padding: 0.75rem 1.2rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem;
    }
    .genius-link-btn {
      background: #121212;
      color: #fff4e6;
      padding: 0.4rem 1.1rem;
      border-radius: 60px;
      text-decoration: none;
      font-size: 0.85rem;
    }
    
    .input-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
      border-bottom: 2px solid #ece3da;
      padding-bottom: 0.5rem;
    }
    .tab-btn {
      background: transparent;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      cursor: pointer;
      color: #6b5a48;
    }
    .tab-btn.active {
      background: #e07c3c20;
      color: #e07c3c;
      border-bottom: 2px solid #e07c3c;
    }
    .tab-pane { display: none; }
    .tab-pane.active-pane { display: block; }
    
    .add-song-form {
      background: #fefcf8;
      border: 1px solid #ece3da;
      border-radius: 1.5rem;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .form-title {
      font-weight: 600;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .url-input-wrapper, .youtube-search-wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }
    input {
      flex: 1;
      padding: 0.85rem 1.2rem;
      border: 1px solid #e2d8cd;
      border-radius: 1rem;
      font-size: 0.9rem;
    }
    button {
      background: #e07c3c;
      color: white;
      border: none;
      padding: 0.85rem 2rem;
      border-radius: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-youtube { background: #c4302b; }
    .preview-card {
      margin-top: 1rem;
      padding: 0.8rem;
      background: #eef4ea;
      border-radius: 1rem;
      display: none;
    }
    .preview-card.show { display: block; }
    .error-msg {
      color: #c2410c;
      background: #fff0e6;
      padding: 0.5rem;
      border-radius: 0.8rem;
      margin-top: 0.75rem;
      display: none;
    }
    .error-msg.show { display: block; }
    .songs-list { display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem; }
    .song-item {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      background: #fefcf8;
      border: 1px solid #ece3da;
      border-radius: 1.2rem;
      padding: 1rem 1.2rem;
    }
    .song-title { font-size: 1.2rem; font-weight: 600; }
    .song-artist { font-size: 0.8rem; color: #8a7c6b; margin-top: 2px; }
    .song-actions { display: flex; gap: 0.75rem; }
    .listen-link {
      background: #181511;
      color: #fef5e6;
      text-decoration: none;
      padding: 0.45rem 1.1rem;
      border-radius: 60px;
      font-size: 0.8rem;
    }
    .listen-link.yt-link { background: #c4302b; }
    .btn-delete {
      background: none;
      border: 1px solid #e0cfbf;
      border-radius: 40px;
      padding: 0.45rem 1rem;
      cursor: pointer;
    }
    .empty-message { text-align: center; padding: 2.5rem; color: #b8aa99; }
    .status-bar {
      font-size: 0.7rem;
      padding: 0.3rem 0.8rem;
      background: #e6f4ea;
      border-radius: 40px;
      display: inline-block;
    }
    .password-modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .password-modal.active { display: flex; }
    .modal-card {
      background: white;
      border-radius: 2rem;
      max-width: 380px;
      width: 90%;
      padding: 1.8rem;
      text-align: center;
    }
    @media (max-width: 620px) {
      .song-item { flex-direction: column; gap: 12px; }
      .url-input-wrapper, .youtube-search-wrapper { flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="gist-card">
    <div class="favorite-content">
      <div class="genius-top-link">
        <div><span>🎤</span> Genius • lyrics & annotations</div>
        <a href="https://genius.com/" class="genius-link-btn" target="_blank">🔗 Visit Genius.com →</a>
      </div>

      <div class="title-section">
        <h1>Selected Songs <span>🎵</span></h1>
        <div class="song-count" id="song-counter">0 songs</div>
      </div>

      <div class="input-tabs">
        <button class="tab-btn active" data-tab="geniusTab">📜 Genius URL</button>
        <button class="tab-btn" data-tab="youtubeTab">▶️ YouTube (ссылка или текст)</button>
      </div>

      <div id="geniusTab" class="tab-pane active-pane">
        <div class="add-song-form">
          <div class="form-title">🔗 Добавить через Genius ссылку</div>
          <div class="url-input-wrapper">
            <input type="url" id="genius-url" placeholder="https://genius.com/Nirvana-smells-like-teen-spirit-lyrics">
            <button id="add-genius-btn">➕ Добавить</button>
          </div>
          <div id="preview-card" class="preview-card">
            <strong>🔍 Найдено:</strong> <span id="preview-artist"></span> – <span id="preview-track"></span>
          </div>
        </div>
      </div>

      <div id="youtubeTab" class="tab-pane">
        <div class="add-song-form">
          <div class="form-title">🎬 Добавить через YouTube</div>
          <div class="youtube-search-wrapper">
            <input type="text" id="youtube-query" placeholder="Название песни или ссылка на YouTube...">
            <button class="btn-youtube" id="search-youtube-btn">🔍 Добавить</button>
          </div>
          <div id="youtube-preview" class="preview-card">
            <div id="yt-preview-info">—</div>
          </div>
        </div>
      </div>

      <div id="form-error" class="error-msg"></div>
      <div id="status" class="status-bar">🔄 Загрузка...</div>
      <div id="songs-list-container" class="songs-list"></div>
    </div>
  </div>
</div>

<div id="deletePasswordModal" class="password-modal">
  <div class="modal-card">
    <h3>🔐 Подтверждение удаления</h3>
    <p>Введите пароль для удаления песни</p>
    <input type="password" id="deletePasswordInput" placeholder="Пароль" autocomplete="off">
    <div style="display: flex; gap: 0.8rem; justify-content: center; margin-top: 1rem;">
      <button class="cancel-modal-btn" id="cancelDeleteBtn" style="background:#e9e2d8; color:#2b241d;">Отмена</button>
      <button class="confirm-delete-btn" id="confirmDeleteBtn" style="background:#c2410c;">Удалить</button>
    </div>
  </div>
</div>

<script>
  const JSONBIN_BIN_ID = '6a2bba45f5f4af5e29e4dead';
  const JSONBIN_API_KEY = '$2a$10$0Jg23.3TQdidpakvguzsKOlt/9e6obrZxt3nsjzUbHmWEx2y7m7Iq';
  const REQUIRED_DELETE_PASSWORD = "321";

  let songs = [];
  let pendingDeleteIndex = null;

  // Функции для Genius
  function parseGeniusUrl(url) {
    try {
      const urlObj = new URL(url);
      if (!urlObj.hostname.includes('genius.com')) return null;
      let path = urlObj.pathname.replace(/^\/+|\/+$/g, '');
      path = path.replace(/-lyrics$/, '').replace(/\.html?$/, '');
      let parts = path.split('-').filter(p => p.length > 0);
      if (parts.length < 2) return null;
      let artist = parts[0].replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      let track = parts.slice(1).join(' ').replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      return { artist: artist.trim(), track: track.trim() };
    } catch(e) { return null; }
  }

  // НОВАЯ функция для поиска на YouTube (работает!)
  async function searchYouTubeVideo(query) {
    try {
      // Используем Invidious API (работает без CORS проблем)
      const searchUrl = `https://invidious.io/instances/`;
      // Попробуем несколько публичных инстансов
      const instances = [
        'https://invidious.projectsegfau.lt',
        'https://yewtu.be',
        'https://inv.riverside.rocks'
      ];
      
      for (const instance of instances) {
        try {
          const response = await fetch(`${instance}/api/v1/search?q=${encodeURIComponent(query)}&type=video&sort=relevance`);
          if (response.ok) {
            const data = await response.json();
            if (data && data.length > 0) {
              const video = data[0];
              let title = video.title;
              let author = video.author || "Unknown Artist";
              let track = title;
              let artist = author;
              
              // Пытаемся извлечь исполнителя из названия
              if (title.includes(' - ')) {
                const parts = title.split(' - ');
                artist = parts[0];
                track = parts.slice(1).join(' - ');
              }
              
              return {
                artist: artist.trim(),
                track: track.trim(),
                youtubeUrl: `https://www.youtube.com/watch?v=${video.videoId}`
              };
            }
          }
        } catch(e) { continue; }
      }
      
      // Fallback: используем другой API
      const fallbackUrl = `https://noembed.com/embed?url=https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
      const fbResponse = await fetch(fallbackUrl);
      if (fbResponse.ok) {
        const data = await fbResponse.json();
        if (data && data.url) {
          return {
            artist: "YouTube Artist",
            track: query,
            youtubeUrl: data.url
          };
        }
      }
      return null;
    } catch(err) {
      console.error("YouTube search error:", err);
      return null;
    }
  }

  // Добавление песни
  async function addSong(songObj) {
    if (!songObj.artist || !songObj.track || !songObj.url) return false;
    const duplicate = songs.some(s => 
      s.artist.toLowerCase() === songObj.artist.toLowerCase() && 
      s.track.toLowerCase() === songObj.track.toLowerCase()
    );
    if (duplicate) {
      showFormError(`⚠️ "${songObj.artist} – ${songObj.track}" уже существует!`);
      return false;
    }
    songs.push({ 
      artist: songObj.artist, 
      track: songObj.track, 
      geniusUrl: songObj.url, 
      source: songObj.source || 'link' 
    });
    await saveSongsToCloud();
    renderSongs();
    return true;
  }

  // Добавление из Genius
  async function addFromGenius() {
    const url = document.getElementById('genius-url').value.trim();
    if (!url || !url.includes('genius.com')) {
      showFormError("❌ Введите корректную ссылку Genius");
      return;
    }
    const parsed = parseGeniusUrl(url);
    if (!parsed) {
      showFormError("❌ Не удалось распознать исполнителя и трек");
      return;
    }
    await addSong({ artist: parsed.artist, track: parsed.track, url: url, source: 'genius' });
    document.getElementById('genius-url').value = '';
    document.getElementById('preview-card').classList.remove('show');
  }

  // Добавление из YouTube (текст или ссылка)
  async function addFromYouTube() {
    const query = document.getElementById('youtube-query').value.trim();
    if (!query) {
      showFormError("🎵 Введите название песни или ссылку YouTube");
      return;
    }
    
    const previewDiv = document.getElementById('youtube-preview');
    const previewInfo = document.getElementById('yt-preview-info');
    previewInfo.textContent = '🔎 Поиск...';
    previewDiv.classList.add('show');
    
    let result = null;
    
    // Проверяем, является ли ввод ссылкой YouTube
    const isYoutubeLink = query.includes('youtube.com/watch') || query.includes('youtu.be/');
    
    if (isYoutubeLink) {
      // Извлекаем ID видео
      let videoId = null;
      const match = query.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/);
      if (match) videoId = match[1];
      
      if (videoId) {
        const oembedUrl = `https://noembed.com/embed?url=https://www.youtube.com/watch?v=${videoId}`;
        try {
          const response = await fetch(oembedUrl);
          const data = await response.json();
          if (data && data.title) {
            let title = data.title;
            let artist = "YouTube Artist";
            let track = title;
            if (title.includes(' - ')) {
              const parts = title.split(' - ');
              artist = parts[0];
              track = parts.slice(1).join(' - ');
            }
            result = { artist, track, youtubeUrl: `https://www.youtube.com/watch?v=${videoId}` };
          }
        } catch(e) { console.error(e); }
      }
    } else {
      // Поиск по тексту
      result = await searchYouTubeVideo(query);
    }
    
    if (!result || !result.youtubeUrl) {
      previewInfo.textContent = '⚠️ Ничего не найдено. Попробуйте другие ключевые слова.';
      showFormError('Не удалось найти видео на YouTube');
      return;
    }
    
    previewInfo.innerHTML = `🎤 <strong>${escapeHtml(result.artist)}</strong> – <strong>${escapeHtml(result.track)}</strong>`;
    
    const added = await addSong({ 
      artist: result.artist, 
      track: result.track, 
      url: result.youtubeUrl, 
      source: 'youtube' 
    });
    
    if (added) {
      document.getElementById('youtube-query').value = '';
      previewDiv.classList.remove('show');
    }
  }

  // Облачные операции
  async function loadSongsFromCloud() {
    const statusDiv = document.getElementById('status');
    try {
      statusDiv.textContent = '🔄 Загрузка из облака...';
      const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
        headers: { 'X-Master-Key': JSONBIN_API_KEY }
      });
      if (!response.ok) throw new Error('Cloud error');
      const data = await response.json();
      songs = data.record.songs || [];
      statusDiv.textContent = '✅ Загружено из облака';
      renderSongs();
    } catch (error) {
      statusDiv.textContent = '⚠️ Облако недоступно. Используется локальное хранилище.';
      const stored = localStorage.getItem('selected_songs_fallback');
      if (stored) {
        songs = JSON.parse(stored);
      } else {
        songs = [
          { artist: "The Beatles", track: "Across The Universe", geniusUrl: "https://genius.com/The-beatles-across-the-universe-lyrics", source: "genius" },
          { artist: "Radiohead", track: "Creep", geniusUrl: "https://genius.com/Radiohead-creep-lyrics", source: "genius" },
          { artist: "Queen", track: "Bohemian Rhapsody", geniusUrl: "https://genius.com/Queen-bohemian-rhapsody-lyrics", source: "genius" }
        ];
      }
      renderSongs();
    }
  }

  async function saveSongsToCloud() {
    try {
      const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': JSONBIN_API_KEY
        },
        body: JSON.stringify({ songs: songs })
      });
      if (!response.ok) throw new Error('Save failed');
      localStorage.setItem('selected_songs_fallback', JSON.stringify(songs));
      document.getElementById('status').textContent = '✅ Сохранено в облако';
    } catch (error) {
      localStorage.setItem('selected_songs_fallback', JSON.stringify(songs));
      document.getElementById('status').textContent = '⚠️ Сохранено локально';
    }
  }

  // Удаление с паролем
  async function executeDeleteSong(index) {
    if (index >= 0 && index < songs.length) {
      songs.splice(index, 1);
      await saveSongsToCloud();
      renderSongs();
    }
  }

  function requestDeleteWithPassword(index) {
    pendingDeleteIndex = index;
    document.getElementById('deletePasswordModal').classList.add('active');
    document.getElementById('deletePasswordInput').value = '';
  }

  function verifyAndDelete() {
    const password = document.getElementById('deletePasswordInput').value;
    if (password === REQUIRED_DELETE_PASSWORD) {
      executeDeleteSong(pendingDeleteIndex);
      closeModal();
    } else {
      showFormError('🔒 Неверный пароль! Нужно ввести: 321');
    }
  }

  function closeModal() {
    document.getElementById('deletePasswordModal').classList.remove('active');
    pendingDeleteIndex = null;
  }

  // Отображение списка
  function renderSongs() {
    const container = document.getElementById('songs-list-container');
    const counter = document.getElementById('song-counter');
    if (songs.length === 0) {
      container.innerHTML = '<div class="empty-message">✨ Нет песен. Добавьте первую! ✨</div>';
      counter.textContent = '0 песен';
      return;
    }
    counter.textContent = `${songs.length} ${songs.length === 1 ? 'песня' : 'песен'}`;
    container.innerHTML = songs.map((song, idx) => {
      let listenUrl = song.geniusUrl;
      let linkClass = '';
      let linkLabel = '🎧 Слушать';
      if (listenUrl && listenUrl.includes('youtube.com')) {
        linkLabel = '▶️ YouTube';
        linkClass = 'yt-link';
      } else if (listenUrl && listenUrl.includes('genius.com')) {
        linkLabel = '🎤 Genius';
      }
      return `
        <div class="song-item">
          <div>
            <div class="song-title">${escapeHtml(song.artist)} – ${escapeHtml(song.track)}</div>
            <div class="song-artist">${song.source === 'youtube' ? '📺 YouTube' : '📜 Genius'}</div>
          </div>
          <div class="song-actions">
            <a href="${escapeHtml(listenUrl)}" class="listen-link ${linkClass}" target="_blank">${linkLabel}</a>
            <button class="btn-delete" data-index="${idx}">🗑️ Удалить</button>
          </div>
        </div>
      `;
    }).join('');
    document.querySelectorAll('.btn-delete').forEach(btn => {
      btn.addEventListener('click', (e) => requestDeleteWithPassword(parseInt(btn.dataset.index)));
    });
  }

  function escapeHtml(str) { 
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); 
  }
  
  function showFormError(msg) {
    const err = document.getElementById('form-error');
    err.textContent = msg;
    err.classList.add('show');
    setTimeout(() => err.classList.remove('show'), 3000);
  }

  function updateGeniusPreview() {
    const url = document.getElementById('genius-url').value.trim();
    if (url && url.includes('genius.com')) {
      const parsed = parseGeniusUrl(url);
      if (parsed) {
        document.getElementById('preview-artist').textContent = parsed.artist;
        document.getElementById('preview-track').textContent = parsed.track;
        document.getElementById('preview-card').classList.add('show');
        return;
      }
    }
    document.getElementById('preview-card').classList.remove('show');
  }

  // Табы
  function initTabs() {
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active-pane'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active-pane');
      });
    });
  }

  // Инициализация
  document.addEventListener('DOMContentLoaded', () => {
    initTabs();
    loadSongsFromCloud();
    document.getElementById('add-genius-btn').addEventListener('click', addFromGenius);
    document.getElementById('search-youtube-btn').addEventListener('click', addFromYouTube);
    document.getElementById('genius-url').addEventListener('input', updateGeniusPreview);
    document.getElementById('confirmDeleteBtn').addEventListener('click', verifyAndDelete);
    document.getElementById('cancelDeleteBtn').addEventListener('click', closeModal);
  });
</script>
</body>
</html>
