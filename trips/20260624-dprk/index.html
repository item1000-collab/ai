    let currentLang = 'ru';

    const galleryContainer = document.getElementById('galleryContainer');
    const mainTitleElem = document.getElementById('mainTitle');
    const footerElem = document.getElementById('footerText');
    const pdfLinkSpan = document.getElementById('pdfLinkText');
    const langRuBtn = document.getElementById('langRuBtn');
    const langEnBtn = document.getElementById('langEnBtn');

    function renderGallery() {
        if (!galleryContainer) return;
        
        let rowsHtml = '';
        for (let i = 0; i < photos.length; i++) {
            const photo = photos[i];
            const isRussian = currentLang === 'ru';
            rowsHtml += `
                <div class="photo-row">
                    <div class="photo-left">
                        <img src="${photo.src}" alt="${photo.fileName} — КНДР" loading="lazy">
                    </div>
                    <div class="text-right">
                        <div class="text-content">
                            <div class="filename-badge">
                                📎 <a href="${photo.src}" target="_blank">${photo.fileName}</a>
                            </div>
                            <div class="section-heading">
                                ${isRussian ? photo.heading : photo.headingEn}
                            </div>
                            <div class="description-text">
                                ${isRussian ? photo.desc : photo.descEn}
                            </div>
                            <div class="meta-strip">
                                <div class="date-chip">
                                    📅 ${isRussian ? photo.date : photo.dateEn}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        galleryContainer.innerHTML = rowsHtml;

        if (currentLang === 'ru') {
            mainTitleElem.textContent = '🇰🇵 Путешествие в КНДР · 15–24 июня 2026';
            footerElem.textContent = 'Путешествие в КНДР 15–24 июня 2026 · Фотографии из Пхеньяна, гор Чильбо и Расона';
            pdfLinkSpan.textContent = 'КНДР: впечатления и открытия (PDF)';
        } else {
            mainTitleElem.textContent = '🇰🇵 DPRK Travel · June 15–24, 2026';
            footerElem.textContent = 'DPRK Travel June 15–24, 2026 · Photos from Pyongyang, Chilbo Mountains and Rason';
            pdfLinkSpan.textContent = 'DPRK: Impressions and Discoveries (PDF)';
        }
    }

    function setLanguage(lang) {
        if (lang === currentLang) return;
        currentLang = lang;
        
        if (lang === 'ru') {
            langRuBtn.classList.add('active-lang');
            langEnBtn.classList.remove('active-lang');
        } else {
            langEnBtn.classList.add('active-lang');
            langRuBtn.classList.remove('active-lang');
        }
        
        renderGallery();
    }

    function init() {
        renderGallery();
        langRuBtn.classList.add('active-lang');
        langEnBtn.classList.remove('active-lang');
        
        langRuBtn.addEventListener('click', () => setLanguage('ru'));
        langEnBtn.addEventListener('click', () => setLanguage('en'));
    }
    
    init();
</script>
