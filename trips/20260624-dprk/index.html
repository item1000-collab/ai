            desc: "Последний день в Пхеньяне выдался не менее насыщенным, чем все предыдущие. Мы гуляли по одному из городских парков, где нам предложили примерить традиционную корейскую одежду — но не повседневную, а королевскую, с изысканным головным убором. Стоило это всего два доллара, но ощущение было бесценным — мы чувствовали себя героями исторических драм. Затем мы отправились в районную школу, где дети разных возрастов устроили для нас концерт: пели, танцевали, а под конец вытащили всех зрителей в общий танец. Корейцы, как мы заметили, поют просто замечательно — это у них в крови. Особенно поразил кабинет биологии: там стояли чучела почти всех животных и птиц, чтобы ученики могли не только видеть, но и трогать экспонаты. Во Дворце детского творчества — огромном, красивом здании — царила атмосфера радости и созидания. Дети занимаются в кружках совершенно бесплатно, и видно было, как они горят своими увлечениями.",
            descEn: "The last day in Pyongyang turned out to be no less eventful than all the previous ones. We walked through one of the city parks, where we were offered to try on traditional Korean clothing — not everyday, but royal, with an exquisite headdress. It cost only two dollars, but the feeling was priceless — we felt like heroes of historical dramas. Then we went to a district school, where children of different ages organized a concert for us: they sang, danced, and at the end pulled all the spectators into a general dance. Koreans, as we noticed, sing wonderfully — it's in their blood. The biology classroom was especially striking: there were stuffed animals of almost all species, so that students could not only see but also touch the exhibits. At the Palace of Children's Creativity — a huge, beautiful building — an atmosphere of joy and creativity reigned. Children attend clubs completely free of charge, and you could see how passionate they were about their hobbies.",
            date: "18 июня 2026",
            dateEn: "June 18, 2026"

            heading: "1.8. Monument to DPRK Heroes – Liberation of Kursk Region",
            headingEn: "1.8. Monument to DPRK Heroes – Liberation of Kursk Region",
            desc: "Один из самых трогательных моментов поездки — посещение монумента, построенного всего за год. Он посвящён корейским военным, участвовавшим в освобождении Курской области. Мемориал из серого мрамора и чёрного гранита выглядел сурово и величественно. На барельефах — солдаты в современной экипировке: русские и корейцы вместе, плечом к плечу, поскольку они освобождали регион совместно. Внутри музея нас встретила девушка-экскурсовод, говорившая по-русски практически без акцента. Она провела нас по залам, рассказывая о героях и обстоятельствах их гибели. В зале звучала музыка, показывали фотографии — атмосфера была пронзительной до слёз. На втором и третьем этажах мы увидели комнаты с сосудами, содержащими прах каждого из погибших воинов. Мы стояли в тишине, и каждый из нас чувствовал, какая тяжелая история стоит за этими стенами.",
            descEn: "One of the most touching moments of the trip was visiting the monument, built in just one year. It is dedicated to the Korean military who participated in the liberation of the Kursk region. The memorial, made of gray marble and black granite, looked stern and majestic. The bas-reliefs depicted soldiers in modern equipment: Russians and Koreans together, shoulder to shoulder, since they liberated the region jointly. Inside the museum, we were met by a girl-guide who spoke Russian with almost no accent. She led us through the halls, telling us about the heroes and the circumstances of their deaths. Music played in the hall, photos were shown — the atmosphere was poignant to tears. On the second and third floors we saw rooms with vessels containing the ashes of each of the fallen soldiers. We stood in silence, and each of us felt what a heavy history stood behind these walls.",

    let currentLang = 'en';

    const galleryContainer = document.getElementById('galleryContainer');
    const mainTitleElem = document.getElementById('mainTitle');
    const footerElem = document.getElementById('footerText');
    const pdfLinkSpan = document.getElementById('pdfLinkText');
    const storyLinkSpan = document.getElementById('storyLinkText');
    const slidesLinkSpan = document.getElementById('slidesLinkText');
    const langRuBtn = document.getElementById('langRuBtn');
    const langEnBtn = document.getElementById('langEnBtn');

    function renderGallery() {
        if (!galleryContainer) return;
        
        let rowsHtml = '';
        for (let i = 0; i < photos.length; i++) {
            const photo = photos[i];
            const isRussian = currentLang === 'ru';
            rowsHtml += `
                <div class="photo-row">
                    <div class="photo-left">
                        <img src="${photo.src}" alt="${photo.fileName} — DPRK" loading="lazy">
                    </div>
                    <div class="text-right">
                        <div class="text-content">
                            <div class="filename-badge">
                                📎 <a href="${photo.src}" target="_blank">${photo.fileName}</a>
                            </div>
                            <div class="section-heading">
                                ${isRussian ? photo.heading : photo.headingEn}
                            </div>
                            <div class="description-text">
                                ${isRussian ? photo.desc : photo.descEn}
                            </div>
                            <div class="meta-strip">
                                <div class="date-chip">
                                    📅 ${isRussian ? photo.date : photo.dateEn}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        galleryContainer.innerHTML = rowsHtml;

        if (currentLang === 'ru') {
            mainTitleElem.textContent = '🇰🇵 Путешествие в КНДР · 15–24 июня 2026';
            footerElem.textContent = 'Путешествие в КНДР 15–24 июня 2026 · Фотографии из Пхеньяна, гор Чхильбо и Расона';
            pdfLinkSpan.textContent = 'КНДР: впечатления и открытия (PDF)';
            storyLinkSpan.textContent = 'Полный рассказ о путешествии';
            slidesLinkSpan.textContent = 'Слайды';
        } else {
            mainTitleElem.textContent = '🇰🇵 DPRK Travel · June 15–24, 2026';
            footerElem.textContent = 'DPRK Travel June 15–24, 2026 · Photos from Pyongyang, Chilbo Mountains and Rason';
            pdfLinkSpan.textContent = 'DPRK: Impressions and Discoveries (PDF)';
            storyLinkSpan.textContent = 'Full travel story';
            slidesLinkSpan.textContent = 'Slides';
        }
    }

    function setLanguage(lang) {
        if (lang === currentLang) return;
        currentLang = lang;
        
        if (lang === 'ru') {
            langRuBtn.classList.add('active-lang');
            langEnBtn.classList.remove('active-lang');
        } else {
            langEnBtn.classList.add('active-lang');
            langRuBtn.classList.remove('active-lang');
        }
        
        renderGallery();
    }

    function init() {
        currentLang = 'en';
        langRuBtn.classList.remove('active-lang');
        langEnBtn.classList.add('active-lang');
        renderGallery();
        
        langRuBtn.addEventListener('click', () => setLanguage('ru'));
        langEnBtn.addEventListener('click', () => setLanguage('en'));
    }
    
    init();
</script>
