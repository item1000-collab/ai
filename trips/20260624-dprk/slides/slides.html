<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Презентация · 3 фото</title>
    <style>
        /* Чёрный фон, как в кинотеатре */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
            user-select: none;
            padding: 16px;
        }
        .slider-container {
            position: relative;
            max-width: 96vw;
            max-height: 92vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #slideshow {
            max-width: 96vw;
            max-height: 82vh;
            border-radius: 18px;
            box-shadow: 0 12px 48px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.04);
            display: block;
            background: #1a1a1a;
            object-fit: contain;
            transition: opacity 0.2s ease;
        }
        /* Панель управления — внизу, но внутри контейнера */
        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 28px;
            color: rgba(255,255,255,0.85);
            background: rgba(20,20,20,0.6);
            backdrop-filter: blur(10px);
            padding: 10px 28px;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        button {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            font-size: 22px;
            padding: 6px 22px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.4px;
            font-weight: 500;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        button:hover {
            background: rgba(255,255,255,0.18);
            border-color: rgba(255,255,255,0.3);
            transform: scale(1.02);
        }
        button:active {
            transform: scale(0.96);
        }
        #counter {
            font-size: 18px;
            font-weight: 400;
            min-width: 90px;
            text-align: center;
            opacity: 0.8;
            letter-spacing: 0.3px;
            background: rgba(0,0,0,0.2);
            padding: 4px 14px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
        }
        /* маленький хинт для клавиатуры (необязательно) */
        .hint {
            color: rgba(255,255,255,0.2);
            font-size: 12px;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }
        @media (max-width: 600px) {
            .controls {
                gap: 12px;
                padding: 8px 16px;
                flex-wrap: wrap;
            }
            button {
                font-size: 18px;
                padding: 4px 16px;
            }
            #counter {
                font-size: 16px;
                min-width: 70px;
            }
        }
    </style>
</head>
<body>

<div class="slider-container">
    <!-- единственный img, который будет менять src -->
    <img id="slideshow" src="" alt="Презентация">

    <div class="controls">
        <button id="prevBtn" aria-label="Назад">◀ Назад</button>
        <span id="counter">1 / 3</span>
        <button id="nextBtn" aria-label="Вперед">Вперед ▶</button>
    </div>
    <div class="hint">←  →  клавиши</div>
</div>

<script>
    (function() {
        // -------------------------------------------------------------
        //  ТОЧНЫЙ СПИСОК ФОТО — ровно 3, как в описании
        // -------------------------------------------------------------
        const photoUrls = [
            'https://item1000-collab.github.io/ai/trips/20260624-dprk/slides/web/IMG_20260615_163546.webp',
            'https://item1000-collab.github.io/ai/trips/20260624-dprk/slides/web/IMG_20260615_164118.webp',
            'https://item1000-collab.github.io/ai/trips/20260624-dprk/slides/web/IMG_20260615_165049.webp'
        ];

        const totalPhotos = photoUrls.length; // = 3

        // DOM-элементы
        const imgElement = document.getElementById('slideshow');
        const counterElement = document.getElementById('counter');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        // Состояние
        let currentIndex = 0;          // 0 .. 2

        // -------------------------------------------------------------
        //  ФУНКЦИЯ ОБНОВЛЕНИЯ СЛАЙДА
        // -------------------------------------------------------------
        function updateSlide(index) {
            // Защита от выхода за границы (на случай, если вызывают с некорректным индексом)
            if (index < 0) index = 0;
            if (index >= totalPhotos) index = totalPhotos - 1;

            currentIndex = index;

            // ГЛАВНОЕ: меняем src у картинки — страница не перезагружается,
            // только изображение обновляется.
            imgElement.src = photoUrls[currentIndex];

            // Счётчик
            counterElement.textContent = `${currentIndex + 1} / ${totalPhotos}`;

            // ---------------------------------------------------------
            //  ПРЕДЗАГРУЗКА (кеширование) соседних фото
            //  Чтобы переключение было мгновенным
            // ---------------------------------------------------------
            // следующее фото (если есть)
            const nextIndex = currentIndex + 1;
            if (nextIndex < totalPhotos) {
                const preloadNext = new Image();
                preloadNext.src = photoUrls[nextIndex];
            }

            // предыдущее фото (если есть)
            const prevIndex = currentIndex - 1;
            if (prevIndex >= 0) {
                const preloadPrev = new Image();
                preloadPrev.src = photoUrls[prevIndex];
            }
        }

        // -------------------------------------------------------------
        //  ОБРАБОТЧИКИ КНОПОК
        // -------------------------------------------------------------
        prevBtn.addEventListener('click', function() {
            if (currentIndex > 0) {
                updateSlide(currentIndex - 1);
            }
        });

        nextBtn.addEventListener('click', function() {
            if (currentIndex < totalPhotos - 1) {
                updateSlide(currentIndex + 1);
            }
        });

        // -------------------------------------------------------------
        //  УПРАВЛЕНИЕ С КЛАВИАТУРЫ (стрелки влево/вправо)
        // -------------------------------------------------------------
        window.addEventListener('keydown', function(e) {
            // Игнорируем, если нажатие происходит внутри поля ввода (но у нас нет input)
            // Но на всякий случай:
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

            if (e.key === 'ArrowRight') {
                e.preventDefault();
                nextBtn.click();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevBtn.click();
            }
        });

        // -------------------------------------------------------------
        //  ЗАПУСК: показываем первое фото
        // -------------------------------------------------------------
        updateSlide(0);

        // Для отладки (можно убрать)
        console.log(`✅ Презентация загружена. Фото: ${totalPhotos}`);
        console.log('📸 Ссылки:', photoUrls);
    })();
</script>

</body>
</html>
