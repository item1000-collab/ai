<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Vladivostok · Pacific Frontier | 13–14 June 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef2f5;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            line-height: 1.5;
            color: #1a2c3e;
        }

        /* main split layout */
        .split-container {
            display: flex;
            flex-direction: row;
            width: 100%;
            min-height: 100vh;
        }

        /* LEFT SIDE — image + file link */
        .left-panel {
            flex: 1;
            position: sticky;
            top: 0;
            height: 100vh;
            background: #f9fbfd;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            box-shadow: 4px 0 12px rgba(0, 0, 0, 0.03);
            border-right: 1px solid #e2e8f0;
            overflow-y: auto;
        }

        .image-frame {
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .image-frame img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            aspect-ratio: 4 / 3;
            background: #eef2f8;
        }

        .photo-link {
            margin-top: 1.5rem;
            font-family: 'SF Mono', 'Courier New', monospace;
            font-size: 0.85rem;
            background: #ffffffdd;
            backdrop-filter: blur(2px);
            padding: 0.6rem 1.2rem;
            border-radius: 60px;
            border: 1px solid #cbdde9;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .photo-link a {
            text-decoration: none;
            color: #0066b3;
            font-weight: 500;
            word-break: break-all;
        }

        .photo-link a:hover {
            text-decoration: underline;
            color: #003f6b;
        }

        .photo-link span {
            font-size: 1.1rem;
        }

        /* RIGHT SIDE — description, meta, extra info */
        .right-panel {
            flex: 1;
            background: #ffffff;
            padding: 2rem 2.2rem;
            overflow-y: auto;
            height: 100vh;
            scroll-behavior: smooth;
        }

        .description-card {
            max-width: 640px;
            margin: 0 auto;
            padding: 1rem 0 2.5rem 0;
            border-bottom: 1px solid #e9edf2;
        }

        .description-card:last-child {
            border-bottom: none;
        }

        .photo-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            color: #2c6b9e;
            margin-bottom: 0.75rem;
        }

        .desc-text {
            font-size: 1.05rem;
            line-height: 1.55;
            color: #1f3a4b;
            margin: 1rem 0 1.2rem 0;
        }

        .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            align-items: center;
            font-size: 0.85rem;
            color: #5a6e7c;
            margin-top: 0.8rem;
            border-top: 1px dashed #dee4ea;
            padding-top: 1rem;
        }

        .date-badge {
            background: #eef2fa;
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .highres-link {
            background: none;
            border: none;
            font-weight: 500;
        }

        .highres-link a {
            text-decoration: none;
            color: #2c6b9e;
            border-bottom: 1px dotted #8ab3cf;
        }

        .highres-link a:hover {
            color: #003f6b;
            border-bottom-color: #003f6b;
        }

        .navigation-tip {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: #7b8c9e;
            background: #f5f8fc;
            padding: 0.8rem;
            border-radius: 36px;
        }

        /* responsive: on mobile, split into column */
        @media (max-width: 780px) {
            .split-container {
                flex-direction: column;
            }
            .left-panel {
                position: relative;
                height: auto;
                min-height: 60vh;
                top: 0;
                border-right: none;
                border-bottom: 1px solid #e2e8f0;
                padding: 1.5rem;
            }
            .right-panel {
                height: auto;
                padding: 1.8rem;
            }
            .image-frame {
                max-width: 90%;
            }
        }

        /* scroll indicator on right */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #b9cad9;
            border-radius: 6px;
        }
    </style>
</head>
<body>
<div class="split-container">
    <!-- LEFT: dynamic image + direct file link -->
    <div class="left-panel" id="leftPanel">
        <div class="image-frame" id="dynamicImageFrame">
            <img id="mainPhotoImg" src="" alt="Vladivostok photo">
        </div>
        <div class="photo-link" id="photoLinkContainer">
            <span>📎</span> <a id="fileLink" href="#" target="_blank">filename.jpg</a>
        </div>
        <div class="navigation-tip">
            ⬇️ scroll right panel → images update automatically
        </div>
    </div>

    <!-- RIGHT: descriptions + metadata + high-res link -->
    <div class="right-panel" id="rightPanel">
        <div id="descriptionsList"></div>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // DATA: all photos with EN/RU descriptions (bilingual support)
    // plus high-res url, date, and filename

    const photosData = [

            dateEn: "13 June 2026",
            dateRu: "13 июня 2026"
        },
        {
            imgSrc: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260613_175808.jpg",
            fileName: "IMG_20260613_175808.jpg",
            descEn: "Sea view near Tokarevskaya Koshka. Rusty wooden piles – remnants of an old pier – emerge from the water. Power line towers on a green island and the urban coastline in the background. Overcast sky.",
            descRu: "Этот снимок запечатлел вид на морской залив в районе Токаревской кошки. Из воды торчат ржавые деревянные сваи — остатки старого пирса или навигационной конструкции. На заднем плане видны опоры ЛЭП на поросшем зеленью острове и застроенный берег города. Небо пасмурное.",
            dateEn: "13 June 2026",
            dateRu: "13 июня 2026"
        },
        {
            imgSrc: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260614_101850.jpg",
            fileName: "IMG_20260614_101850.jpg",
            descEn: "Memorial plaque on the embankment near the submarine memorial. Granite wall with a golden plaque dedicated to the first Soviet submarine, with Zolotoy Rog Bay, cable-stayed bridge and port cranes behind.",
            descRu: "Снимок сделан на набережной вблизи мемориала подводным лодкам. На переднем плане — гранитная стена с золотой мемориальной доской, на которой выгравирован текст о первой советской подводной лодке. За стеной видна бухта Золотой Рог с вантовым мостом и портовыми кранами.",
            dateEn: "14 June 2026",
            dateRu: "14 июня 2026"

        {

            descEn: "Famous Tokarevsky Lighthouse. View from the water along a stony spit (Tokarevskaya Koshka) lined with wooden poles. A small white lighthouse with a red top stands in the distance. Calm sea and hills on the opposite shore.",

            dateEn: "14 June 2026",
            dateRu: "14 июня 2026"
        },
        {

            descEn: "Russky Island, near the channel. A shore with dark gravel, calm water surface and overcast sky create a serene weekend atmosphere in nature.",
            descRu: "Этот снимок сделан на острове Русский в районе канала. На фотографии запечатлён берег с тёмным гравием. Спокойная гладь воды и пасмурное небо создают умиротворённую атмосферу выходного дня на природе.",
            dateEn: "14 June 2026",
            dateRu: "14 июня 2026"
        },
        {
            imgSrc: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260614_140132.jpg",
            fileName: "IMG_20260614_140132.jpg",
            descEn: "Beach on Russky Island. Several vacationers on the shore: some sitting on blankets or folding chairs, others standing near the water or stepping into the cool sea. A lonely sailboat on the horizon adds a peaceful vibe.",
            descRu: "Это пляж на острове Русский. На берегу расположилось несколько отдыхающих: кто-то сидит на подстилке или раскладных стульях, кто-то стоит у самой воды или заходит в прохладное море. Вдалеке на горизонте виднеется одинокий парусник, придающий пейзажу умиротворённую атмосферу.",
            dateEn: "14 June 2026",
            dateRu: "14 июня 2026"
        },
        {
            imgSrc: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260614_161821.jpg",
            fileName: "IMG_20260614_161821.jpg",
            descEn: "Pedestrian zone in central Vladivostok. Decorative garlands create a pergola over the alley. People walk on the cobblestones, benches with resting citizens line the path, and shrubs and trees frame the walkway.",
            descRu: "Фотография показывает пешеходную зону в центре Владивостока. Над аллеей натянуты декоративные гирлянды, создающие перголу. По брусчатке идут прохожие, вдоль дорожки стоят скамейки, где отдыхают люди, а по краям высажены кустарники и деревья.",
            dateEn: "14 June 2026",
            dateRu: "14 июня 2026"
        },
        {
            imgSrc: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260614_162910.jpg",
            fileName: "IMG_20260614_162910.jpg",
            descEn: "Famous mural on the facade of a residential building on Admirala Fokina Street. The wall painting depicts the historic 'Millionka' Chinese quarter with balconies, stairways, and figures in traditional costumes. Passersby admire the artwork below.",
            descRu: "Фотография показывает знаменитый мурал на торце жилого дома по улице Адмирала Фокина. Стену украшает роспись, изображающая исторический китайский квартал «Миллионка» с балконами, лестницами и фигурами людей в традиционных костюмах. Внизу стоят прохожие, рассматривающие мурал.",
            dateEn: "14 June 2026",
            dateRu: "14 июня 2026"
        }
    ];

    // ----- LANGUAGE STATE (default: English) -----
    let currentLang = 'en';   // 'en' or 'ru'
    let activeIndex = 0;      // which photo is currently displayed on left

    // DOM elements
    const mainImg = document.getElementById('mainPhotoImg');
    const fileLinkAnchor = document.getElementById('fileLink');
    const descriptionsContainer = document.getElementById('descriptionsList');
    const rightPanel = document.getElementById('rightPanel');

    // helper: get localized description & date
    function getLocalizedText(photo) {
        if (currentLang === 'en') {
            return {
                desc: photo.descEn,
                date: photo.dateEn,
                alt: "Vladivostok view"
            };
        } else {
            return {
                desc: photo.descRu,
                date: photo.dateRu,
                alt: "Вид Владивостока"
            };
        }
    }

    // update left panel image + file link based on activeIndex
    function updateLeftPanel() {
        if (!photosData[activeIndex]) return;
        const photo = photosData[activeIndex];
        mainImg.src = photo.imgSrc;
        mainImg.alt = currentLang === 'en' ? `Vladivostok: ${photo.fileName}` : `Владивосток: ${photo.fileName}`;
        fileLinkAnchor.href = photo.imgSrc;
        fileLinkAnchor.textContent = photo.fileName;
        // optional: add title effect
        document.getElementById('dynamicImageFrame').style.transition = '0.2s';
    }

    // render the entire right side (descriptions list) — each block has description + meta + high-res link
    function renderRightPanel() {
        let html = '';
        for (let idx = 0; idx < photosData.length; idx++) {
            const photo = photosData[idx];
            const localized = getLocalizedText(photo);
            const isActive = (idx === activeIndex);
            // extra highlight for active photo (soft background)
            const activeClass = isActive ? 'style="background: #fafcff; border-radius: 20px; padding: 0 0.8rem 0 0.8rem; margin: 0 -0.8rem 0 -0.8rem; transition: all 0.1s;"' : '';
            
            // high-res link same as original image (original already high quality)
            const highResUrl = photo.imgSrc;
            
            html += `
                <div class="description-card" data-index="${idx}" id="descCard-${idx}" ${activeClass}>
                    <div class="photo-title">
                        📸 ${photo.fileName}
                    </div>
                    <div class="desc-text">
                        ${localized.desc}
                    </div>
                    <div class="meta-row">
                        <div class="date-badge">
                            📅 ${localized.date}
                        </div>
                        <div class="highres-link">
                            🔗 <a href="${highResUrl}" target="_blank">${currentLang === 'en' ? 'Open high-res photo' : 'Открыть фото в высоком разрешении'}</a>
                        </div>
                        <div class="highres-link">
                            🖼️ <a href="${photo.imgSrc}" download>${currentLang === 'en' ? 'Download' : 'Скачать'}</a>
                        </div>
                    </div>
                </div>
            `;
        }
        descriptionsContainer.innerHTML = html;
        
        // after rendering, add click handlers to each description card -> update left panel
        for (let i = 0; i < photosData.length; i++) {
            const card = document.getElementById(`descCard-${i}`);
            if (card) {
                card.style.cursor = 'pointer';
                card.addEventListener('click', (e) => {
                    // prevent accidental clicks on links inside from double triggering
                    if (e.target.tagName === 'A') return;
                    setActivePhoto(i);
                });
                // optional hover effect
                card.addEventListener('mouseenter', () => {
                    if (activeIndex !== i) card.style.backgroundColor = '#f5f9ff';
                });
                card.addEventListener('mouseleave', () => {
                    if (activeIndex !== i) card.style.backgroundColor = 'transparent';
                    else card.style.backgroundColor = '#fafcff';
                });
            }
        }
        highlightActiveCardOnRight(activeIndex);
    }
    
    // highlight the active description card and scroll it into view smoothly
    function highlightActiveCardOnRight(index) {
        // reset previous highlights
        for (let i = 0; i < photosData.length; i++) {
            const card = document.getElementById(`descCard-${i}`);
            if (card) {
                card.style.backgroundColor = (i === index) ? '#fafcff' : 'transparent';
                if (i === index) {
                    card.style.borderRadius = '20px';
                    card.style.padding = '0 0.8rem';
                    card.style.margin = '0 -0.8rem 0 -0.8rem';
                } else {
                    card.style.padding = '0';
                    card.style.margin = '0';
                }
            }
        }
        // scroll active card into view on right panel
        const activeCard = document.getElementById(`descCard-${index}`);
        if (activeCard && rightPanel) {
            const containerRect = rightPanel.getBoundingClientRect();
            const cardRect = activeCard.getBoundingClientRect();
            const offset = cardRect.top - containerRect.top - 80;
            rightPanel.scrollBy({ top: offset, behavior: 'smooth' });
        }
    }
    
    // change active photo (both left panel + highlight right)
    function setActivePhoto(index) {
        if (index === activeIndex) return;
        if (index >= 0 && index < photosData.length) {
            activeIndex = index;
            updateLeftPanel();
            highlightActiveCardOnRight(activeIndex);
            // Optional: slight animation on left image
            const imgWrapper = document.getElementById('dynamicImageFrame');
            imgWrapper.style.transform = 'scale(0.99)';
            setTimeout(() => { imgWrapper.style.transform = 'scale(1)'; }, 150);
        }
    }
    
    // handle language switch (bilingual support)
    function switchLanguage(lang) {
        if (lang === currentLang) return;
        currentLang = lang;
        // re-render right panel completely (descriptions and meta in new language)
        renderRightPanel();
        // also update left panel alt text (minor)
        if (photosData[activeIndex]) {
            mainImg.alt = currentLang === 'en' ? `Vladivostok: ${photosData[activeIndex].fileName}` : `Владивосток: ${photosData[activeIndex].fileName}`;
        }
        // update global title tag could be nice
        document.title = currentLang === 'en' ? 'Vladivostok · Split photo gallery (June 2026)' : 'Владивосток · Галерея (июнь 2026)';
        // optional small dom change: navigation tip
        const tipDiv = document.querySelector('.navigation-tip');
        if (tipDiv) {
            tipDiv.innerHTML = currentLang === 'en' 
                ? '⬇️ scroll right panel → images update automatically' 
                : '⬇️ листайте правую панель → фото обновляются автоматически';
        }
        // update active highlight because rendered new cards, but activeIndex remain same
        highlightActiveCardOnRight(activeIndex);
        updateLeftPanel(); // refresh alt text only
    }
    
    // add language switcher UI to the top of left or right? we will embed in left panel
    function addLanguageSwitcher() {
        const leftPanelDiv = document.getElementById('leftPanel');
        const existingSwitcher = document.getElementById('langSwitcherCustom');
        if (existingSwitcher) existingSwitcher.remove();
        
        const switcherDiv = document.createElement('div');
        switcherDiv.id = 'langSwitcherCustom';
        switcherDiv.style.marginTop = '1.5rem';
        switcherDiv.style.display = 'flex';
        switcherDiv.style.gap = '12px';
        switcherDiv.style.justifyContent = 'center';
        switcherDiv.style.flexWrap = 'wrap';
        switcherDiv.innerHTML = `
            <button id="langEnBtn" style="background: ${currentLang === 'en' ? '#0077cc' : '#eef2f8'}; color: ${currentLang === 'en' ? 'white' : '#1f3a4b'}; border: none; padding: 6px 20px; border-radius: 60px; font-weight: 500; cursor: pointer; transition: 0.2s;">🇬🇧 English</button>
            <button id="langRuBtn" style="background: ${currentLang === 'ru' ? '#0077cc' : '#eef2f8'}; color: ${currentLang === 'ru' ? 'white' : '#1f3a4b'}; border: none; padding: 6px 20px; border-radius: 60px; font-weight: 500; cursor: pointer; transition: 0.2s;">🇷🇺 Русский</button>
        `;
        // append after .photo-link
        const photoLinkDiv = document.querySelector('.photo-link');
        if (photoLinkDiv && leftPanelDiv) {
            leftPanelDiv.insertBefore(switcherDiv, photoLinkDiv.nextSibling);
        } else {
            leftPanelDiv.appendChild(switcherDiv);
        }
        
        document.getElementById('langEnBtn')?.addEventListener('click', () => switchLanguage('en'));
        document.getElementById('langRuBtn')?.addEventListener('click', () => switchLanguage('ru'));
    }
    
    // Intersection Observer for automatic update when scrolling right panel
    function setupScrollSpy() {
        const observerOptions = {
            root: rightPanel,
            threshold: 0.55  // when 55% of card is visible
        };
        
        const observer = new IntersectionObserver((entries) => {
            // get the most visible card
            let bestEntry = null;
            for (let entry of entries) {
                if (entry.isIntersecting) {
                    if (!bestEntry || (entry.intersectionRatio > bestEntry.intersectionRatio)) {
                        bestEntry = entry;
                    }
                }
            }
            if (bestEntry) {
                const cardElement = bestEntry.target;
                const idxAttr = cardElement.getAttribute('data-index');
                if (idxAttr !== null) {
                    const newIndex = parseInt(idxAttr, 10);
                    if (!isNaN(newIndex) && newIndex !== activeIndex) {
                        activeIndex = newIndex;
                        updateLeftPanel();
                        highlightActiveCardOnRight(activeIndex);
                        // change alt text again
                        const photo = photosData[activeIndex];
                        if (photo) mainImg.alt = currentLang === 'en' ? `Vladivostok: ${photo.fileName}` : `Владивосток: ${photo.fileName}`;
                    }
                }
            }
        }, observerOptions);
        
        // Observe each description card
        for (let i = 0; i < photosData.length; i++) {
            const card = document.getElementById(`descCard-${i}`);
            if (card) observer.observe(card);
        }
    }
    
    // INIT
    function init() {
        activeIndex = 0;
        updateLeftPanel();
        renderRightPanel();
        addLanguageSwitcher();
        // after render, set up scroll spy and ensure active card highlighted
        setTimeout(() => {
            setupScrollSpy();
            highlightActiveCardOnRight(0);
            const tipDiv = document.querySelector('.navigation-tip');
            if (tipDiv) tipDiv.innerHTML = currentLang === 'en' 
                ? '⬇️ scroll right panel → images update automatically' 
                : '⬇️ листайте правую панель → фото обновляются автоматически';
        }, 100);
    }
    
    init();
</script>
</body>
</html>
