<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Vladivostok · Pacific Frontier | June 13–14, 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f4f8;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            color: #11212e;
            line-height: 1.5;
        }

        /* main container */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: #ffffff;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.02);
        }

        /* header with title, PDF link, language switcher */
        .page-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            padding: 1.4rem 2rem 1rem 2rem;
            border-bottom: 1px solid #e2edf2;
            background: white;
        }

        .title-area {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        h1 {
            font-weight: 500;
            font-size: 1.8rem;
            letter-spacing: -0.2px;
            background: linear-gradient(135deg, #1a5f7a, #2f8fb0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .pdf-link-top {
            background: #f0f6fc;
            padding: 6px 18px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #d4e2ed;
            transition: 0.2s;
        }

        .pdf-link-top a {
            text-decoration: none;
            color: #006699;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .pdf-link-top:hover {
            background: #e8f0f8;
            border-color: #bdd2e2;
        }

        .right-header {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            flex-wrap: wrap;
        }

        .lang-switch {
            display: flex;
            gap: 12px;
        }

        .lang-btn {
            background: #eff3f8;
            border: none;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 6px 20px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            color: #1a5f7a;
            font-family: inherit;
        }

        .lang-btn.active-lang {
            background: #0077aa;
            color: white;
            box-shadow: 0 2px 8px rgba(0, 100, 150, 0.2);
        }

        .lang-btn:hover:not(.active-lang) {
            background: #e2eaf1;
        }

        /* gallery layout: each row 50% image / 50% text */
        .gallery {
            display: flex;
            flex-direction: column;
        }

        .photo-row {
            display: flex;
            flex-direction: row;
            width: 100%;
            border-bottom: 1px solid #eef2f6;
            background: white;
            transition: background 0.2s;
        }

        /* LEFT SIDE: exactly 50% width, image never cropped */
        .photo-left {
            flex: 1;
            background: #fafcfd;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        .photo-left img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            border-radius: 18px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
            background: #f8fafc;
        }

        /* RIGHT SIDE: 50% width, description text */
        .text-right {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem 2rem 2rem 1.5rem;
        }

        .text-content {
            max-width: 92%;
        }

        .filename-badge {
            font-family: 'SF Mono', 'Courier New', monospace;
            background: #f0f6fc;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #dee8f0;
            margin-bottom: 1.2rem;
        }

        .filename-badge a {
            text-decoration: none;
            color: #006699;
            font-weight: 500;
        }

        .filename-badge a:hover {
            text-decoration: underline;
        }

        .description-text {
            font-size: 1.25rem;
            line-height: 1.5;
            color: #1f445b;
            margin-bottom: 1.5rem;
            font-weight: 400;
        }

        .meta-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            align-items: center;
            border-top: 1px solid #ecf3f8;
            padding-top: 1.2rem;
            margin-top: 0.5rem;
        }

        .date-chip {
            background: #f2f6fa;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #2a607a;
        }

        .action-link {
            font-size: 0.85rem;
            font-weight: 500;
        }

        .action-link a {
            text-decoration: none;
            color: #1a708b;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }

        .action-link a:hover {
            color: #004466;
            text-decoration: underline;
        }

        /* responsive: on narrow screens row becomes column */
        @media (max-width: 780px) {
            .photo-row {
                flex-direction: column;
            }
            .photo-left, .text-right {
                flex: auto;
                width: 100%;
                padding: 1.5rem;
            }
            .photo-left img {
                max-height: 400px;
                width: auto;
                margin: 0 auto;
            }
            .description-text {
                font-size: 1.05rem;
            }
            .page-header {
                flex-direction: column;
                align-items: stretch;
                padding: 1rem 1.2rem;
            }
            .right-header {
                justify-content: space-between;
            }
            h1 {
                font-size: 1.4rem;
            }
        }

        @media (min-width: 1400px) {
            .text-content {
                max-width: 85%;
            }
            .description-text {
                font-size: 1.35rem;
            }
        }

        .photo-row:hover {
            background: #fefefe;
        }

        footer {
            text-align: center;
            font-size: 0.75rem;
            color: #89a3b5;
            padding: 2rem 1rem 2.5rem;
            border-top: 1px solid #e9f0f5;
            background: white;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <div class="title-area">
            <h1 id="mainTitle">🌊 Vladivostok · June 13–14, 2026</h1>
            <div class="pdf-link-top">
                <a href="https://item1000-collab.github.io/ai/trips/20260614-vladivostok/Vladivostok_Pacific_Gateway.pdf" target="_blank">
                    📄 <span id="pdfLinkText">Vladivostok: Pacific Gateway (PDF)</span>
                </a>
            </div>
        </div>
        <div class="right-header">
            <div class="lang-switch">
                <button class="lang-btn active-lang" id="langEnBtn">🇬🇧 English</button>
                <button class="lang-btn" id="langRuBtn">🇷🇺 Russian</button>
            </div>
        </div>
    </div>

    <div id="galleryContainer" class="gallery">
        <!-- dynamic rows injected: each row = 50% image (left) + 50% text (right) -->
    </div>
    <footer id="footerText">
        Vladivostok — Pacific gateway | landscape originals, full width visible (no crop)
    </footer>
</div>

<script>
    // PHOTO DATABASE (all images, bilingual)
    const photos = [
        {
            src: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260613_140456.jpg",
            fileName: "IMG_20260613_140456.jpg",
            descEn: "Panorama of the Amur Bay from a hilltop. Lush green trees and a lamppost in the foreground, with distant ships and hill silhouettes reflected on the sun-glittering water.",
            descRu: "Панорама Амурского залива с высоты сопки. На переднем плане густая зелень деревьев и фонарный столб. Вдалеке — суда и силуэты сопок на фоне сверкающей воды.",
            dateEn: "13 June 2026",
            dateRu: "13 июня 2026"
        },
        {
            src: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260613_143421.jpg",
            fileName: "IMG_20260613_143421.jpg",
            descEn: "Transfiguration Cathedral — the main Orthodox church in Vladivostok. White building with narrow arched windows, four golden domes with crosses, and a wide paved square with people on the steps.",
            descRu: "Спасо-Преображенский кафедральный собор — главный православный храм Владивостока. Белое здание с узкими арочными окнами, четырьмя золотыми куполами с крестами. Перед собором — вымощенная площадь, на ступенях видны люди.",
            dateEn: "13 June 2026",
            dateRu: "13 июня 2026"
        },
        {
            src: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260613_144409.jpg",
            fileName: "IMG_20260613_144409.jpg",
            descEn: "Memorial complex on Korabelnaya Embankment. The huge hull of submarine S-56 on a pedestal, evergreen bushes, an info stand, and modern high-rise buildings in the background.",
            descRu: "Мемориальный комплекс на Корабельной набережной. Огромный корпус подводной лодки С-56 на постаменте, вечнозеленые кусты, информационный стенд. На заднем плане — современная высотная застройка.",
            dateEn: "13 June 2026",
            dateRu: "13 июня 2026"
        },
        {
            src: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260613_145058.png",
            fileName: "IMG_20260613_145058.png",
            descEn: "Inside submarine S-56. A tight compartment full of pipes, valves, instrument panels, and gauges. A wooden table in the foreground.",
            descRu: "Внутри подводной лодки С-56. Тесный отсек с множеством труб, вентилей, приборных панелей и шкал. На переднем плане деревянный стол.",
            dateEn: "13 June 2026",
            dateRu: "13 июня 2026"
        },
        {
            src: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260613_150749.jpg",
            fileName: "IMG_20260613_150749.jpg",
            descEn: "View of Zolotoy Rog Bay and the cable-stayed bridge. Wide expanse of water seen from the shore, with the bridge, port cranes, and city blocks in the distance. Sunny, clear sky.",
            descRu: "Вид на бухту Золотой Рог и вантовый мост. Широкая гладь воды, мост, портовые краны и городские кварталы вдалеке. Солнечная погода, ясное небо.",
            dateEn: "13 June 2026",
            dateRu: "13 июня 2026"
        },
        {
            src: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260613_175808.jpg",
            fileName: "IMG_20260613_175808.jpg",
            descEn: "Sea view near Tokarevskaya Koshka. Rusty wooden piles – remnants of an old pier – emerge from the water. Power line towers on a green island and the urban coastline in the background. Overcast sky.",
            descRu: "Evening of the first day. Panorama of the Amur Bay.",
            dateEn: "13 June 2026",
            dateRu: "13 июня 2026"
        },
        {
            src: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260614_101850.jpg",
            fileName: "IMG_20260614_101850.jpg",
            descEn: "Memorial plaque on the embankment near the submarine memorial. Granite wall with a golden plaque dedicated to the first Soviet submarine, with Zolotoy Rog Bay, cable-stayed bridge and port cranes behind.",
            descRu: "Мемориальная доска на набережной вблизи мемориала подводным лодкам. Гранитная стена с золотой табличкой, посвященной первой советской подводной лодке. За стеной — бухта Золотой Рог, вантовый мост и портовые краны.",
            dateEn: "14 June 2026",
            dateRu: "14 июня 2026"
        },
        {
            src: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260614_123705.jpg",
            fileName: "IMG_20260614_123705.jpg",
            descEn: "Famous Tokarevsky Lighthouse. View from the water along a stony spit (Tokarevskaya Koshka) lined with wooden poles. A small white lighthouse with a red top stands in the distance. Calm sea and hills on the opposite shore.",
            descRu: "Знаменитый Токаревский маяк. Вид с воды на каменистую косу (Токаревскую кошку), вдоль которой выставлены деревянные столбы. Вдали — небольшой белый маяк с красным верхом. Спокойное море и сопки на противоположном берегу.",
            dateEn: "14 June 2026",
            dateRu: "14 июня 2026"
        },
        {
            src: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260614_133336.jpg",
            fileName: "IMG_20260614_133336.jpg",
            descEn: "Russky Island, near the channel. A shore with dark gravel, calm water surface and overcast sky create a serene weekend atmosphere in nature.",
            descRu: "Остров Русский, район канала. Берег с тёмным гравием, спокойная гладь воды и пасмурное небо создают умиротворённую атмосферу выходного дня на природе.",
            dateEn: "14 June 2026",
            dateRu: "14 июня 2026"
        },
        {
            src: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260614_140132.jpg",
            fileName: "IMG_20260614_140132.jpg",
            descEn: "Beach on Russky Island. Several vacationers on the shore: some sitting on blankets or folding chairs, others standing near the water or stepping into the cool sea. A lonely sailboat on the horizon adds a peaceful vibe.",
            descRu: "Пляж на острове Русский. Несколько отдыхающих на берегу: кто-то сидит на подстилках или раскладных стульях, кто-то стоит у воды или заходит в море. Одинокий парусник на горизонте придаёт пейзажу умиротворение.",
            dateEn: "14 June 2026",
            dateRu: "14 июня 2026"
        },
        {
            src: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260614_161821.jpg",
            fileName: "IMG_20260614_161821.jpg",
            descEn: "Pedestrian zone in central Vladivostok. Decorative garlands create a pergola over the alley. People walk on the cobblestones, benches with resting citizens line the path, and shrubs and trees frame the walkway.",
            descRu: "Пешеходная зона в центре Владивостока. Над аллеей натянуты декоративные гирлянды, создающие перголу. По брусчатке идут прохожие, вдоль дорожки стоят скамейки, где отдыхают люди, а по краям высажены кустарники и деревья.",
            dateEn: "14 June 2026",
            dateRu: "14 июня 2026"
        },
        {
            src: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260614_162910.jpg",
            fileName: "IMG_20260614_162910.jpg",
            descEn: "Famous mural on the facade of a residential building on Admirala Fokina Street. The wall painting depicts the historic 'Millionka' Chinese quarter with balconies, stairways, and figures in traditional costumes. Passersby admire the artwork below.",
            descRu: "Знаменитый мурал на торце жилого дома по улице Адмирала Фокина. Стену украшает роспись, изображающая исторический китайский квартал «Миллионка» с балконами, лестницами и фигурами в традиционных костюмах. Внизу прохожие рассматривают мурал.",
            dateEn: "14 June 2026",
            dateRu: "14 июня 2026"
        }
    ];

    // current language state
    let currentLang = 'en';   // 'en' or 'ru'

    // DOM elements
    const galleryContainer = document.getElementById('galleryContainer');
    const mainTitleElem = document.getElementById('mainTitle');
    const footerElem = document.getElementById('footerText');
    const pdfLinkSpan = document.getElementById('pdfLinkText');
    const langEnBtn = document.getElementById('langEnBtn');
    const langRuBtn = document.getElementById('langRuBtn');

    // helper: get localized description & date
    function getLocalized(photo) {
        if (currentLang === 'en') {
            return {
                desc: photo.descEn,
                date: photo.dateEn
            };
        } else {
            return {
                desc: photo.descRu,
                date: photo.dateRu
            };
        }
    }

    // render entire gallery: each photo occupies a full row, split 50% image (left) / 50% text (right)
    function renderGallery() {
        if (!galleryContainer) return;
        
        let rowsHtml = '';
        for (let i = 0; i < photos.length; i++) {
            const photo = photos[i];
            const localized = getLocalized(photo);
            
            rowsHtml += `
                <div class="photo-row">
                    <div class="photo-left">
                        <img src="${photo.src}" alt="${photo.fileName} — Vladivostok" loading="lazy">
                    </div>
                    <div class="text-right">
                        <div class="text-content">
                            <div class="filename-badge">
                                📎 <a href="${photo.src}" target="_blank">${photo.fileName}</a>
                            </div>
                            <div class="description-text">
                                ${localized.desc}
                            </div>
                            <div class="meta-strip">
                                <div class="date-chip">
                                    📅 ${localized.date}
                                </div>
                                <div class="action-link">
                                    🔗 <a href="${photo.src}" target="_blank">Open high‑res</a>
                                </div>
                                <div class="action-link">
                                    ⬇️ <a href="${photo.src}" download="${photo.fileName}">Download</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        galleryContainer.innerHTML = rowsHtml;
        
        // update global title, footer & PDF link text based on language
        if (currentLang === 'en') {
            mainTitleElem.textContent = '🌊 Vladivostok · June 13–14, 2026';
            footerElem.textContent = 'Vladivostok — Pacific gateway | landscape originals, full width visible (no crop)';
            pdfLinkSpan.textContent = 'Vladivostok: Pacific Gateway (PDF)';
        } else {
            mainTitleElem.textContent = '🌊 Владивосток · 13–14 июня 2026';
            footerElem.textContent = 'Владивосток — тихоокеанские ворота | фотографии в ландшафтном формате, без обрезки (полная ширина видна)';
            pdfLinkSpan.textContent = 'Владивосток: Тихоокеанские ворота (PDF)';
        }
    }
    
    // switch language and re-render
    function setLanguage(lang) {
        if (lang === currentLang) return;
        currentLang = lang;
        
        // update active button styles
        if (lang === 'en') {
            langEnBtn.classList.add('active-lang');
            langRuBtn.classList.remove('active-lang');
        } else {
            langRuBtn.classList.add('active-lang');
            langEnBtn.classList.remove('active-lang');
        }
        
        // re-render everything with new language
        renderGallery();
    }
    
    // initialize event listeners + default rendering
    function init() {
        renderGallery();
        
        // set default active language button (English active)
        langEnBtn.classList.add('active-lang');
        langRuBtn.classList.remove('active-lang');
        
        // attach events
        langEnBtn.addEventListener('click', () => setLanguage('en'));
        langRuBtn.addEventListener('click', () => setLanguage('ru'));
    }
    
    init();
</script>
</body>
</html>
