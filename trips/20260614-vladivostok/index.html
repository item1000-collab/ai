<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Vladivostok · Pacific Frontier | June 13–14, 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            color: #0a2a3b;
            line-height: 1.5;
        }

        /* main container: clean, max width for readability, but photos are full width of parent */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem 1.5rem;
        }

        /* header area with title and language toggle */
        .page-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            gap: 1rem;
            margin-bottom: 2.5rem;
            border-bottom: 2px solid #e2edf2;
            padding-bottom: 1.2rem;
        }

        h1 {
            font-weight: 500;
            font-size: 2rem;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #1c5d7a, #2f8fb0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .lang-switch {
            display: flex;
            gap: 12px;
        }

        .lang-btn {
            background: #eef3f8;
            border: none;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 6px 20px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            color: #1f5e7e;
            font-family: inherit;
        }

        .lang-btn.active-lang {
            background: #0077aa;
            color: white;
            box-shadow: 0 2px 8px rgba(0, 100, 150, 0.2);
        }

        .lang-btn:hover:not(.active-lang) {
            background: #e0eaf1;
        }

        /* ----- PHOTO LIST: each entry is a clean block, full width image, no cropping ----- */
        .photo-entry {
            margin-bottom: 4rem;
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03);
            transition: box-shadow 0.2s;
        }

        .photo-entry:hover {
            box-shadow: 0 16px 30px rgba(0, 0, 0, 0.08);
        }

        /* image container: full width, no cropping */
        .photo-image {
            width: 100%;
            background: #eef2f5;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo-image img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;   /* no crop, entire photo visible */
            background: #f2f6f9;
        }

        /* description panel: spacious, right side info */
        .photo-info {
            padding: 1.8rem 2rem 2rem 2rem;
            border-top: 1px solid #eef2f6;
            background: #ffffff;
        }

        /* filename + link row */
        .filename-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .file-badge {
            font-family: 'SF Mono', 'Courier New', monospace;
            background: #f0f6fc;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            border: 1px solid #dce5ef;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .file-badge a {
            text-decoration: none;
            color: #006699;
            font-weight: 500;
        }

        .file-badge a:hover {
            text-decoration: underline;
            color: #004466;
        }

        /* main description text — large, readable */
        .description-text {
            font-size: 1.35rem;
            line-height: 1.45;
            font-weight: 400;
            color: #1e445b;
            margin: 1rem 0 1.2rem 0;
            max-width: 85%;
        }

        /* meta row: date + high-res & download links */
        .meta-links {
            display: flex;
            flex-wrap: wrap;
            gap: 1.8rem;
            align-items: center;
            padding-top: 0.8rem;
            border-top: 1px solid #e9f0f5;
            margin-top: 0.25rem;
        }

        .date-chip {
            background: #f2f6fa;
            padding: 5px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #2a5f7a;
        }

        .action-link {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .action-link a {
            text-decoration: none;
            color: #1a708b;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }

        .action-link a:hover {
            color: #004466;
            text-decoration: underline;
        }

        /* responsive: on smaller screens description text shrinks a bit */
        @media (max-width: 800px) {
            .container {
                padding: 1.2rem 1rem 2.5rem 1rem;
            }
            .photo-info {
                padding: 1.2rem 1.2rem 1.5rem 1.2rem;
            }
            .description-text {
                font-size: 1.1rem;
                max-width: 100%;
            }
            .filename-row {
                flex-direction: column;
                align-items: flex-start;
            }
            h1 {
                font-size: 1.6rem;
            }
        }

        /* extra large photos look seamless */
        .photo-entry:last-child {
            margin-bottom: 0;
        }

        /* subtle scroll behaviour */
        html {
            scroll-behavior: smooth;
        }

        /* optional small spacer for foot */
        .footnote {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #8ba3b3;
            border-top: 1px solid #e2edf2;
            padding-top: 2rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <h1 id="mainTitle">🌊 Vladivostok · June 13–14, 2026</h1>
        <div class="lang-switch">
            <button class="lang-btn active-lang" id="langEnBtn">🇬🇧 English</button>
            <button class="lang-btn" id="langRuBtn">🇷🇺 Русский</button>
        </div>
    </div>

    <div id="photosList" class="photos-list">
        <!-- all photo entries will be injected here dynamically -->
    </div>
    <div class="footnote" id="footerNote">
        Vladivostok — Pacific gateway | full‑width originals, no crop
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // PHOTO DATABASE with bilingual descriptions
    // each object contains: src, fileName, descEn, descRu, dateEn, dateRu
    // --------------------------------------------------------------
    const photosData = [
        {
            src: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260613_140456.jpg",
            fileName: "IMG_20260613_140456.jpg",
            descEn: "Panorama of the Amur Bay from a hilltop. Lush green trees and a lamppost in the foreground, with distant ships and hill silhouettes reflected on the sun-glittering water.",
            descRu: "Панорама Амурского залива с высоты сопки. На переднем плане густая зелень деревьев и фонарный столб. Вдалеке — суда и силуэты сопок на фоне сверкающей воды.",
            dateEn: "13 June 2026",
            dateRu: "13 июня 2026"
        },
        {
            src: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260613_143421.jpg",
            fileName: "IMG_20260613_143421.jpg",
            descEn: "Transfiguration Cathedral — the main Orthodox church in Vladivostok. White building with narrow arched windows, four golden domes with crosses, and a wide paved square with people on the steps.",
            descRu: "Спасо-Преображенский кафедральный собор — главный православный храм Владивостока. Белое здание с узкими арочными окнами, четырьмя золотыми куполами с крестами. Перед собором — вымощенная площадь, на ступенях видны люди.",
            dateEn: "13 June 2026",
            dateRu: "13 июня 2026"
        },
        {
            src: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260613_144409.jpg",
            fileName: "IMG_20260613_144409.jpg",
            descEn: "Memorial complex on Korabelnaya Embankment. The huge hull of submarine S-56 on a pedestal, evergreen bushes, an info stand, and modern high-rise buildings in the background.",
            descRu: "Мемориальный комплекс на Корабельной набережной. Огромный корпус подводной лодки С-56 на постаменте, вечнозеленые кусты, информационный стенд. На заднем плане — современная высотная застройка.",
            dateEn: "13 June 2026",
            dateRu: "13 июня 2026"
        },
        {
            src: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260613_145058.png",
            fileName: "IMG_20260613_145058.png",
            descEn: "Inside submarine S-56. A tight compartment full of pipes, valves, instrument panels, and gauges. A wooden table in the foreground, and a person's raised hand with fingers spread in front of the camera.",
            descRu: "Внутри подводной лодки С-56. Тесный отсек с множеством труб, вентилей, приборных панелей и шкал. На переднем плане деревянный стол и поднятая рука человека с разведенными пальцами.",
            dateEn: "13 June 2026",
            dateRu: "13 июня 2026"
        },
        {
            src: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260613_150749.jpg",
            fileName: "IMG_20260613_150749.jpg",
            descEn: "View of Zolotoy Rog Bay and the cable-stayed bridge. Wide expanse of water seen from the shore, with the bridge, port cranes, and city blocks in the distance. Sunny, clear sky.",
            descRu: "Вид на бухту Золотой Рог и вантовый мост. Широкая гладь воды, мост, портовые краны и городские кварталы вдалеке. Солнечная погода, ясное небо.",
            dateEn: "13 June 2026",
            dateRu: "13 июня 2026"
        },
        {
            src: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260613_175808.jpg",
            fileName: "IMG_20260613_175808.jpg",
            descEn: "Sea view near Tokarevskaya Koshka. Rusty wooden piles – remnants of an old pier – emerge from the water. Power line towers on a green island and the urban coastline in the background. Overcast sky.",
            descRu: "Вид на море в районе Токаревской кошки. Из воды торчат ржавые деревянные сваи — остатки старого пирса. Опоры ЛЭП на поросшем зеленью острове и застроенный берег. Пасмурное небо.",
            dateEn: "13 June 2026",
            dateRu: "13 июня 2026"
        },
        {
            src: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260614_101850.jpg",
            fileName: "IMG_20260614_101850.jpg",
            descEn: "Memorial plaque on the embankment near the submarine memorial. Granite wall with a golden plaque dedicated to the first Soviet submarine, with Zolotoy Rog Bay, cable-stayed bridge and port cranes behind.",
            descRu: "Мемориальная доска на набережной вблизи мемориала подводным лодкам. Гранитная стена с золотой табличкой, посвященной первой советской подводной лодке. За стеной — бухта Золотой Рог, вантовый мост и портовые краны.",
            dateEn: "14 June 2026",
            dateRu: "14 июня 2026"
        },
        {
            src: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260614_123705.jpg",
            fileName: "IMG_20260614_123705.jpg",
            descEn: "Famous Tokarevsky Lighthouse. View from the water along a stony spit (Tokarevskaya Koshka) lined with wooden poles. A small white lighthouse with a red top stands in the distance. Calm sea and hills on the opposite shore.",
            descRu: "Знаменитый Токаревский маяк. Вид с воды на каменистую косу (Токаревскую кошку), вдоль которой выставлены деревянные столбы. Вдали — небольшой белый маяк с красным верхом. Спокойное море и сопки на противоположном берегу.",
            dateEn: "14 June 2026",
            dateRu: "14 июня 2026"
        },
        {
            src: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260614_133336.jpg",
            fileName: "IMG_20260614_133336.jpg",
            descEn: "Russky Island, near the channel. A shore with dark gravel, calm water surface and overcast sky create a serene weekend atmosphere in nature.",
            descRu: "Остров Русский, район канала. Берег с тёмным гравием, спокойная гладь воды и пасмурное небо создают умиротворённую атмосферу выходного дня на природе.",
            dateEn: "14 June 2026",
            dateRu: "14 июня 2026"
        },
        {
            src: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260614_140132.jpg",
            fileName: "IMG_20260614_140132.jpg",
            descEn: "Beach on Russky Island. Several vacationers on the shore: some sitting on blankets or folding chairs, others standing near the water or stepping into the cool sea. A lonely sailboat on the horizon adds a peaceful vibe.",
            descRu: "Пляж на острове Русский. Несколько отдыхающих на берегу: кто-то сидит на подстилках или раскладных стульях, кто-то стоит у воды или заходит в море. Одинокий парусник на горизонте придаёт пейзажу умиротворение.",
            dateEn: "14 June 2026",
            dateRu: "14 июня 2026"
        },
        {
            src: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260614_161821.jpg",
            fileName: "IMG_20260614_161821.jpg",
            descEn: "Pedestrian zone in central Vladivostok. Decorative garlands create a pergola over the alley. People walk on the cobblestones, benches with resting citizens line the path, and shrubs and trees frame the walkway.",
            descRu: "Пешеходная зона в центре Владивостока. Над аллеей натянуты декоративные гирлянды, создающие перголу. По брусчатке идут прохожие, вдоль дорожки стоят скамейки, где отдыхают люди, а по краям высажены кустарники и деревья.",
            dateEn: "14 June 2026",
            dateRu: "14 июня 2026"
        },
        {
            src: "https://item1000-collab.github.io/ai/trips/20260614-vladivostok/photos/IMG_20260614_162910.jpg",
            fileName: "IMG_20260614_162910.jpg",
            descEn: "Famous mural on the facade of a residential building on Admirala Fokina Street. The wall painting depicts the historic 'Millionka' Chinese quarter with balconies, stairways, and figures in traditional costumes. Passersby admire the artwork below.",
            descRu: "Знаменитый мурал на торце жилого дома по улице Адмирала Фокина. Стену украшает роспись, изображающая исторический китайский квартал «Миллионка» с балконами, лестницами и фигурами в традиционных костюмах. Внизу прохожие рассматривают мурал.",
            dateEn: "14 June 2026",
            dateRu: "14 июня 2026"
        }
    ];

    // language state
    let currentLanguage = 'en';  // 'en' or 'ru'

    // DOM elements
    const photosContainer = document.getElementById('photosList');
    const mainTitle = document.getElementById('mainTitle');
    const footerNote = document.getElementById('footerNote');
    const langEnBtn = document.getElementById('langEnBtn');
    const langRuBtn = document.getElementById('langRuBtn');

    // helper: get localized description and date based on currentLanguage
    function getLocalizedContent(photo) {
        if (currentLanguage === 'en') {
            return {
                desc: photo.descEn,
                date: photo.dateEn,
            };
        } else {
            return {
                desc: photo.descRu,
                date: photo.dateRu,
            };
        }
    }

    // render the entire page: all photos in simple list, each full width, no cropping
    function renderGallery() {
        if (!photosContainer) return;
        
        let html = '';
        for (let i = 0; i < photosData.length; i++) {
            const photo = photosData[i];
            const localized = getLocalizedContent(photo);
            
            // no slider, just one photo block after another
            html += `
                <div class="photo-entry" id="photo-${i}">
                    <div class="photo-image">
                        <img src="${photo.src}" alt="Vladivostok - ${photo.fileName}" loading="lazy">
                    </div>
                    <div class="photo-info">
                        <div class="filename-row">
                            <div class="file-badge">
                                📎 <a href="${photo.src}" target="_blank">${photo.fileName}</a>
                            </div>
                        </div>
                        <div class="description-text">
                            ${localized.desc}
                        </div>
                        <div class="meta-links">
                            <div class="date-chip">
                                📅 ${localized.date}
                            </div>
                            <div class="action-link">
                                🔗 <a href="${photo.src}" target="_blank">Open high‑res photo</a>
                            </div>
                            <div class="action-link">
                                ⬇️ <a href="${photo.src}" download="${photo.fileName}">Download original</a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        photosContainer.innerHTML = html;
        
        // also update title and footer based on language (cosmetic)
        if (currentLanguage === 'en') {
            mainTitle.textContent = '🌊 Vladivostok · June 13–14, 2026';
            if (footerNote) footerNote.textContent = 'Vladivostok — Pacific gateway | full‑width originals, no crop';
        } else {
            mainTitle.textContent = '🌊 Владивосток · 13–14 июня 2026';
            if (footerNote) footerNote.textContent = 'Владивосток — тихоокеанские ворота | фотографии в полную ширину, без обрезки';
        }
    }

    // switch language and re-render everything
    function setLanguage(lang) {
        if (lang === currentLanguage) return;
        currentLanguage = lang;
        
        // update active button styles
        if (lang === 'en') {
            langEnBtn.classList.add('active-lang');
            langRuBtn.classList.remove('active-lang');
        } else {
            langRuBtn.classList.add('active-lang');
            langEnBtn.classList.remove('active-lang');
        }
        
        // re-render gallery with new language texts
        renderGallery();
    }

    // add event listeners and initial render
    function init() {
        renderGallery();
        
        // language switcher events
        if (langEnBtn && langRuBtn) {
            langEnBtn.addEventListener('click', () => setLanguage('en'));
            langRuBtn.addEventListener('click', () => setLanguage('ru'));
        }
        
        // optional: set active-lang for english by default
        langEnBtn.classList.add('active-lang');
        langRuBtn.classList.remove('active-lang');
    }
    
    init();
</script>
</body>
</html>
