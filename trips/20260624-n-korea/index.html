            color: #023047;
        }

            color: #2c6e9e;
            margin-top: 0.3rem;

        }

        .day-content ul {
            padding-left: 1.4rem;
            margin: 0.8rem 0;
        }

            margin: 0.5rem 0;

            border-left: 5px solid #ffb74d;
            padding: 0.8rem 1.2rem;
            margin: 1rem 0;
            border-radius: 16px;

            border: none;
            height: 1px;

</head>

    let currentLang = "en";

    function renderPage() {
        const data = daysData[currentLang];
        const container = document.getElementById("days-container");
        if (!container) return;

        let html = "";
        for (let i = 0; i < data.content.length; i++) {
            const day = data.content[i];
            const dayNum = i+1;
            html += `
                <div class="day-card" id="day-${dayNum}">
                    <div class="day-header">
                        <div class="day-title">${data.dayNames[i]} — ${day.title}</div>
                        <div class="day-sub">📅 ${currentLang === 'en' ? 'Itinerary' : 'Программа'}</div>
                    </div>
                    <div class="day-content">
                        ${day.text}
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;

        // note & footer
        const noteEl = document.getElementById("program-note");
        if (noteEl) noteEl.innerText = data.programNote;
        const footerEl = document.getElementById("footer-text");
        if (footerEl) footerEl.innerText = data.footer;
        document.getElementById("main-title").innerText = currentLang === "en" 
            ? "🇰🇵 Entire Korea: North & South · 10 days / 9 nights"
            : "🇰🇵 Вся Корея: Север и Юг · 10 дней / 9 ночей";

        // update active language button style
        document.querySelectorAll(".lang-btn").forEach(btn => {
            if (btn.getAttribute("data-lang") === currentLang) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
        });
    }

    // build day navigation anchors
    function buildDayNav() {
        const navContainer = document.getElementById("day-nav-links");
        if (!navContainer) return;
        let linksHtml = "";
        for (let i = 1; i <= 10; i++) {
            const displayName = currentLang === "en" ? `Day ${i}` : `День ${i}`;
            linksHtml += `<a href="#day-${i}" class="day-link">${displayName}</a>`;
        }
        navContainer.innerHTML = linksHtml;
    }

    // switch language and re-render
    function setLanguage(lang) {
        if (lang !== "en" && lang !== "ru") return;
        currentLang = lang;
        renderPage();
        buildDayNav();  // rebuild day labels with new language
        // after rebuild, preserve anchoring but smooth update
    }

    // attach event listeners to language buttons
    function initLangButtons() {
        const btns = document.querySelectorAll(".lang-btn");
        btns.forEach(btn => {
            btn.addEventListener("click", (e) => {
                const lang = btn.getAttribute("data-lang");
                if (lang === currentLang) return;
                setLanguage(lang);
            });
        });
    }

    // initial load
    renderPage();
    buildDayNav();
    initLangButtons();

    // optional: add small offset for scroll-margin on anchored days
    // Already handled by css scroll-margin-top: 150px on .day-card
</script>
</body>
</html>
