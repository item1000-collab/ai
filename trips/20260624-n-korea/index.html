    let currentLang = "en";

    // Compact render: each event on a new line (using block display, minimal margin)
    function renderCompactEvents(eventsArray, extraLinkData = null, linkLabel = null) {
        if (!eventsArray || eventsArray.length === 0) return '<div class="event-item"><span class="event-name">—</span></div>';
        let itemsHtml = '';
        for (let ev of eventsArray) {
            // escape possible HTML
            const safeEv = ev.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
            itemsHtml += `
                <div class="event-item">
                    <span class="event-marker">—</span>
                    <span class="event-name">${safeEv}</span>
                </div>
            `;
        }
        // If there's an extra link (only for day 1) append as a separate line but still compact
        if (extraLinkData && linkLabel) {
            itemsHtml += `
                <div class="event-item day-link-resource">
                    <span class="event-marker">🔗</span>
                    <span class="event-name"><a href="${extraLinkData}" target="_blank" rel="noopener noreferrer">${linkLabel}</a></span>
                </div>
            `;
        }
        return itemsHtml;
    }

    function renderPage() {
        const data = itineraryEvents[currentLang];
        const container = document.getElementById("days-container");
        if (!container) return;

        let daysHtml = '';
        for (let i = 0; i < data.days.length; i++) {
            const dayData = data.days[i];
            const dayNumber = i + 1;
            let extraLinkUrl = null;
            let linkDisplayText = null;
            
            // Only for day 1 (i === 0)
            if (i === 0 && dayData.extraLink) {
                extraLinkUrl = dayData.extraLink;
                if (currentLang === 'en') {
                    linkDisplayText = dayData.linkLabelEn || "📌 Additional tour info & map";
                } else {
                    linkDisplayText = dayData.linkLabelRu || "📌 Дополнительная информация и карта";
                }
            }
            
            const eventsHtml = renderCompactEvents(dayData.events, extraLinkUrl, linkDisplayText);
            
            daysHtml += `
                <div class="day-card" id="day-${dayNumber}">
                    <div class="day-header">
                        <div>
                            <div class="day-title">
                                ${currentLang === 'en' ? `Day ${dayNumber}` : `День ${dayNumber}`} — ${dayData.title}
                            </div>
                            <div class="day-sub">
                                ${currentLang === 'en' ? `📍 ${dayData.events.length} activities` : `📍 ${dayData.events.length} событий`}
                            </div>
                        </div>
                        <div class="toggle-icon" aria-label="events list">📋</div>
                    </div>
                    <div class="event-list">
                        ${eventsHtml}
                    </div>
                </div>
            `;
        }
        container.innerHTML = daysHtml;

        // update note and footer texts
        const noteEl = document.getElementById("program-note");
        if (noteEl) noteEl.innerText = data.programNote;
        const footerEl = document.getElementById("footer-text");
        if (footerEl) footerEl.innerText = data.footer;
        
        const mainTitle = document.getElementById("main-title");
        if (mainTitle) {
            mainTitle.innerText = currentLang === "en" 
                ? "🇰🇵 Entire Korea: North & South · 10 days / 9 nights"
                : "🇰🇵 Вся Корея: Север и Юг · 10 дней / 9 ночей";
        }
        
        // active language button highlight
        document.querySelectorAll(".lang-btn").forEach(btn => {
            const langValue = btn.getAttribute("data-lang");
            if (langValue === currentLang) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
        });
    }

    function initLangButtons() {

        btns.forEach(btn => {

                const lang = btn.getAttribute("data-lang");
                if (lang === currentLang) return;
                currentLang = lang;
                renderPage();
            });
        });
    }

    // initial load
    renderPage();
    initLangButtons();
</script>
</body>
</html>
