    // Build external day link URL based on path (01..10)
    // Base template: https://item1000-collab.github.io/ai/trips/20260624-n-korea/XX/index.html
    function getDayLinkUrl(dayPath) {
        return `https://item1000-collab.github.io/ai/trips/20260624-n-korea/${dayPath}/index.html`;
    }

    // Compact event render: each event line + extra link for every day (pattern from day1)
    function renderCompactEvents(eventsArray, dayLinkUrl, linkLabel) {
        if (!eventsArray || eventsArray.length === 0) return '<div class="event-item"><span class="event-name">—</span></div>';
        let itemsHtml = '';
        for (let ev of eventsArray) {
            const safeEv = ev.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
            itemsHtml += `
                <div class="event-item">
                    <span class="event-marker">—</span>
                    <span class="event-name">${safeEv}</span>
                </div>
            `;
        }
        
        // Add external link section for this day (exactly as day1 style but for all days)
        if (dayLinkUrl && linkLabel) {
            itemsHtml += `
                <div class="event-item day-link-resource">
                    <span class="event-marker">🔗</span>
                    <span class="event-name"><a href="${dayLinkUrl}" target="_blank" rel="noopener noreferrer">${linkLabel}</a></span>
                </div>
            `;
        }
        return itemsHtml;
    }

        dayCards.forEach(card => {
            const header = card.querySelector('.day-header');
            if (header && !header.hasAttribute('data-listener')) {
                header.setAttribute('data-listener', 'true');
                header.addEventListener('click', (e) => {
                    // avoid triggering if clicking on inner link
                    if (e.target.tagName === 'A' || e.target.closest('.day-link-resource a')) return;
                    card.classList.toggle('collapsed');
                });
            }
        });
    }

    function renderPage() {
        const data = itineraryEvents[currentLang];
        const container = document.getElementById("days-container");
        if (!container) return;

        let daysHtml = '';
        for (let i = 0; i < data.days.length; i++) {
            const dayData = data.days[i];
            const dayNumber = i + 1;
            // Build dynamic link based on linkPath (01-10)
            const linkPath = dayData.linkPath;
            const dayUrl = getDayLinkUrl(linkPath);
            let linkDisplayText = '';
            if (currentLang === 'en') {
                linkDisplayText = dayData.linkLabelEn || `📌 Day ${dayNumber}: Additional resources & map`;
            } else {
                linkDisplayText = dayData.linkLabelRu || `📌 День ${dayNumber}: Дополнительные материалы и карта`;
            }
            
            const eventsHtml = renderCompactEvents(dayData.events, dayUrl, linkDisplayText);
            
            daysHtml += `
                <div class="day-card" id="day-${dayNumber}">
                    <div class="day-header">
                        <div>
                            <div class="day-title">
                                ${currentLang === 'en' ? `Day ${dayNumber}` : `День ${dayNumber}`} — ${dayData.title}
                            </div>
                            <div class="day-sub">
                                ${currentLang === 'en' ? `📍 ${dayData.events.length} activities` : `📍 ${dayData.events.length} событий`}
                            </div>
                        </div>
                        <div class="toggle-icon" aria-label="events list">📋</div>
                    </div>
                    <div class="event-list">
                        ${eventsHtml}
                    </div>
                </div>
            `;
        }
        container.innerHTML = daysHtml;
        
        // Re-attach toggle events after new DOM render
        bindDayToggle();
        
        // update note and footer texts
        const noteEl = document.getElementById("program-note");
        if (noteEl) noteEl.innerText = data.programNote;
        const footerEl = document.getElementById("footer-text");
        if (footerEl) footerEl.innerText = data.footer;
        
        const mainTitle = document.getElementById("main-title");
        if (mainTitle) {
            mainTitle.innerText = currentLang === "en" 
                ? "🇰🇵 Entire Korea: North & South · 10 days / 9 nights"
                : "🇰🇵 Вся Корея: Север и Юг · 10 дней / 9 ночей";
        }
        
        // active language button highlight
        document.querySelectorAll(".lang-btn").forEach(btn => {
            const langValue = btn.getAttribute("data-lang");
            if (langValue === currentLang) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
        });
    }

    function initLangButtons() {
        const btns = document.querySelectorAll(".lang-btn");
        btns.forEach(btn => {
            btn.addEventListener("click", (e) => {
                const lang = btn.getAttribute("data-lang");
                if (lang === currentLang) return;
                currentLang = lang;
                renderPage();
            });
        });
    }

    // initial load
    renderPage();
    initLangButtons();
</script>
</body>
</html>
