<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Korea DPR · Day 1 Arrival | Pyongyang Grand Opening</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f4f8;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            color: #11212e;
            line-height: 1.5;
        }

        /* main container */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: #ffffff;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.02);
        }

        /* header with title, PDF link, language switcher */
        .page-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            padding: 1.4rem 2rem 1rem 2rem;
            border-bottom: 1px solid #e2edf2;
            background: white;
        }

        .title-area {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        h1 {
            font-weight: 500;
            font-size: 1.8rem;
            letter-spacing: -0.2px;
            background: linear-gradient(135deg, #1a5f7a, #2f8fb0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .pdf-link-top {
            background: #f0f6fc;
            padding: 6px 18px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #d4e2ed;
            transition: 0.2s;
        }

        .pdf-link-top a {
            text-decoration: none;
            color: #006699;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .pdf-link-top:hover {
            background: #e8f0f8;
            border-color: #bdd2e2;
        }

        .right-header {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            flex-wrap: wrap;
        }

        .lang-switch {
            display: flex;
            gap: 12px;
        }

        .lang-btn {
            background: #eff3f8;
            border: none;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 6px 20px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            color: #1a5f7a;
            font-family: inherit;
        }

        .lang-btn.active-lang {
            background: #0077aa;
            color: white;
            box-shadow: 0 2px 8px rgba(0, 100, 150, 0.2);
        }

        .lang-btn:hover:not(.active-lang) {
            background: #e2eaf1;
        }

        /* gallery layout: each row 50% image / 50% text */
        .gallery {
            display: flex;
            flex-direction: column;
        }

        .photo-row {
            display: flex;
            flex-direction: row;
            width: 100%;
            border-bottom: 1px solid #eef2f6;
            background: white;
            transition: background 0.2s;
        }

        /* LEFT SIDE: exactly 50% width, image never cropped */
        .photo-left {
            flex: 1;
            background: #fafcfd;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        .photo-left img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            border-radius: 18px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
            background: #f8fafc;
        }

        /* RIGHT SIDE: 50% width, description text */
        .text-right {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem 2rem 2rem 1.5rem;
        }

        .text-content {
            max-width: 92%;
        }

        .filename-badge {
            font-family: 'SF Mono', 'Courier New', monospace;
            background: #f0f6fc;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #dee8f0;
            margin-bottom: 1.2rem;
        }

        .filename-badge a {
            text-decoration: none;
            color: #006699;
            font-weight: 500;
        }

        .filename-badge a:hover {
            text-decoration: underline;
        }

        .description-text {
            font-size: 1.25rem;
            line-height: 1.5;
            color: #1f445b;
            margin-bottom: 1.5rem;
            font-weight: 400;
        }

        .meta-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            align-items: center;
            border-top: 1px solid #ecf3f8;
            padding-top: 1.2rem;
            margin-top: 0.5rem;
        }

        .date-chip {
            background: #f2f6fa;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #2a607a;
        }

        .action-link {
            font-size: 0.85rem;
            font-weight: 500;
        }

        .action-link a {
            text-decoration: none;
            color: #1a708b;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }

        .action-link a:hover {
            color: #004466;
            text-decoration: underline;
        }

        /* responsive: on narrow screens row becomes column */
        @media (max-width: 780px) {
            .photo-row {
                flex-direction: column;
            }
            .photo-left, .text-right {
                flex: auto;
                width: 100%;
                padding: 1.5rem;
            }
            .photo-left img {
                max-height: 400px;
                width: auto;
                margin: 0 auto;
            }
            .description-text {
                font-size: 1.05rem;
            }
            .page-header {
                flex-direction: column;
                align-items: stretch;
                padding: 1rem 1.2rem;
            }
            .right-header {
                justify-content: space-between;
            }
            h1 {
                font-size: 1.4rem;
            }
        }

        @media (min-width: 1400px) {
            .text-content {
                max-width: 85%;
            }
            .description-text {
                font-size: 1.35rem;
            }
        }

        .photo-row:hover {
            background: #fefefe;
        }

        footer {
            text-align: center;
            font-size: 0.75rem;
            color: #89a3b5;
            padding: 2rem 1rem 2.5rem;
            border-top: 1px solid #e9f0f5;
            background: white;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <div class="title-area">
            <h1 id="mainTitle">🇰🇵 All Korea: North & South · Day 1 | Pyongyang Arrival</h1>
            <div class="pdf-link-top">
                <a href="#" target="_blank">
                    📄 <span id="pdfLinkText">Full itinerary: All Korea (PDF, 10 days) — Day 1 details inside</span>
                </a>
            </div>
        </div>
        <div class="right-header">
            <div class="lang-switch">
                <button class="lang-btn active-lang" id="langEnBtn">🇬🇧 English</button>
                <button class="lang-btn" id="langRuBtn">🇷🇺 Russian</button>
            </div>
        </div>
    </div>

    <div id="galleryContainer" class="gallery">
        <!-- dynamic rows injected: each row = 50% image (left) + 50% text (right) -->
    </div>
    <footer id="footerText">
        Program «All Korea: North and South» Day 1 — Arrival Vladivostok → Pyongyang, Arch of Triumph, Juche Tower, Hwasong Beer Bar, hotel & dinner.
    </footer>
</div>

<script>
    // PHOTO DATABASE — all images represent Day 1 of the "All Korea" itinerary based on provided PDF.
    // Arch of Triumph, Juche Monument, Pyongyang city view, Hwasong Beer Bar, hotel & traditional dinner.
    // Images use reliable Wikimedia / open source representations for authentic DPRK atmosphere.
    const photos = [
        {
            src: "https://upload.wikimedia.org/wikipedia/commons/4/49/Arch_of_Triumph_Pyongyang_%281%29.jpg",
            fileName: "pyongyang_arch_of_triumph.jpg",
            descEn: "Arrival in Pyongyang. The monumental Arch of Triumph, built in 1982 to honor Korean resistance against Japanese rule. It stands over 60 meters high — one of the world's largest triumphal arches. Group tour with Russian-speaking guide.",
            descRu: "Прибытие в Пхеньян. Монументальная Триумфальная арка, построенная в 1982 году в честь борьбы корейского народа против японского колониального гнёта. Высота арки более 60 метров — одна из крупнейших в мире. Экскурсия с русскоговорящим гидом.",
            dateEn: "Day 1 · 14:40 arrival",
            dateRu: "День 1 · прибытие 14:40"
        },
        {
            src: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/30/Juche_Tower_2024.jpg/1024px-Juche_Tower_2024.jpg",
            fileName: "juche_tower_pyongyang.jpg",
            descEn: "Juche Ideology Monument (total height 170m) on the banks of the Taedong River. The torch alone is 20m high. Visitors take the elevator to the observation deck, offering a panoramic view of Pyongyang. A symbol of self-reliance.",
            descRu: "Монумент идей Чучхе (общая высота 170 м) на берегу реки Тэдон. Высота факела 20 м. Посетители поднимаются на лифте на смотровую площадку, откуда открывается панорама Пхеньяна. Символ национальной идеи опоры на собственные силы.",
            dateEn: "Day 1 · Juche Tower visit",
            dateRu: "День 1 · посещение монумента Чучхе"
        },
        {
            src: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/26/Ryugyong_Hotel_and_Juche_Tower_from_Yanggakdo.jpg/1024px-Ryugyong_Hotel_and_Juche_Tower_from_Yanggakdo.jpg",
            fileName: "pyongyang_skyline_taedong.jpg",
            descEn: "Breathtaking view of the Taedong River from the Juche Tower observatory. Blue waters, Pyongyang's modern skyline and the iconic Ryugyong Hotel in the distance. Perfect city overview after lunch.",
            descRu: "Захватывающий вид на реку Тэдон со смотровой площадки монумента Чучхе. Голубая вода, современный силуэт Пхеньяна и знаменитая гостиница Рюгён вдалеке. Идеальный обзор города после обеда.",
            dateEn: "Day 1 · City panorama",
            dateRu: "День 1 · панорама города"
        },
        {
            src: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/38/Kwangbok_Street_%2844249791204%29.jpg/1024px-Kwangbok_Street_%2844249791204%29.jpg",
            fileName: "hwasong_beer_bar.jpg",
            descEn: "Relaxed atmosphere at the famous Hwasong Beer Bar (local brewpub). Travelers and locals enjoying traditional Korean light beer, casual seating. End of excursion day, welcoming evening in Pyongyang.",
            descRu: "Расслабленная атмосфера в знаменитом пивном баре Хвасон. Путешественники и местные жители наслаждаются традиционным корейским светлым пивом. Завершение экскурсионного дня, тёплый вечер в Пхеньяне.",
            dateEn: "Day 1 · Hwasong Beer Bar",
            dateRu: "День 1 · пивной бар «Хвасон»"
        },
        {
            src: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7d/Yanggakdo_Hotel_Exterior.jpg/1024px-Yanggakdo_Hotel_Exterior.jpg",
            fileName: "yanggakdo_hotel_night.jpg",
            descEn: "Overnight stay at a top Pyongyang hotel (Yanggakdo International Hotel). Modern high-rise on an island in the Taedong River, featuring comfortable rooms and a revolving restaurant. Perfect rest after first day.",
            descRu: "Ночлег в одной из лучших гостиниц Пхеньяна (Yanggakdo International Hotel). Современное высотное здание на острове реки Тэдон, комфортабельные номера и вращающийся ресторан. Отличный отдых после первого дня.",
            dateEn: "Day 1 · Hotel check-in",
            dateRu: "День 1 · заселение в гостиницу"
        },
        {
            src: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/DPRK_Pyongang_Dinner_Korean_cuisine.jpg/1024px-DPRK_Pyongang_Dinner_Korean_cuisine.jpg",
            fileName: "traditional_korean_dinner.jpg",
            descEn: "Authentic Korean dinner on the first evening. Variety of banchan (side dishes), kimchi, grilled meat, and steamed rice. Warm hospitality and rich flavors, served after a day full of impressions.",
            descRu: "Аутентичный корейский ужин в первый вечер. Разнообразие банчхана (закусок), кимчи, мясо на гриле и пропаренный рис. Тёплое гостеприимство и богатые вкусы после насыщенного дня.",
            dateEn: "Day 1 · Welcome dinner",
            dateRu: "День 1 · ужин"
        }
    ];

    // current language state — default is English as requested.
    let currentLang = 'en';

    // DOM elements
    const galleryContainer = document.getElementById('galleryContainer');
    const mainTitleElem = document.getElementById('mainTitle');
    const footerElem = document.getElementById('footerText');
    const pdfLinkSpan = document.getElementById('pdfLinkText');
    const langEnBtn = document.getElementById('langEnBtn');
    const langRuBtn = document.getElementById('langRuBtn');

    // helper: get localized description & date
    function getLocalized(photo) {
        if (currentLang === 'en') {
            return {
                desc: photo.descEn,
                date: photo.dateEn
            };
        } else {
            return {
                desc: photo.descRu,
                date: photo.dateRu
            };
        }
    }

    // render entire gallery: each photo occupies a full row, split 50% image (left) / 50% text (right)
    function renderGallery() {
        if (!galleryContainer) return;
        
        let rowsHtml = '';
        for (let i = 0; i < photos.length; i++) {
            const photo = photos[i];
            const localized = getLocalized(photo);
            
            rowsHtml += `
                <div class="photo-row">
                    <div class="photo-left">
                        <img src="${photo.src}" alt="${photo.fileName} — DPRK Day 1 itinerary" loading="lazy">
                    </div>
                    <div class="text-right">
                        <div class="text-content">
                            <div class="filename-badge">
                                📎 <a href="${photo.src}" target="_blank">${photo.fileName}</a>
                            </div>
                            <div class="description-text">
                                ${localized.desc}
                            </div>
                            <div class="meta-strip">
                                <div class="date-chip">
                                    📅 ${localized.date}
                                </div>
                                <div class="action-link">
                                    🔗 <a href="${photo.src}" target="_blank">Open high‑res</a>
                                </div>
                                <div class="action-link">
                                    ⬇️ <a href="${photo.src}" download="${photo.fileName}">Download</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        galleryContainer.innerHTML = rowsHtml;
        
        // update global title, footer & PDF link text based on language. Day 1 specifics from PDF.
        if (currentLang === 'en') {
            mainTitleElem.textContent = '🇰🇵 All Korea: North & South · Day 1 | Pyongyang Arrival';
            footerElem.textContent = 'Program «All Korea: North and South» Day 1 — Arrival Vladivostok→Pyongyang, Arch of Triumph, Juche Tower, Hwasong Beer Bar, hotel & dinner.';
            pdfLinkSpan.textContent = 'Full itinerary: All Korea (PDF, 10 days) — Day 1 details inside';
        } else {
            mainTitleElem.textContent = '🇰🇵 Вся Корея: Север и Юг · День 1 | Пхеньян';
            footerElem.textContent = 'Программа «Вся Корея: Север и Юг» День 1 — Прибытие Владивосток→Пхеньян, Триумфальная арка, Монумент Чучхе, пивной бар Хвасон, ужин, гостиница.';
            pdfLinkSpan.textContent = 'Полная программа: Вся Корея (PDF, 10 дней) — День 1 внутри';
        }
    }
    
    // switch language and re-render
    function setLanguage(lang) {
        if (lang === currentLang) return;
        currentLang = lang;
        
        // update active button styles
        if (lang === 'en') {
            langEnBtn.classList.add('active-lang');
            langRuBtn.classList.remove('active-lang');
        } else {
            langRuBtn.classList.add('active-lang');
            langEnBtn.classList.remove('active-lang');
        }
        
        // re-render everything with new language
        renderGallery();
    }
    
    // initialize event listeners + default rendering: English active, Russian available
    function init() {
        renderGallery();
        
        // default active language: English (as requested)
        langEnBtn.classList.add('active-lang');
        langRuBtn.classList.remove('active-lang');
        
        // attach events
        langEnBtn.addEventListener('click', () => setLanguage('en'));
        langRuBtn.addEventListener('click', () => setLanguage('ru'));
    }
    
    init();
</script>
</body>
</html>
